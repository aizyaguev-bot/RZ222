    /* ═══════════════════════════════════════════════════════════
       BUSINESS LOGIC

    function categorizeTransaction(desc) {
      if (!desc || typeof desc !== 'string') return { ...DEFAULT_CAT };
      const low = desc.toLowerCase().trim();
      if (!low) return { ...DEFAULT_CAT };
      for (const rule of CATEGORY_RULES) {
        for (const kw of rule.keywords) {
          if (low.includes(kw.toLowerCase())) {
            return { category: rule.category, color: rule.color, emoji: rule.emoji };
          }
        }
      }
      return { ...DEFAULT_CAT };
    }

    function calculateCashFlow(accounts, transactions, recurring, income, refDate) {
      const now  = refDate instanceof Date ? refDate : new Date();
      const day  = now.getDate();
      const dim  = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

      const sum = (arr, fn) => Math.round(arr.reduce((s,x) => s + fn(x), 0) * 100) / 100;

      const totalBalance  = sum(accounts, a => a.balance);
      const liquidBalance = sum(accounts.filter(a => a.type !== 'חיסכון'), a => a.balance);
      const upcomingExp   = sum(recurring.filter(e => e.dueDay > day), e => e.amount);
      const upcomingInc   = sum(income.filter(i => i.dueDay > day),    i => i.amount);
      const safeToSpend   = Math.max(0, Math.round((liquidBalance - upcomingExp + upcomingInc) * 100) / 100);

      const thisMonth = transactions.filter(t => {
        const d = new Date(t.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      const monthlyIncome   = sum(thisMonth.filter(t => t.amount > 0),  t =>  t.amount);
      const monthlyExpenses = sum(thisMonth.filter(t => t.amount < 0),  t => -t.amount);

      return { totalBalance, liquidBalance, safeToSpend,
               upcomingExp, upcomingInc, monthlyIncome, monthlyExpenses,
               daysRemaining: dim - day };
    }

    function expensesByCategory(transactions) {
      const map = {};
      transactions.filter(t => t.amount < 0).forEach(t => {
        if (!map[t.category]) map[t.category] = { name:t.category, value:0, color:t.color, emoji:t.emoji };
        map[t.category].value = Math.round((map[t.category].value + Math.abs(t.amount)) * 100) / 100;
      });
      return Object.values(map).sort((a,b) => b.value - a.value);
    }

    function fmtCurrency(n) {
      if (typeof n !== 'number' || isNaN(n)) return '₪0';
      return new Intl.NumberFormat('he-IL', {
        style:'currency', currency:'ILS', minimumFractionDigits:0, maximumFractionDigits:0
      }).format(Math.round(n));
    }

    function fmtDate(s) {
      const d = new Date(s);
      return isNaN(d) ? s : new Intl.DateTimeFormat('he-IL', { day:'numeric', month:'long' }).format(d);
    }

    /* ═══════════════════════════════════════════════════════════
       SVG DONUT CHART  (no external lib)
    ═══════════════════════════════════════════════════════════ */
    function DonutChart({ data }) {
      const [hov, setHov] = useState(null);
      const [tip, setTip] = useState(null);

      if (!data || data.length === 0) {
        return (
          <div className="h-48 flex items-center justify-center text-gray-400 text-sm">
            אין נתוני הוצאות
          </div>
        );
      }

      const total = data.reduce((s,d) => s + d.value, 0);
      const CX = 110, CY = 110, R = 90, ri = 54;
      const PI2 = 2 * Math.PI;
      let angle = -Math.PI / 2;

      const slices = data.map((d, i) => {
        const pct = d.value / total;
        const a0  = angle;
        const a1  = angle + pct * PI2;
        angle = a1;
        const large = pct > 0.5 ? 1 : 0;
        const cos0 = Math.cos(a0), sin0 = Math.sin(a0);
        const cos1 = Math.cos(a1), sin1 = Math.sin(a1);
        const path = [
          `M ${CX + R*cos0} ${CY + R*sin0}`,
          `A ${R} ${R} 0 ${large} 1 ${CX + R*cos1} ${CY + R*sin1}`,
          `L ${CX + ri*cos1} ${CY + ri*sin1}`,
          `A ${ri} ${ri} 0 ${large} 0 ${CX + ri*cos0} ${CY + ri*sin0}`,
          'Z'
        ].join(' ');
        const mid  = (a0 + a1) / 2;
        const lR   = (R + ri) / 2;
        return { ...d, path, pct, lx: CX + lR*Math.cos(mid), ly: CY + lR*Math.sin(mid) };
      });

      return (
        <div>
          <svg
            viewBox="0 0 220 220"
            style={{ width:'100%', maxHeight:200, overflow:'visible' }}
            onMouseLeave={() => { setHov(null); setTip(null); }}
          >
            {slices.map((s, i) => (
              <g key={i}>
                <path
                  d={s.path}
                  fill={s.color}
                  opacity={hov === null || hov === i ? 1 : 0.5}
                  style={{ cursor:'pointer', transition:'opacity .15s' }}
                  onMouseEnter={e => { setHov(i); setTip({ x:e.clientX, y:e.clientY, s }); }}
                  onMouseMove={e => setTip(t => ({ ...t, x:e.clientX, y:e.clientY }))}
                />
                {s.pct >= 0.06 && (
                  <text
                    x={s.lx} y={s.ly}
                    textAnchor="middle" dominantBaseline="central"
                    fill="white" fontSize="11" fontWeight="700"
                    style={{ pointerEvents:'none' }}
                  >
                    {(s.pct * 100).toFixed(0)}%
                  </text>
                )}
              </g>
            ))}
            {/* Center label */}
            <text x={CX} y={CY - 9}  textAnchor="middle" fontSize="10" fill="#9CA3AF">סה"כ</text>
            <text x={CX} y={CY + 11} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111827">
              {fmtCurrency(total)}
            </text>
          </svg>

          {/* Fixed tooltip */}
          {tip && (
            <div style={{
              position:'fixed', left:tip.x + 12, top:tip.y - 10,
              background:'#fff', border:'1px solid #e5e7eb',
              borderRadius:12, padding:'8px 12px',
              boxShadow:'0 4px 20px rgba(0,0,0,.12)',
              fontSize:13, zIndex:9999, pointerEvents:'none',
              direction:'rtl'
            }}>
              <p style={{ fontWeight:700 }}>{tip.s.emoji} {tip.s.name}</p>
              <p style={{ color:'#374151', marginTop:2 }}>{fmtCurrency(tip.s.value)}</p>
              <p style={{ color:'#9CA3AF', fontSize:11 }}>
                {(tip.s.pct * 100).toFixed(1)}% מסך ההוצאות
              </p>
            </div>
          )}

          {/* Legend */}
          <div className="mt-3 space-y-1.5 max-h-40 overflow-y-auto scrollbar-hide">
            {data.map(item => (
              <div key={item.name} className="flex items-center justify-between text-sm">

                </div>

            ))}

      );
    }

    /* ═══════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════ */
    function AddModal({ onClose, onAdd }) {
      const [desc,   setDesc]   = useState('');
      const [amount, setAmount] = useState('');
      const [type,   setType]   = useState('expense');
      const [acct,   setAcct]   = useState('Max');
      const preview = desc.length > 2 ? categorizeTransaction(desc) : null;

      function submit(e) {
        e.preventDefault();
        const raw = parseFloat(amount);
        if (isNaN(raw) || raw <= 0) return;
        const finalAmount = type === 'expense'
          ? -(Math.round(raw * 100) / 100)
          :   Math.round(raw * 100) / 100;
        onAdd({ description:desc, amount:finalAmount, account:acct,
                date: new Date().toISOString().split('T')[0],
                ...categorizeTransaction(desc) });
        onClose();
      }

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end sm:items-center justify-center p-4"
             onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="bg-white rounded-2xl w-full max-w-md modal-enter shadow-2xl">
            <div className="flex items-center justify-between p-5 border-b border-gray-100">

              <button onClick={onClose}
                      className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition-colors">
                ✕
              </button>
            </div>
            <form onSubmit={submit} className="p-5 space-y-4">
              {/* type toggle */}
              <div className="flex bg-gray-100 rounded-xl p-1 gap-1">
                {[['expense','הוצאה 💸'],['income','הכנסה 💰']].map(([v,l]) => (

                          className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${
                            type === v
                              ? `bg-white shadow-sm ${v==='expense' ? 'text-red-500' : 'text-green-600'}`
                              : 'text-gray-500'
                          }`}>
                    {l}
                  </button>
                ))}
              </div>
              {/* description */}

                <label className="block text-sm font-medium text-gray-700 mb-1">תיאור</label>

                       placeholder="לדוגמה: שופרסל, וולט, ארנונה..."

                       value={desc} onChange={e => setDesc(e.target.value)} />

    /* ═══════════════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════════════ */
    function App() {
      const [txs,       setTxs]       = useState(INIT_TX);
      const [showModal, setShowModal] = useState(false);
      const [tab,       setTab]       = useState('dashboard');
      const [newId,     setNewId]     = useState(null);

      const cf      = useMemo(() => calculateCashFlow(ACCOUNTS, txs, RECURRING, INCOME_SOURCES), [txs]);
      const catData = useMemo(() => expensesByCategory(txs), [txs]);
      const sorted  = useMemo(() => [...txs].sort((a,b) => new Date(b.date) - new Date(a.date)), [txs]);

      function handleAdd(tx) {
        const id = Date.now();
        setTxs(prev => [{ ...tx, id }, ...prev]);
        setNewId(id);
        setTimeout(() => setNewId(null), 2500);
      }

      const spendColor = cf.safeToSpend > 5000 ? '#22C55E'
                       : cf.safeToSpend > 1000 ? '#F59E0B'
                       :                          '#EF4444';
      const overSpend  = cf.monthlyExpenses > cf.monthlyIncome;
      const totalFixed = RECURRING.reduce((s,e) => s + e.amount, 0);

      const TABS = [
        { id:'dashboard',    label:'דשבורד',  emoji:'🏠' },
        { id:'transactions', label:'עסקאות',  emoji:'📋' },
        { id:'accounts',     label:'חשבונות', emoji:'🏦' },
        { id:'recurring',    label:'קבועים',  emoji:'🔄' },
      ];

      return (
        <div className="min-h-screen" style={{ background:'#f0f4f8' }}>

          {/* ─── NAV ─── */}
          <header className="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span style={{ fontSize:24 }}>💎</span>
                <div>
                  <p className="text-base font-extrabold text-gray-900" style={{ lineHeight:1 }}>FinanceIL</p>
                  <p className="text-xs text-gray-400">ניהול כספים חכם</p>
                </div>
              </div>
              <p className="text-xs text-gray-400 text-left">
                {new Intl.DateTimeFormat('he-IL',{ weekday:'long', day:'numeric', month:'long' }).format(new Date())}
              </p>
            </div>
            <div className="max-w-4xl mx-auto px-4 flex">
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                        className={`px-3 py-2.5 text-sm font-medium border-b-2 transition-colors whitespace-nowrap ${
                          tab === t.id
                            ? 'border-green-500 text-green-600'
                            : 'border-transparent text-gray-500 hover:text-gray-700'
                        }`}>
                  <span className="hidden sm:inline">{t.emoji} </span>{t.label}
                </button>
              ))}
            </div>
          </header>

          {/* ─── CONTENT ─── */}
          <main className="max-w-4xl mx-auto px-4 py-6" style={{ paddingBottom:100 }}>

            {/* ══ DASHBOARD ══ */}
            {tab === 'dashboard' && (
              <div className="space-y-5">

                {/* HERO */}
                <div className="rounded-2xl p-6 text-white"
                     style={{
                       background:`linear-gradient(135deg, ${spendColor} 0%, ${spendColor}bb 100%)`,
                       boxShadow:`0 0 40px ${spendColor}44`
                     }}>
                  <p className="text-sm font-medium mb-1" style={{ opacity:.8 }}>בטוח להוציא היום</p>
                  <p className="font-extrabold mb-3" style={{ fontSize:48, lineHeight:1.1, letterSpacing:'-1px' }}>
                    {fmtCurrency(cf.safeToSpend)}
                  </p>
                  <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm" style={{ opacity:.85 }}>
                    <span>💳 יתרה נזילה: {fmtCurrency(cf.liquidBalance)}</span>
                    <span>📅 {cf.daysRemaining} ימים לסוף חודש</span>
                  </div>
                  {(cf.upcomingExp > 0 || cf.upcomingInc > 0) && (
                    <div className="mt-3 rounded-xl p-3 text-xs space-y-0.5"
                         style={{ background:'rgba(255,255,255,.2)' }}>
                      {cf.upcomingExp > 0 && (
                        <p>⚠️ צפוי לנכות: <strong>{fmtCurrency(cf.upcomingExp)}</strong> בהוצאות קבועות</p>
                      )}
                      {cf.upcomingInc > 0 && (
                        <p>✅ צפוי להיכנס: <strong>{fmtCurrency(cf.upcomingInc)}</strong> (משכורת)</p>
                      )}
                    </div>
                  )}
                </div>

                {/* STATS */}
                <div className="grid grid-cols-3 gap-3">
                  {[
                    { label:'יתרה כוללת', val:cf.totalBalance,    cls: cf.totalBalance >= 0 ? 'text-gray-800' : 'text-red-500' },
                    { label:'הכנסות חודש', val:cf.monthlyIncome,   cls:'text-green-600' },
                    { label:'הוצאות חודש', val:cf.monthlyExpenses, cls: overSpend ? 'text-red-500' : 'text-orange-500' },
                  ].map(s => (
                    <div key={s.label} className="bg-white rounded-xl p-4 border border-gray-100 text-center card-lift">
                      <p className="text-xs text-gray-400 mb-1" style={{ lineHeight:1.3 }}>{s.label}</p>
                      <p className={`text-base font-bold ${s.cls}`}>{fmtCurrency(s.val)}</p>
                    </div>
                  ))}
                </div>

                {overSpend && (
                  <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex gap-3 items-start">
                    <span style={{ fontSize:22 }}>⚠️</span>
                    <div>
                      <p className="text-sm font-bold text-red-700">הוצאות עולות על הכנסות החודש!</p>
                      <p className="text-xs text-red-500 mt-0.5">
                        גרעון של {fmtCurrency(cf.monthlyExpenses - cf.monthlyIncome)}
                      </p>
                    </div>
                  </div>
                )}

                {/* TWO-COL */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  {/* Transactions */}
                  <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div className="flex items-center justify-between p-4 border-b border-gray-100">
                      <h2 className="text-sm font-bold text-gray-900">עסקאות אחרונות</h2>
                      <button onClick={() => setTab('transactions')}
                              className="text-xs text-green-600 font-medium">הכל ›</button>
                    </div>
                    <div className="p-2">
                      {sorted.slice(0,7).map(tx => (
                        <TxRow key={tx.id} tx={tx} isNew={tx.id === newId} />
                      ))}
                    </div>
                  </div>
                  {/* Chart */}
                  <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div className="p-4 border-b border-gray-100">
                      <h2 className="text-sm font-bold text-gray-900">הוצאות לפי קטגוריה</h2>
                      <p className="text-xs text-gray-400 mt-0.5">החודש הנוכחי</p>
                    </div>
                    <div className="p-4">
                      <DonutChart data={catData} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ══ TRANSACTIONS ══ */}
            {tab === 'transactions' && (
              <div className="bg-white rounded-2xl border border-gray-100">
                <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                  <h2 className="font-bold text-gray-900">כל העסקאות</h2>
                  <span className="text-xs text-gray-400">{txs.length} עסקאות</span>
                </div>
                <div className="p-2">
                  {sorted.map(tx => <TxRow key={tx.id} tx={tx} isNew={tx.id === newId} />)}
                </div>
              </div>
            )}

            {/* ══ ACCOUNTS ══ */}
            {tab === 'accounts' && (
              <div className="space-y-4">
                <div className="rounded-2xl p-6 text-white"
                     style={{ background:'linear-gradient(135deg,#1e293b,#334155)' }}>
                  <p className="text-sm mb-1" style={{ opacity:.7 }}>יתרה כוללת</p>
                  <p className="font-extrabold" style={{ fontSize:40 }}>{fmtCurrency(cf.totalBalance)}</p>
                </div>
                {ACCOUNTS.map(a => <AccCard key={a.id} acc={a} />)}
              </div>
            )}

            {/* ══ RECURRING ══ */}
            {tab === 'recurring' && (
              <div className="space-y-4">
                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                  <div className="p-4 border-b border-gray-100">
                    <h2 className="font-bold text-gray-900">הוצאות קבועות</h2>
                    <p className="text-xs text-gray-400">{fmtCurrency(totalFixed)} / חודש</p>
                  </div>
                  {RECURRING.map(e => (
                    <div key={e.id} className="flex items-center gap-3 p-4 border-b border-gray-50 last:border-0">
                      <span style={{ fontSize:22 }}>{e.emoji}</span>
                      <div className="flex-1">
                        <p className="text-sm font-medium text-gray-800">{e.name}</p>
                        <p className="text-xs text-gray-400">כל ה-{e.dueDay} לחודש</p>
                      </div>
                      <span className="text-sm font-bold text-red-500">−{fmtCurrency(e.amount)}</span>
                    </div>
                  ))}
                </div>
                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                  <div className="p-4 border-b border-gray-100">
                    <h2 className="font-bold text-gray-900">הכנסות קבועות</h2>
                  </div>
                  {INCOME_SOURCES.map(i => (
                    <div key={i.id} className="flex items-center gap-3 p-4">
                      <span style={{ fontSize:22 }}>{i.emoji}</span>
                      <div className="flex-1">
                        <p className="text-sm font-medium text-gray-800">{i.name}</p>
                        <p className="text-xs text-gray-400">כל ה-{i.dueDay} לחודש</p>
                      </div>
                      <span className="text-sm font-bold text-green-600">+{fmtCurrency(i.amount)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          {/* ─── FAB ─── */}
          <div style={{ position:'fixed', bottom:24, left:'50%', transform:'translateX(-50%)', zIndex:40 }}>
            <button onClick={() => setShowModal(true)}
                    className="bg-green-500 hover:bg-green-600 text-white font-bold rounded-full shadow-xl transition-all flex items-center gap-2"
                    style={{ padding:'14px 28px', fontSize:14, whiteSpace:'nowrap' }}>
              ➕ הוסף עסקה
            </button>
          </div>

          {showModal && <AddModal onClose={() => setShowModal(false)} onAdd={handleAdd} />}
        </div>
      );
    }

    // Hide loading spinner, mount React
    document.getElementById('loading').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
