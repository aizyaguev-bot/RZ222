function categorizeTransaction(desc) {
  if (!desc || typeof desc !== 'string') return { ...DEFAULT_CAT };
  const low = desc.toLowerCase().trim();
  if (!low) return { ...DEFAULT_CAT };
  for (const rule of CATEGORY_RULES) {
    for (const kw of rule.keywords) {
      if (low.includes(kw.toLowerCase()))
        return { category:rule.category, color:rule.color, emoji:rule.emoji };
    }
  }
  return { ...DEFAULT_CAT };
}

/* ═══════════════════════════════════════════════════
   CASH FLOW ENGINE
═══════════════════════════════════════════════════ */
function calculateCashFlow(accounts, transactions, recurring, income, refDate) {
  const now = refDate instanceof Date ? refDate : new Date();
  const day = now.getDate();
  const dim = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const sum = (arr, fn) => Math.round(arr.reduce((s,x) => s+fn(x), 0)*100)/100;
  const totalBalance  = sum(accounts, a => a.balance);
  const liquidBalance = sum(accounts.filter(a => a.type !== 'חיסכון'), a => a.balance);
  const upcomingExp   = sum(recurring.filter(e => e.dueDay > day), e => e.amount);
  const upcomingInc   = sum(income.filter(i => i.dueDay > day), i => i.amount);
  const safeToSpend   = Math.max(0, Math.round((liquidBalance - upcomingExp + upcomingInc)*100)/100);
  const thisMonth = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const monthlyIncome   = sum(thisMonth.filter(t => t.amount>0),  t =>  t.amount);
  const monthlyExpenses = sum(thisMonth.filter(t => t.amount<0),  t => -t.amount);
  return { totalBalance, liquidBalance, safeToSpend, upcomingExp, upcomingInc,
           monthlyIncome, monthlyExpenses, daysRemaining: dim - day };
}

function expensesByCategory(transactions) {
  const map = {};
  transactions.filter(t => t.amount < 0).forEach(t => {
    if (!map[t.category]) map[t.category] = { name:t.category, value:0, color:t.color, emoji:t.emoji };
    map[t.category].value = Math.round((map[t.category].value + Math.abs(t.amount))*100)/100;
  });
  return Object.values(map).sort((a,b) => b.value - a.value);
}

/* ═══════════════════════════════════════════════════

function fmtILS(n) {
  if (typeof n !== 'number' || isNaN(n)) return '₪0';
  return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
}
function fmtUSD(n) {
  return '$' + new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
}
function fmtPct(n, sign=true) {
  const s = (n >= 0 && sign ? '+' : '') + n.toFixed(2) + '%';
  return s;
}
function fmtDate(s) {
  const d = new Date(s);
  return isNaN(d) ? s : new Intl.DateTimeFormat('he-IL',{day:'numeric',month:'long'}).format(d);
}

/* ═══════════════════════════════════════════════════
   SVG DONUT CHART
═══════════════════════════════════════════════════ */
function DonutChart({ data, centerLabel, centerValue }) {
  const [hov, setHov] = useState(null);
  const [tip, setTip] = useState(null);
  if (!data || data.length === 0)
    return <div className="h-48 flex items-center justify-center text-gray-400 text-sm">אין נתונים</div>;
  const total = data.reduce((s,d) => s+d.value, 0);
  const CX=110,CY=110,R=90,ri=54;
  let angle = -Math.PI/2;
  const slices = data.map((d,i) => {
    const pct = d.value/total;
    const a0=angle, a1=angle+pct*2*Math.PI;
    angle=a1;
    const large=pct>.5?1:0;
    const c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
    const path=[`M ${CX+R*c0} ${CY+R*s0}`,`A ${R} ${R} 0 ${large} 1 ${CX+R*c1} ${CY+R*s1}`,
                `L ${CX+ri*c1} ${CY+ri*s1}`,`A ${ri} ${ri} 0 ${large} 0 ${CX+ri*c0} ${CY+ri*s0}`,'Z'].join(' ');
    const mid=(a0+a1)/2, lR=(R+ri)/2;
    return { ...d, path, pct, lx:CX+lR*Math.cos(mid), ly:CY+lR*Math.sin(mid) };
  });
  return (
    <div>
      <svg viewBox="0 0 220 220" style={{width:'100%',maxHeight:200,overflow:'visible'}}
           onMouseLeave={()=>{setHov(null);setTip(null);}}>
        {slices.map((s,i) => (
          <g key={i}>
            <path d={s.path} fill={s.color} opacity={hov===null||hov===i?1:.45}
                  style={{cursor:'pointer',transition:'opacity .15s'}}
                  onMouseEnter={e=>{setHov(i);setTip({x:e.clientX,y:e.clientY,s});}}
                  onMouseMove={e=>setTip(t=>({...t,x:e.clientX,y:e.clientY}))} />
            {s.pct>=.07 && (
              <text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="central"
                    fill="white" fontSize="11" fontWeight="700" style={{pointerEvents:'none'}}>
                {(s.pct*100).toFixed(0)}%
              </text>
            )}
          </g>
        ))}
        <text x={CX} y={CY-9}  textAnchor="middle" fontSize="10" fill="#9CA3AF">{centerLabel||'סה"כ'}</text>
        <text x={CX} y={CY+11} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111827">{centerValue||fmtILS(total)}</text>
      </svg>
      {tip && (
        <div style={{position:'fixed',left:tip.x+12,top:tip.y-10,background:'#fff',border:'1px solid #e5e7eb',
                     borderRadius:12,padding:'8px 12px',boxShadow:'0 4px 20px rgba(0,0,0,.12)',
                     fontSize:13,zIndex:9999,pointerEvents:'none',direction:'rtl'}}>
          <p style={{fontWeight:700}}>{tip.s.emoji||'▪'} {tip.s.name}</p>
          <p style={{color:'#374151',marginTop:2}}>{fmtILS(tip.s.value)}</p>
          <p style={{color:'#9CA3AF',fontSize:11}}>{(tip.s.pct*100).toFixed(1)}% מהסך</p>
        </div>
      )}
      <div className="mt-3 space-y-1.5 max-h-36 overflow-y-auto scrollbar-hide">
        {data.map(item => (
          <div key={item.name} className="flex items-center justify-between text-sm">
            <div className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:item.color}}/>
              <span className="text-gray-600">{item.emoji||''} {item.name}</span>
            </div>
            <span className="font-semibold text-gray-800">{fmtILS(item.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   LOCALSTORAGE  +  LIVE DATA HELPERS
═══════════════════════════════════════════════════ */
const LS_FINNHUB = 'fil_finnhub_key';
const LS_INV     = 'fil_inv_values';

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

/* Fetch one quote from Finnhub (requires free API key) */
async function fetchFinnhub(symbol, apiKey) {
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${apiKey}`);
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  if (!d || d.c <= 0) throw new Error('no data');
  return { price: d.c, changePct: d.dp ?? 0, prevClose: d.pc };
}

/* Fetch live USD→ILS exchange rate (no key needed) */
async function fetchUsdIls() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    return d?.rates?.ILS ?? USD_ILS;
  } catch(e) { return USD_ILS; }
}

function ProgressBar({ pct, color, label, sublabel }) {
  const p = Math.max(0, Math.min(100, pct));
  return (
    <div>
      <div className="flex justify-between text-xs text-gray-500 mb-1">
        <span>{label}</span><span>{sublabel}</span>
      </div>
      <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
        <div className="h-full rounded-full transition-all duration-700"
             style={{width:`${p}%`, background:color}} />
      </div>
    </div>
  );
}

function PensionCard() {
  const stored     = lsGet(LS_INV, {});

/* ═══════════════════════════════════════════════════
   STOCK PORTFOLIO
═══════════════════════════════════════════════════ */
function StockPortfolio() {
  const [prices,     setPrices]     = useState(INIT_PRICES);
  const [dayChanges, setDayChanges] = useState({});
  const [usdIls,     setUsdIls]     = useState(USD_ILS);
  const [apiKey,     setApiKey]     = useState(() => lsGet(LS_FINNHUB, ''));
  const [keyInput,   setKeyInput]   = useState('');
  const [showKeyBox, setShowKeyBox] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [liveMode,   setLiveMode]   = useState(false);
  const [error,      setError]      = useState(null);
  const [lastUpdate, setLastUpdate] = useState(new Date());

  /* Fetch live exchange rate once on mount */
  useEffect(() => { fetchUsdIls().then(r => setUsdIls(r)); }, []);

  /* Auto-fetch if key already saved */
  useEffect(() => { if (apiKey) doLiveFetch(apiKey); }, []);

  async function doLiveFetch(key) {
    setRefreshing(true); setError(null);
    const syms = PORTFOLIO_DEF.map(s => s.symbol);
    const newPrices = {}, newChanges = {};
    let fetched = 0;
    await Promise.all(syms.map(async sym => {
      try {
        const q = await fetchFinnhub(sym, key);
        newPrices[sym]  = q.price;
        newChanges[sym] = q.changePct;
        fetched++;
      } catch(e) { /* keep mock price for this symbol */ }
    }));
    if (fetched > 0) {
      setPrices(prev => ({ ...prev, ...newPrices }));
      setDayChanges(newChanges);
      setLiveMode(true);
      setLastUpdate(new Date());
    } else {
      setError('לא ניתן לטעון נתונים — בדוק מפתח API');
    }
    setRefreshing(false);
  }

  function saveKey() {
    const k = keyInput.trim();
    if (!k) return;
    lsSet(LS_FINNHUB, k);
    setApiKey(k);
    setShowKeyBox(false);
    setKeyInput('');
    doLiveFetch(k);
  }

  function simulateRefresh() {
    setRefreshing(true);
    setTimeout(() => {
      setPrices(prev => {
        const next = {};
        for (const sym in prev) {
          const chg = 1 + (Math.random() * 0.06 - 0.03);
          next[sym] = Math.round(prev[sym] * chg * 100) / 100;
        }
        return next;
      });
      setLastUpdate(new Date()); setRefreshing(false);
    }, 700);
  }

  const rows = PORTFOLIO_DEF.map(s => {
    const currentPrice = prices[s.symbol] || s.avgCost;
    const costBasis    = s.shares * s.avgCost;
    const currentVal   = s.shares * currentPrice;
    const plUSD        = currentVal - costBasis;
    const plPct        = (plUSD / costBasis) * 100;
    const valILS       = currentVal * usdIls;
    return { ...s, currentPrice, costBasis, currentVal, plUSD, plPct, valILS };
  });

  const totalCost    = rows.reduce((s,r) => s + r.costBasis, 0);
  const totalValUSD  = rows.reduce((s,r) => s + r.currentVal, 0);
  const totalValILS  = totalValUSD * USD_ILS;
  const totalPL      = totalValUSD - totalCost;
  const totalPLPct   = (totalPL/totalCost)*100;

  const chartData = rows.map(r => ({
    name: r.symbol, value: r.valILS, color: r.color, emoji: ''
  }));

  return (
    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden card-lift">
      {/* Header */}
      <div className="p-4 flex items-center gap-3"
           style={{background:'linear-gradient(135deg,#052e16,#14532d)'}}>
        <span style={{fontSize:28}}>📊</span>
        <div className="flex-1 text-white">
          <p className="font-bold text-base flex items-center gap-2">
            תיק מניות
            {liveMode
              ? <span style={{background:'#22C55E',fontSize:10,padding:'1px 6px',borderRadius:10,fontWeight:700}}>🔴 LIVE</span>
              : <span style={{background:'rgba(255,255,255,.2)',fontSize:10,padding:'1px 6px',borderRadius:10}}>DEMO</span>
            }
          </p>
          <p style={{opacity:.7,fontSize:12}}>
            {rows.length} החזקות · עודכן {new Intl.DateTimeFormat('he-IL',{hour:'2-digit',minute:'2-digit'}).format(lastUpdate)}
          </p>
        </div>
        <div className="flex items-center gap-2">
          <div className="text-left text-white">
            <p className="text-xl font-extrabold">{fmtILS(totalValILS)}</p>
            <p style={{opacity:.7,fontSize:11,textAlign:'center'}}>שווי נוכחי</p>
          </div>
          <button onClick={()=>setShowKeyBox(v=>!v)}
                  style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:10,padding:'8px 10px',
                          color:'white',cursor:'pointer',fontSize:16}} title="הגדר מפתח Finnhub">⚙️</button>
          <button onClick={apiKey ? ()=>doLiveFetch(apiKey) : simulateRefresh} disabled={refreshing}
                  style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:10,padding:'8px 12px',
                          color:'white',cursor:'pointer',fontSize:13,fontWeight:600}}>
            <span className={refreshing?'spin':''} style={{display:'inline-block'}}>🔄</span>
            {!refreshing && (apiKey?' Live':' רענן')}
          </button>
        </div>
      </div>

      {/* Finnhub API key setup panel */}
      {showKeyBox && (
        <div className="p-4 border-b border-gray-100 bg-gray-50 space-y-2">
          <p className="text-sm font-semibold text-gray-800">🔑 מפתח Finnhub API (חינם)</p>
          <p className="text-xs text-gray-500">
            קבל מפתח חינם ב-<a href="https://finnhub.io/register" target="_blank" rel="noopener"
              style={{color:'#3B82F6',textDecoration:'underline'}}>finnhub.io/register</a> ← אחר כך הדבק כאן:
          </p>
          <div className="flex gap-2">
            <input type="text" placeholder="c_xxxxxxxxxxxxxxxx" value={keyInput}
                   onChange={e=>setKeyInput(e.target.value)}
                   style={{flex:1,border:'1px solid #d1d5db',borderRadius:8,padding:'8px 12px',
                           fontSize:13,direction:'ltr',fontFamily:'monospace'}} />
            <button onClick={saveKey}
                    style={{background:'#22C55E',color:'white',border:'none',borderRadius:8,
                            padding:'8px 16px',fontWeight:700,fontSize:13,cursor:'pointer'}}>
              שמור ✓
            </button>
          </div>
          {apiKey && (
            <p className="text-xs text-green-600">✅ מפתח שמור · שער דולר בזמן אמת: ₪{usdIls.toFixed(3)}</p>
          )}
          {error && <p className="text-xs text-red-500">⚠️ {error}</p>}
        </div>
      )}

      {/* Summary strip */}
      <div className="grid grid-cols-3 gap-0 border-b border-gray-100">
        {[
          { label:'עלות כוללת', val: fmtUSD(totalCost),   sub:null },
          { label:'רווח/הפסד',  val: fmtUSD(totalPL),     sub: fmtPct(totalPLPct), pos: totalPL>=0 },
          { label:'שער דולר',   val: `₪${usdIls.toFixed(3)}`, sub: liveMode?'בזמן אמת':'מדומה' },
        ].map((s,i) => (
          <div key={i} className={`p-3 text-center ${i<2?'border-l border-gray-100':''}`}>
            <p className="text-xs text-gray-400 mb-0.5">{s.label}</p>
            <p className={`text-sm font-bold ${s.pos!==undefined?(s.pos?'text-green-600':'text-red-500'):'text-gray-800'}`}>
              {s.val}
            </p>
            {s.sub && <p className={`text-xs ${s.pos!==undefined?(s.pos?'text-green-500':'text-red-400'):'text-gray-400'}`}>{s.sub}</p>}
          </div>
        ))}
      </div>

      {/* Table */}
      <div className="overflow-x-auto">
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead>
            <tr style={{background:'#f9fafb',borderBottom:'1px solid #e5e7eb'}}>
              {['נייר ערך','מחיר','שינוי','כמות','שווי ($)','שווי (₪)','רווח/הפסד'].map(h => (
                <th key={h} style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#6b7280',whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((r,i) => {
              const dayChg = dayChanges[r.symbol] !== undefined
                ? dayChanges[r.symbol]
                : ((r.currentPrice - INIT_PRICES[r.symbol]) / INIT_PRICES[r.symbol]) * 100;
              const pos       = r.plUSD >= 0;
              const dayPos    = dayChg >= 0;
              return (
                <tr key={r.symbol} style={{borderBottom:'1px solid #f3f4f6',
                  background: refreshing ? '#f9fafb' : 'white',
                  transition:'background .3s'}}>
                  <td style={{padding:'10px 12px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{width:8,height:8,borderRadius:'50%',background:r.color,flexShrink:0,display:'inline-block'}}/>
                      <div>
                        <p style={{fontWeight:700,color:'#111827'}}>{r.symbol}</p>
                        <p style={{fontSize:11,color:'#9CA3AF'}}>{r.name}</p>
                      </div>
                    </div>
                  </td>
                  <td style={{padding:'10px 12px',fontWeight:600}}>{fmtUSD(r.currentPrice)}</td>
                  <td style={{padding:'10px 12px'}}>
                    <span className={dayPos?'tag-green':'tag-red'}>{fmtPct(dayChg)}</span>
                  </td>
                  <td style={{padding:'10px 12px',color:'#374151'}}>{r.shares}</td>
                  <td style={{padding:'10px 12px',fontWeight:600}}>{fmtUSD(r.currentVal)}</td>
                  <td style={{padding:'10px 12px',fontWeight:600}}>{fmtILS(r.valILS)}</td>
                  <td style={{padding:'10px 12px'}}>
                    <p style={{fontWeight:700,color:pos?'#16a34a':'#dc2626'}}>{fmtUSD(r.plUSD)}</p>
                    <p style={{fontSize:11,color:pos?'#16a34a':'#dc2626'}}>{fmtPct(r.plPct)}</p>
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{background:'#f0fdf4',borderTop:'2px solid #bbf7d0'}}>
              <td colSpan="4" style={{padding:'10px 12px',fontWeight:700,color:'#14532d'}}>סה"כ תיק</td>
              <td style={{padding:'10px 12px',fontWeight:700,color:'#14532d'}}>{fmtUSD(totalValUSD)}</td>
              <td style={{padding:'10px 12px',fontWeight:700,color:'#14532d'}}>{fmtILS(totalValILS)}</td>
              <td style={{padding:'10px 12px'}}>
                <p style={{fontWeight:700,color:totalPL>=0?'#16a34a':'#dc2626'}}>{fmtUSD(totalPL)}</p>
                <p style={{fontSize:11,color:totalPL>=0?'#16a34a':'#dc2626'}}>{fmtPct(totalPLPct)}</p>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>

      {/* Allocation chart */}
      <div className="p-4 border-t border-gray-100">
        <p className="text-sm font-bold text-gray-800 mb-3">הקצאה לפי נייר ערך</p>
        <DonutChart data={chartData} centerLabel="תיק" centerValue={fmtILS(totalValILS)} />
      </div>
    </div>
  );
}

    { label:'קרן השתלמות',     value:KEREN.currentValue, color:'#0f172a', emoji:'📈' },
    { label:'פנסיה',            value:PENSION.currentValue, color:'#8B5CF6', emoji:'🏛️' },
    { label:'תיק מניות',        value:portfolioILS,      color:'#22C55E', emoji:'📊' },
  ];
  return (
    <div className="rounded-2xl overflow-hidden card-lift"
         style={{background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)'}}>
      <div className="p-5 text-white">
        <p className="text-sm mb-1" style={{opacity:.7}}>שווי נקי כולל (Net Worth)</p>
        <p className="font-extrabold" style={{fontSize:42,lineHeight:1}}>{fmtILS(total)}</p>
      </div>
      <div className="grid grid-cols-2 gap-0">
        {items.map((item,i) => (
          <div key={item.label}
               className={`p-4 text-white ${i%2===0?'border-l':''}  ${i<2?'border-b':''}`}
               style={{borderColor:'rgba(255,255,255,.1)'}}>
            <div className="flex items-center gap-2 mb-1">
              <span>{item.emoji}</span>
              <span style={{fontSize:11,opacity:.65}}>{item.label}</span>
            </div>
            <p style={{fontWeight:700,fontSize:16}}>{fmtILS(item.value)}</p>
            <p style={{fontSize:10,opacity:.5}}>{((item.value/total)*100).toFixed(0)}% מהתיק</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   EXISTING SMALL COMPONENTS
═══════════════════════════════════════════════════ */
function Badge({ label, color }) {
  return (
    <span style={{background:color+'22',color}}
          className="text-xs font-semibold px-2 py-0.5 rounded-full whitespace-nowrap">
      {label}
    </span>
  );
}
function TxRow({ tx, isNew }) {
  const pos = tx.amount >= 0;
  return (
    <div className={`flex items-center gap-3 p-3 rounded-xl transition-colors hover:bg-gray-50 ${isNew?'tx-new':''}`}>
      <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg flex-shrink-0"
           style={{background:tx.color+'22'}}>{tx.emoji}</div>
      <div className="flex-1 min-w-0">
        <p className="text-sm font-medium text-gray-800 truncate">{tx.description}</p>
        <div className="flex items-center gap-2 mt-0.5">
          <span className="text-xs text-gray-400">{fmtDate(tx.date)}</span>
          <Badge label={tx.category} color={tx.color} />
        </div>
      </div>
      <span className={`text-sm font-bold flex-shrink-0 ${pos?'text-green-600':'text-red-500'}`}>
        {pos?'+':''}{fmtILS(tx.amount)}
      </span>
    </div>
  );
}
function AccCard({ acc }) {
  const debt = acc.balance < 0;
  return (
    <div className="bg-white rounded-2xl p-4 border border-gray-100 flex items-center gap-3 card-lift">
      <div className="w-11 h-11 rounded-full flex items-center justify-center text-xl flex-shrink-0"
           style={{background:acc.color+'22'}}>{acc.logo}</div>
      <div className="flex-1">
        <p className="text-sm font-bold text-gray-800">{acc.bank}</p>
        <p className="text-xs text-gray-400">{acc.type} · {acc.num}</p>
      </div>
      <div className="text-left">
        <p className={`text-sm font-bold ${debt?'text-red-500':'text-gray-800'}`}>{fmtILS(acc.balance)}</p>
        {debt && <p className="text-xs text-gray-400 text-center">חוב</p>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ADD TRANSACTION MODAL
═══════════════════════════════════════════════════ */
function AddModal({ onClose, onAdd }) {
  const [desc,setDesc]=useState(''); const [amount,setAmount]=useState('');
  const [type,setType]=useState('expense'); const [acct,setAcct]=useState('Max');
  const preview = desc.length>2 ? categorizeTransaction(desc) : null;
  function submit(e) {
    e.preventDefault();
    const raw=parseFloat(amount);
    if(isNaN(raw)||raw<=0) return;
    const finalAmount=type==='expense'?-(Math.round(raw*100)/100):Math.round(raw*100)/100;
    onAdd({description:desc,amount:finalAmount,account:acct,
           date:new Date().toISOString().split('T')[0],...categorizeTransaction(desc)});
    onClose();
  }
  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end sm:items-center justify-center p-4"
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white rounded-2xl w-full max-w-md modal-enter shadow-2xl">
        <div className="flex items-center justify-between p-5 border-b border-gray-100">
          <h3 className="text-lg font-bold text-gray-900">הוסף עסקה</h3>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 transition-colors">✕</button>
        </div>
        <form onSubmit={submit} className="p-5 space-y-4">
          <div className="flex bg-gray-100 rounded-xl p-1 gap-1">
            {[['expense','הוצאה 💸'],['income','הכנסה 💰']].map(([v,l])=>(
              <button key={v} type="button" onClick={()=>setType(v)}
                      className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-all ${type===v?`bg-white shadow-sm ${v==='expense'?'text-red-500':'text-green-600'}`:'text-gray-500'}`}>
                {l}
              </button>
            ))}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">תיאור</label>
            <input type="text" required placeholder="לדוגמה: שופרסל, וולט, ארנונה..."
                   className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
                   value={desc} onChange={e=>setDesc(e.target.value)} />
            {preview&&<p className="mt-1.5 text-xs text-gray-500">קטגוריה: <span style={{color:preview.color}} className="font-semibold">{preview.emoji} {preview.category}</span></p>}
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">סכום (₪)</label>
            <input type="number" required min="0.01" step="0.01" placeholder="0.00"
                   className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
                   value={amount} onChange={e=>setAmount(e.target.value)} />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">חשבון</label>
            <select className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-green-400"
                    value={acct} onChange={e=>setAcct(e.target.value)}>
              {ACCOUNTS.map(a=><option key={a.id} value={a.bank}>{a.bank} — {a.type}</option>)}
            </select>
          </div>
          <button type="submit" className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-colors">
            הוסף עסקה ✓
          </button>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
function App() {
  const [txs,setTxs]           = useState(INIT_TX);
  const [showModal,setShowModal]= useState(false);
  const [tab,setTab]            = useState('dashboard');
  const [newId,setNewId]        = useState(null);
  const [invTab,setInvTab]      = useState('keren');

  const cf      = useMemo(()=>calculateCashFlow(ACCOUNTS,txs,RECURRING,INCOME_SOURCES),[txs]);
  const catData = useMemo(()=>expensesByCategory(txs),[txs]);
  const sorted  = useMemo(()=>[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)),[txs]);

  function handleAdd(tx) {
    const id=Date.now();
    setTxs(prev=>[{...tx,id},...prev]);
    setNewId(id);
    setTimeout(()=>setNewId(null),2500);
  }

  const spendColor = cf.safeToSpend>5000?'#22C55E':cf.safeToSpend>1000?'#F59E0B':'#EF4444';
  const overSpend  = cf.monthlyExpenses > cf.monthlyIncome;
  const totalFixed = RECURRING.reduce((s,e)=>s+e.amount,0);

  const TABS=[
    {id:'dashboard',  label:'דשבורד',  emoji:'🏠'},
    {id:'investments',label:'השקעות',  emoji:'💹'},
    {id:'transactions',label:'עסקאות', emoji:'📋'},
    {id:'accounts',   label:'חשבונות', emoji:'🏦'},
    {id:'recurring',  label:'קבועים',  emoji:'🔄'},
  ];
  const INV_TABS=[
    {id:'keren',     label:'קרן השתלמות', emoji:'📈'},
    {id:'pension',   label:'פנסיה',       emoji:'🏛️'},
    {id:'portfolio', label:'תיק מניות',   emoji:'📊'},
  ];

  return (
    <div className="min-h-screen" style={{background:'#f0f4f8'}}>

      {/* NAV */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span style={{fontSize:24}}>💎</span>
            <div>
              <p className="text-base font-extrabold text-gray-900" style={{lineHeight:1}}>FinanceIL</p>
              <p className="text-xs text-gray-400">ניהול כספים חכם</p>
            </div>
          </div>
          <p className="text-xs text-gray-400 text-left">
            {new Intl.DateTimeFormat('he-IL',{weekday:'long',day:'numeric',month:'long'}).format(new Date())}
          </p>
        </div>
        <div className="max-w-5xl mx-auto px-4 flex overflow-x-auto scrollbar-hide">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
                    className={`px-3 py-2.5 text-sm font-medium border-b-2 transition-colors whitespace-nowrap flex-shrink-0 ${tab===t.id?'border-green-500 text-green-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
              <span className="hidden sm:inline">{t.emoji} </span>{t.label}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6" style={{paddingBottom:100}}>

        {/* ══ DASHBOARD ══ */}
        {tab==='dashboard' && (
          <div className="space-y-5">
            {/* Net Worth */}
            <NetWorthCard bankTotal={cf.totalBalance} />

            {/* Safe to Spend */}
            <div className="rounded-2xl p-6 text-white"
                 style={{background:`linear-gradient(135deg,${spendColor} 0%,${spendColor}bb 100%)`,
                         boxShadow:`0 0 40px ${spendColor}44`}}>
              <p className="text-sm font-medium mb-1" style={{opacity:.8}}>בטוח להוציא היום</p>
              <p className="font-extrabold mb-3" style={{fontSize:48,lineHeight:1.1,letterSpacing:'-1px'}}>{fmtILS(cf.safeToSpend)}</p>
              <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm" style={{opacity:.85}}>
                <span>💳 יתרה נזילה: {fmtILS(cf.liquidBalance)}</span>
                <span>📅 {cf.daysRemaining} ימים לסוף חודש</span>
              </div>
              {(cf.upcomingExp>0||cf.upcomingInc>0) && (
                <div className="mt-3 rounded-xl p-3 text-xs space-y-0.5" style={{background:'rgba(255,255,255,.2)'}}>
                  {cf.upcomingExp>0 && <p>⚠️ צפוי לנכות: <strong>{fmtILS(cf.upcomingExp)}</strong> בהוצאות קבועות</p>}
                  {cf.upcomingInc>0 && <p>✅ צפוי להיכנס: <strong>{fmtILS(cf.upcomingInc)}</strong> (משכורת)</p>}
                </div>
              )}
            </div>

            {/* Stats */}
            <div className="grid grid-cols-3 gap-3">
              {[
                {label:'יתרה בנקאית', val:cf.totalBalance,    cls:cf.totalBalance>=0?'text-gray-800':'text-red-500'},
                {label:'הכנסות חודש', val:cf.monthlyIncome,   cls:'text-green-600'},
                {label:'הוצאות חודש', val:cf.monthlyExpenses, cls:overSpend?'text-red-500':'text-orange-500'},
              ].map(s=>(
                <div key={s.label} className="bg-white rounded-xl p-4 border border-gray-100 text-center card-lift">
                  <p className="text-xs text-gray-400 mb-1" style={{lineHeight:1.3}}>{s.label}</p>
                  <p className={`text-base font-bold ${s.cls}`}>{fmtILS(s.val)}</p>
                </div>
              ))}
            </div>

            {overSpend && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex gap-3 items-start">
                <span style={{fontSize:22}}>⚠️</span>
                <div>
                  <p className="text-sm font-bold text-red-700">הוצאות עולות על הכנסות החודש!</p>
                  <p className="text-xs text-red-500 mt-0.5">גרעון של {fmtILS(cf.monthlyExpenses-cf.monthlyIncome)}</p>
                </div>
              </div>
            )}

            {/* Two-col */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="flex items-center justify-between p-4 border-b border-gray-100">
                  <h2 className="text-sm font-bold text-gray-900">עסקאות אחרונות</h2>
                  <button onClick={()=>setTab('transactions')} className="text-xs text-green-600 font-medium">הכל ›</button>
                </div>
                <div className="p-2">
                  {sorted.slice(0,7).map(tx=><TxRow key={tx.id} tx={tx} isNew={tx.id===newId}/>)}
                </div>
              </div>
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="p-4 border-b border-gray-100">
                  <h2 className="text-sm font-bold text-gray-900">הוצאות לפי קטגוריה</h2>
                  <p className="text-xs text-gray-400 mt-0.5">החודש הנוכחי</p>
                </div>
                <div className="p-4"><DonutChart data={catData}/></div>
              </div>
            </div>
          </div>
        )}

        {/* ══ INVESTMENTS TAB ══ */}
        {tab==='investments' && (
          <div className="space-y-5">
            {/* Sub-tabs */}
            <div className="flex bg-white rounded-2xl p-1 gap-1 border border-gray-100 shadow-sm">
              {INV_TABS.map(t=>(
                <button key={t.id} onClick={()=>setInvTab(t.id)}
                        className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${invTab===t.id?'bg-green-500 text-white shadow-sm':'text-gray-500 hover:text-gray-700'}`}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>
            {invTab==='keren'     && <KerenCard />}
            {invTab==='pension'   && <PensionCard />}
            {invTab==='portfolio' && <StockPortfolio />}
          </div>
        )}

        {/* ══ TRANSACTIONS ══ */}
        {tab==='transactions' && (
          <div className="bg-white rounded-2xl border border-gray-100">
            <div className="p-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="font-bold text-gray-900">כל העסקאות</h2>
              <span className="text-xs text-gray-400">{txs.length} עסקאות</span>
            </div>
            <div className="p-2">{sorted.map(tx=><TxRow key={tx.id} tx={tx} isNew={tx.id===newId}/>)}</div>
          </div>
        )}

        {/* ══ ACCOUNTS ══ */}
        {tab==='accounts' && (
          <div className="space-y-4">
            <div className="rounded-2xl p-6 text-white" style={{background:'linear-gradient(135deg,#1e293b,#334155)'}}>
              <p className="text-sm mb-1" style={{opacity:.7}}>יתרה כוללת</p>
              <p className="font-extrabold" style={{fontSize:40}}>{fmtILS(cf.totalBalance)}</p>
            </div>
            {ACCOUNTS.map(a=><AccCard key={a.id} acc={a}/>)}
          </div>
        )}

        {/* ══ RECURRING ══ */}
        {tab==='recurring' && (
          <div className="space-y-4">
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              <div className="p-4 border-b border-gray-100">
                <h2 className="font-bold text-gray-900">הוצאות קבועות</h2>
                <p className="text-xs text-gray-400">{fmtILS(totalFixed)} / חודש</p>
              </div>
              {RECURRING.map(e=>(
                <div key={e.id} className="flex items-center gap-3 p-4 border-b border-gray-50 last:border-0">
                  <span style={{fontSize:22}}>{e.emoji}</span>
                  <div className="flex-1">
                    <p className="text-sm font-medium text-gray-800">{e.name}</p>
                    <p className="text-xs text-gray-400">כל ה-{e.dueDay} לחודש</p>
                  </div>
                  <span className="text-sm font-bold text-red-500">−{fmtILS(e.amount)}</span>
                </div>
              ))}
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              <div className="p-4 border-b border-gray-100"><h2 className="font-bold text-gray-900">הכנסות קבועות</h2></div>
              {INCOME_SOURCES.map(i=>(
                <div key={i.id} className="flex items-center gap-3 p-4">
                  <span style={{fontSize:22}}>{i.emoji}</span>
                  <div className="flex-1">
                    <p className="text-sm font-medium text-gray-800">{i.name}</p>
                    <p className="text-xs text-gray-400">כל ה-{i.dueDay} לחודש</p>
                  </div>
                  <span className="text-sm font-bold text-green-600">+{fmtILS(i.amount)}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* FAB */}
      <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:40}}>
        <button onClick={()=>setShowModal(true)}
                style={{background:'#22C55E',color:'white',fontWeight:700,borderRadius:50,
                        padding:'14px 28px',fontSize:14,border:'none',cursor:'pointer',
                        boxShadow:'0 8px 24px rgba(34,197,94,.4)',whiteSpace:'nowrap'}}>
          ➕ הוסף עסקה
        </button>
      </div>

      {showModal && <AddModal onClose={()=>setShowModal(false)} onAdd={handleAdd}/>}
    </div>
  );
}

document.getElementById('loading').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
