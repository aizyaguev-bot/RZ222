/* ── SNAPSHOT HELPERS (for return tracking) ── */
const LS_SNAP = k => `fil_snap_${k}`;

function loadSnaps(key) { return lsGet(LS_SNAP(key), []); }
function addSnap(key, value) {
  const snaps = loadSnaps(key);
  const today = new Date().toISOString().split('T')[0];
  // update today's entry or append
  const idx = snaps.findIndex(s => s.date === today);
  const next = idx >= 0
    ? snaps.map((s,i) => i===idx ? {...s, value} : s)
    : [...snaps, {date: today, value}];
  lsSet(LS_SNAP(key), next);
  return next;
}
function calcReturn(snaps) {
  if (!snaps || snaps.length < 1) return null;
  const sorted = [...snaps].sort((a,b) => a.date.localeCompare(b.date));
  const first = sorted[0], last = sorted[sorted.length - 1];
  const gain  = Math.round((last.value - first.value) * 100) / 100;
  const pct   = first.value > 0 ? (gain / first.value) * 100 : 0;
  const days  = Math.max(1, (new Date(last.date) - new Date(first.date)) / 864e5);
  // annualized CAGR if > 30 days
  const cagr  = days > 30 ? (Math.pow(last.value / first.value, 365 / days) - 1) * 100 : null;
  return { gain, pct, cagr, firstDate: first.date, lastDate: last.date, days, sorted };
}

/* ── SPARKLINE ── */
function Sparkline({ snaps, color='#22C55E', h=40, w=120 }) {
  if (!snaps || snaps.length < 2) return null;
  const vals = snaps.map(s => s.value);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*w},${h-((v-mn)/rng)*(h-4)+2}`).join(' ');
  return (
    <svg width={w} height={h} style={{display:'block',overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={(vals.length-1)/(vals.length-1)*w} cy={h-((vals[vals.length-1]-mn)/rng)*(h-4)+2} r="3.5" fill={color}/>
    </svg>
  );
}

/* ── RETURN BADGE ── */
function ReturnBadge({ pct, label='סה"כ', small=false }) {
  if (pct === null || pct === undefined) return null;
  const pos = pct >= 0;
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:4,
                 background:pos?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)',
                 borderRadius:8,padding:small?'2px 7px':'4px 10px'}}>
      <span style={{fontSize:small?10:12,fontWeight:700,color:pos?'#15803d':'#b91c1c'}}>
        {pos?'▲':'▼'} {Math.abs(pct).toFixed(2)}%
      </span>
      <span style={{fontSize:small?9:11,color:'#9CA3AF'}}>{label}</span>
    </div>
  );
}

// ── EditableCard is defined at MODULE LEVEL — never inside a parent component ──
// (hooks inside a component defined inside another component lose state on every parent re-render)
function EditableCard({title,emoji,value,setValue,monthly,color,light,tc,hint,lsKey,snapKey}) {
  const [editing,setEditing]=useState(false);
  const [tmp,setTmp]=useState('');
  const [snaps,setSnaps]=useState(()=>loadSnaps(snapKey||lsKey));
  const ret=useMemo(()=>calcReturn(snaps),[snaps]);

  function save(){
    const v=parseFloat(tmp);
    if(v>=0){
      setValue(v);
      lsSet(LS.INV,{...lsGet(LS.INV,{}),[lsKey]:v});
      const next=addSnap(snapKey||lsKey, v);
      setSnaps(next);
    }
    setEditing(false);
  }
  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{background:`linear-gradient(135deg,${color},${color}cc)`,padding:'16px 20px',
                   display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{color:'white'}}>
          <p style={{margin:0,fontSize:16,fontWeight:700}}>{emoji} {title}</p>
          {monthly>0&&<p style={{margin:'4px 0 0',fontSize:12,opacity:.7}}>הפקדה חודשית: {fmtILS(monthly)}</p>}
          {ret&&<div style={{marginTop:6}}><ReturnBadge pct={ret.pct} label={`מאז ${fmtDate(ret.firstDate)}`}/></div>}
        </div>
        <div style={{textAlign:'left',color:'white'}}>
          <p style={{margin:0,fontSize:22,fontWeight:800}}>{value>0?fmtILS(value):'—'}</p>
          <p style={{margin:'2px 0 0',fontSize:11,opacity:.6}}>שווי נוכחי</p>
        </div>
      </div>
      {snaps.length>=2&&(
        <div style={{padding:'8px 16px',background:'#fafafa',borderBottom:'1px solid #f3f4f6',
                     display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <Sparkline snaps={snaps} color={color} w={100} h={36}/>
          {ret&&(
            <div style={{textAlign:'left',fontSize:12}}>
              <p style={{margin:0,color:'#6B7280'}}>מאז {fmtDate(ret.firstDate)}</p>
              <p style={{margin:'2px 0 0',fontWeight:700,color:ret.gain>=0?'#15803d':'#b91c1c'}}>
                {ret.gain>=0?'+':''}{fmtILS(ret.gain)} ({ret.pct>=0?'+':''}{ret.pct.toFixed(2)}%)
              </p>
              {ret.cagr!==null&&<p style={{margin:'1px 0 0',fontSize:10,color:'#9CA3AF'}}>
                CAGR: {ret.cagr>=0?'+':''}{ret.cagr.toFixed(1)}%/שנה
              </p>}
            </div>
          )}
        </div>
      )}
      <div style={{padding:14}}>
        {editing?(
          <div style={{display:'flex',gap:10,alignItems:'flex-end'}}>
            <div style={{flex:1}}>
              <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>שווי נוכחי ₪</label>
              <input className="input input-num" type="number" value={tmp}
                     onChange={e=>setTmp(e.target.value)} placeholder="0" autoFocus/>
            </div>
            <button onClick={save} className="btn-primary" style={{width:'auto',padding:'13px 18px'}}>שמור</button>
            <button onClick={()=>setEditing(false)} className="btn-secondary" style={{width:'auto',padding:'13px 14px'}}>ביטול</button>
          </div>
        ):(
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <p style={{fontSize:12,color:'#9CA3AF',margin:0}}>💡 {hint}</p>
              {snaps.length===0&&<p style={{fontSize:11,color:'#F59E0B',margin:'3px 0 0'}}>⚡ עדכן שווי כדי להתחיל מעקב תשואה</p>}
            </div>
            <button onClick={()=>{setTmp(value||'');setEditing(true);}}
                    style={{border:'none',background:light,color:tc,borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              ✏️ עדכן
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function InvestmentsTab({profile}) {
  const [invTab,setInvTab]=useState('keren');
  const stored=lsGet(LS.INV,{});
  const gross=profile.grossSalary||0;
  const kerenMonthly=gross*(profile.kerenEmp+profile.kerenEr)/100;
  const pensionMonthly=gross*(profile.pensionEmp+profile.pensionEr)/100;

  // Per-sub-tab state
  const [kVal,setKVal]=useState(stored.kerenValue??0);
  const [pVal,setPVal]=useState(stored.pensionValue??0);
  const [savingsAccounts,setSavingsAccounts]=useState(()=>lsGet('fil_savings',[]));
  const [mmFunds,setMmFunds]=useState(()=>lsGet('fil_mm_list',[]));
  const [savEdit,setSavEdit]=useState(false);
  const [savForm,setSavForm]=useState({name:'',bank:'',value:'',rate:''});
  const [mmEdit,setMmEdit]=useState(false);
  const [mmForm,setMmForm]=useState({name:'',value:'',yield:''});

  function addSavings(){
    const v=parseFloat(savForm.value);
    if(!savForm.name||isNaN(v)||v<=0) return;
    const list=[...savingsAccounts,{id:Date.now(),name:savForm.name,bank:savForm.bank,
      value:v,rate:parseFloat(savForm.rate)||0}];
    setSavingsAccounts(list); lsSet('fil_savings',list);
    setSavForm({name:'',bank:'',value:'',rate:''}); setSavEdit(false);
  }
  function delSavings(id){const list=savingsAccounts.filter(s=>s.id!==id);setSavingsAccounts(list);lsSet('fil_savings',list);}
  function addMM(){
    const v=parseFloat(mmForm.value);
    if(!mmForm.name||isNaN(v)||v<=0) return;
    const list=[...mmFunds,{id:Date.now(),name:mmForm.name,value:v,yield:parseFloat(mmForm.yield)||0}];
    setMmFunds(list); lsSet('fil_mm_list',list);
    setMmForm({name:'',value:'',yield:''}); setMmEdit(false);
  }
  function delMM(id){const list=mmFunds.filter(f=>f.id!==id);setMmFunds(list);lsSet('fil_mm_list',list);}

  const INV_TABS=[
    {id:'returns',  label:'תשואות', emoji:'📉'},
    {id:'keren',    label:'קה"ש',   emoji:'📈'},
    {id:'pension',  label:'פנסיה',  emoji:'🏛️'},
    {id:'savings',  label:'חסכון',  emoji:'🏦'},
    {id:'mm',       label:'ק.כספית',emoji:'💵'},
    {id:'stocks',   label:'מניות',  emoji:'📊'},
  ];

  return (
    <div>
      {/* Sub-tab bar */}
      <div style={{background:'white',borderBottom:'1px solid #e5e7eb',overflowX:'auto',display:'flex',padding:'0 8px'}}
           className="scrollbar-hide">
        {INV_TABS.map(t=>(
          <button key={t.id} onClick={()=>setInvTab(t.id)} style={{
            flexShrink:0,padding:'12px 14px',border:'none',background:'none',cursor:'pointer',
            borderBottom:`2px solid ${invTab===t.id?'#22C55E':'transparent'}`,
            color:invTab===t.id?'#22C55E':'#9CA3AF',fontSize:13,fontWeight:invTab===t.id?700:500,
            whiteSpace:'nowrap',transition:'color .15s'}}>
            {t.emoji} {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>

        {/* ── RETURNS OVERVIEW TAB ── */}
        {invTab==='returns'&&(()=>{
          const portfolioData = lsGet(LS_PORTFOLIO, {holdings:[],cash:0});
          const kerenSnaps  = loadSnaps('kerenValue');
          const pensionSnaps= loadSnaps('pensionValue');
          const kerenRet    = calcReturn(kerenSnaps);
          const pensionRet  = calcReturn(pensionSnaps);
          // Stock portfolio return from buy history
          const buys = (portfolioData.history||[]).filter(h=>h.type==='buy');
          const totalInvested = buys.reduce((s,b)=>s+(b.cost||0),0);
          const sells = (portfolioData.history||[]).filter(h=>h.type==='sell');
          const realizedPL = sells.reduce((s,b)=>s+(b.pl||0),0);

          const assets=[
            kerenRet&&{emoji:'📈',name:'קרן השתלמות',ret:kerenRet,snaps:kerenSnaps,color:'#1e3a5f'},
            pensionRet&&{emoji:'🏛️',name:'פנסיה',ret:pensionRet,snaps:pensionSnaps,color:'#4a1942'},
          ].filter(Boolean);

          return (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {assets.length===0&&(
                <div className="card" style={{padding:32,textAlign:'center'}}>
                  <p style={{fontSize:18,margin:'0 0 8px'}}>📊</p>
                  <p style={{fontSize:15,fontWeight:700,color:'#374151',margin:'0 0 6px'}}>אין נתוני תשואה עדיין</p>
                  <p style={{fontSize:13,color:'#9CA3AF',lineHeight:1.6}}>
                    עדכן את שווי קרן ההשתלמות / הפנסיה לפחות פעם אחת.<br/>
                    בכל עדכון הערכים נשמרים ומחשבים תשואה לאורך זמן.
                  </p>
                </div>
              )}

              {assets.map(a=>(
                <div key={a.name} className="card" style={{overflow:'hidden'}}>
                  <div style={{background:`linear-gradient(135deg,${a.color},${a.color}cc)`,
                               padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <p style={{margin:0,fontSize:15,fontWeight:700,color:'white'}}>{a.emoji} {a.name}</p>
                    <ReturnBadge pct={a.ret.pct} label={`${Math.round(a.ret.days)}י׳`}/>
                  </div>
                  <div style={{padding:14,display:'grid',gridTemplateColumns:'1fr auto',gap:10,alignItems:'center'}}>
                    <div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                        {[
                          {l:'שווי נוכחי', v:fmtILS(a.snaps[a.snaps.length-1]?.value||0)},
                          {l:'רווח',       v:`${a.ret.gain>=0?'+':''} ${fmtILS(a.ret.gain)}`},
                          {l:'CAGR שנתי',  v:a.ret.cagr!==null?`${a.ret.cagr>=0?'+':''}${a.ret.cagr.toFixed(1)}%`:'—'},
                        ].map(s=>(
                          <div key={s.l} style={{background:'#f9fafb',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>
                            <p style={{fontSize:10,color:'#9CA3AF',margin:'0 0 2px'}}>{s.l}</p>
                            <p style={{fontSize:13,fontWeight:700,color:'#111',margin:0}}>{s.v}</p>
                          </div>
                        ))}
                      </div>
                      <p style={{fontSize:11,color:'#9CA3AF',marginTop:8}}>
                        מ-{fmtDate(a.ret.firstDate)} · {a.snaps.length} עדכונים
                      </p>
                    </div>
                    <Sparkline snaps={a.snaps} color={a.color} w={90} h={50}/>
                  </div>
                </div>
              ))}

              {/* Stock portfolio summary */}
              {totalInvested>0&&(
                <div className="card" style={{padding:16}}>
                  <p style={{fontWeight:700,fontSize:14,margin:'0 0 12px'}}>📊 תיק מניות — סיכום</p>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    {[
                      {l:'סה"כ הושקע',    v:`$${totalInvested.toFixed(0)}`},
                      {l:'רווח ממומש',    v:`$${realizedPL>=0?'+':''}${realizedPL.toFixed(2)}`,
                       c:realizedPL>=0?'#15803d':'#b91c1c'},
                    ].map(s=>(
                      <div key={s.l} style={{background:'#f9fafb',borderRadius:10,padding:'10px 12px'}}>
                        <p style={{fontSize:11,color:'#9CA3AF',margin:'0 0 2px'}}>{s.l}</p>
                        <p style={{fontSize:15,fontWeight:800,color:s.c||'#111',margin:0}}>{s.v}</p>
                      </div>
                    ))}
                  </div>
                  <p style={{fontSize:11,color:'#9CA3AF',marginTop:10}}>
                    רווח/הפסד לא ממומש — לחץ על "מניות" לפרטים עם מחירים חיים
                  </p>
                </div>
              )}
            </div>
          );
        })()}

        {invTab==='keren'&&(
          profile.hasKeren
            ? <EditableCard title="קרן השתלמות" emoji="📈" value={kVal} setValue={setKVal}
                monthly={kerenMonthly} color="#1e3a5f" light="#eff6ff" tc="#1e40af"
                hint="עדכן מ-gemel.co.il" lsKey="kerenValue" snapKey="kerenValue"/>
            : <p style={{color:'#9CA3AF',textAlign:'center',padding:32}}>לא הוגדרה קרן השתלמות</p>
        )}

        {invTab==='pension'&&(
          profile.hasPension
            ? <EditableCard title="פנסיה" emoji="🏛️" value={pVal} setValue={setPVal}
                monthly={pensionMonthly} color="#4a1942" light="#f5f3ff" tc="#6d28d9"
                hint="עדכן מ-pension.mof.gov.il" lsKey="pensionValue" snapKey="pensionValue"/>
            : <p style={{color:'#9CA3AF',textAlign:'center',padding:32}}>לא הוגדרה פנסיה</p>
        )}

        {invTab==='savings'&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <p style={{margin:0,fontWeight:700,fontSize:15}}>חסכונות בנקאיים</p>
              <button onClick={()=>setSavEdit(v=>!v)} style={{border:'none',background:'#f0fdf4',color:'#15803d',
                borderRadius:10,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                {savEdit?'ביטול':'+ הוסף'}
              </button>
            </div>
            {savEdit&&(
              <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>שם החיסכון</label>
                    <input className="input" placeholder='פק"מ / חסכון' value={savForm.name}
                           onChange={e=>setSavForm(f=>({...f,name:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>בנק</label>
                    <input className="input" placeholder="הפועלים" value={savForm.bank}
                           onChange={e=>setSavForm(f=>({...f,bank:e.target.value}))}/>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>יתרה ₪</label>
                    <input className="input input-num" type="number" placeholder="0" value={savForm.value}
                           onChange={e=>setSavForm(f=>({...f,value:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>ריבית שנתית %</label>
                    <input className="input input-num" type="number" step="0.1" placeholder="3.5" value={savForm.rate}
                           onChange={e=>setSavForm(f=>({...f,rate:e.target.value}))}/>
                  </div>
                </div>
                <button className="btn-primary" onClick={addSavings}>הוסף חיסכון ✓</button>
              </div>
            )}
            {savingsAccounts.length===0&&!savEdit&&(
              <div className="card" style={{padding:32,textAlign:'center',color:'#9CA3AF',fontSize:14}}>
                אין חסכונות — לחץ "הוסף"
              </div>
            )}
            {savingsAccounts.map(s=>(
              <div key={s.id} className="card" style={{padding:16,display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:28}}>🏦</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontWeight:700,fontSize:14}}>{s.name}</p>
                  <p style={{margin:'2px 0 0',fontSize:12,color:'#9CA3AF'}}>{s.bank}{s.rate>0?` · ${s.rate}% שנתי`:''}</p>
                </div>
                <div style={{textAlign:'left'}}>
                  <p style={{margin:0,fontWeight:800,fontSize:16}}>{fmtILS(s.value)}</p>
                  {s.rate>0&&<p style={{margin:'2px 0 0',fontSize:11,color:'#15803d'}}>+{fmtILS(s.value*s.rate/100)}/שנה</p>}
                </div>
                <button onClick={()=>delSavings(s.id)}
                        style={{border:'none',background:'#fee2e2',color:'#dc2626',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:13}}>✕</button>
              </div>
            ))}
            {savingsAccounts.length>0&&(
              <div className="card" style={{padding:14,background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:14,fontWeight:700,color:'#14532d'}}>סה"כ חסכונות</span>
                  <span style={{fontSize:16,fontWeight:800,color:'#14532d'}}>{fmtILS(savingsAccounts.reduce((s,a)=>s+a.value,0))}</span>
                </div>
              </div>
            )}
          </div>
        )}

        {invTab==='mm'&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {/* Header + add button */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{margin:0,fontWeight:700,fontSize:15}}>קרנות כספיות</p>
                {mmFunds.length>0&&<p style={{margin:'2px 0 0',fontSize:12,color:'#15803d'}}>
                  סה"כ: {fmtILS(mmFunds.reduce((s,f)=>s+f.value,0))}
                  {' · '}הכנסה שנתית: {fmtILS(mmFunds.reduce((s,f)=>s+f.value*f.yield/100,0))}
                </p>}
              </div>
              <button onClick={()=>setMmEdit(v=>!v)} style={{border:'none',background:'#f0fdf4',color:'#15803d',
                borderRadius:10,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                {mmEdit?'ביטול':'+ הוסף קרן'}
              </button>
            </div>

            {/* Add fund form */}
            {mmEdit&&(
              <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
                <input className="input" placeholder='שם הקרן (מגדל ש.כ. / הראל קלי / אלטשולר...)' value={mmForm.name}
                       onChange={e=>setMmForm(f=>({...f,name:e.target.value}))} autoFocus/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>שווי נוכחי ₪</label>
                    <input className="input input-num" type="number" placeholder="0" value={mmForm.value}
                           onChange={e=>setMmForm(f=>({...f,value:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>תשואה שנתית %</label>
                    <input className="input input-num" type="number" step="0.1" placeholder="4.5" value={mmForm.yield}
                           onChange={e=>setMmForm(f=>({...f,yield:e.target.value}))}/>
                  </div>
                </div>
                <button className="btn-primary" onClick={addMM}>הוסף קרן ✓</button>
              </div>
            )}

            {/* Fund list */}
            {mmFunds.length===0&&!mmEdit&&(
              <div className="card" style={{padding:32,textAlign:'center',color:'#9CA3AF',fontSize:14}}>
                אין קרנות כספיות — לחץ "הוסף קרן"
              </div>
            )}
            {mmFunds.map(f=>(
              <div key={f.id} className="card" style={{overflow:'hidden'}}>
                <div style={{background:'linear-gradient(135deg,#064e3b,#065f46)',padding:'14px 16px',
                             display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{color:'white'}}>
                    <p style={{margin:0,fontWeight:700,fontSize:15}}>💵 {f.name}</p>
                    {f.yield>0&&<p style={{margin:'3px 0 0',fontSize:11,opacity:.7}}>תשואה: {f.yield}% שנתי</p>}
                  </div>
                  <div style={{textAlign:'left',color:'white'}}>
                    <p style={{margin:0,fontSize:20,fontWeight:800}}>{fmtILS(f.value)}</p>
                    {f.yield>0&&<p style={{margin:'2px 0 0',fontSize:11,opacity:.7}}>+{fmtILS(f.value*f.yield/100)}/שנה</p>}
                  </div>
                </div>
                <div style={{padding:'10px 14px',display:'flex',justifyContent:'flex-start'}}>
                  <button onClick={()=>delMM(f.id)} style={{border:'none',background:'#fee2e2',color:'#dc2626',
                    borderRadius:8,padding:'6px 12px',fontSize:13,cursor:'pointer'}}>🗑️ הסר</button>
                </div>
              </div>
            ))}

            <div className="card" style={{padding:14,background:'#f0fdf4',border:'1px solid #a7f3d0'}}>
              <p style={{fontSize:12,color:'#065f46',margin:'0 0 6px',fontWeight:700}}>💡 מה זה קרן כספית?</p>
              <p style={{fontSize:12,color:'#047857',margin:0,lineHeight:1.6}}>
                קרן כספית היא אפיק השקעה סולידי עם נזילות יומית. תשואה ממוצעת 4-5% שנתי.
                מגדל שקלים, הראל קלי, אלטשולר שחם כספית — ניתן לפתוח דרך בית ההשקעות.
              </p>
            </div>
          </div>
        )}

        {invTab==='stocks'&&<PortfolioSection/>}

      </div>
    </div>
  );
}

/* ── BUDGET EDITOR ── */
function BudgetEditor({onSave}) {
  const [plan,setPlan]=useState(()=>loadBudgetPlan());
  const [saved,setSaved]=useState(false);
  const total=plan.reduce((s,b)=>s+b.pct,0);
  const over=total!==100;

  function setPct(key,val){
    const v=Math.max(0,Math.min(100,parseInt(val)||0));
    setPlan(p=>p.map(b=>b.key===key?{...b,pct:v}:b));
  }
  function save(){
    lsSet(LS.BUDGET,plan);
    onSave&&onSave(plan);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }
  function reset(){setPlan(DEFAULT_BUDGET_PLAN);lsSet(LS.BUDGET,DEFAULT_BUDGET_PLAN);}

  return (
    <div className="card" style={{padding:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <p style={{margin:0,fontSize:15,fontWeight:700}}>🎯 הגדרת תקציב לפי אחוזים</p>
        <button onClick={reset} style={{border:'none',background:'#f3f4f6',color:'#6B7280',borderRadius:8,
          padding:'5px 10px',fontSize:12,cursor:'pointer'}}>איפוס</button>
      </div>

      {/* Total indicator */}
      <div style={{background:over?'#fef2f2':'#f0fdf4',borderRadius:10,padding:'8px 12px',
                   marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:over?'#dc2626':'#15803d',fontWeight:700}}>
          {over?`⚠️ סה"כ ${total}% — חייב להיות 100%`:`✅ סה"כ: ${total}%`}
        </span>
        <span style={{fontSize:12,color:'#9CA3AF'}}>{over?`${100-total>0?'+':''}${100-total}%`:''}</span>
      </div>

      {plan.map(b=>(
        <div key={b.key} style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <label style={{fontSize:13,fontWeight:600,color:'#374151'}}>{b.emoji} {b.key}</label>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <input type="range" min="0" max="60" value={b.pct} onChange={e=>setPct(b.key,e.target.value)}
                     style={{width:100,accentColor:b.color}}/>
              <div style={{display:'flex',alignItems:'center',background:'#f3f4f6',borderRadius:8,overflow:'hidden',width:60}}>
                <input type="number" min="0" max="100" value={b.pct}
                       onChange={e=>setPct(b.key,e.target.value)}
                       style={{width:'100%',border:'none',background:'transparent',textAlign:'center',
                               fontSize:13,fontWeight:700,padding:'5px 4px',direction:'ltr'}}/>
                <span style={{fontSize:12,paddingLeft:4,color:'#6B7280'}}>%</span>
              </div>
            </div>
          </div>
          <div style={{height:5,background:'#f3f4f6',borderRadius:3}}>
            <div style={{height:'100%',width:`${(b.pct/60)*100}%`,background:b.color,borderRadius:3,transition:'width .2s'}}/>
          </div>
        </div>
      ))}

      <button className="btn-primary" onClick={save} disabled={over} style={{opacity:over?.5:1,marginTop:4}}>
        {saved?'✓ נשמר!':'שמור תקציב'}
      </button>
    </div>
  );
}

/* ── SETTINGS TAB ── */
function SettingsTab({profile,onReset,onProfileUpdate,onBudgetChange}) {
  const [p,setP]=useState({...profile});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setP(prev=>({...prev,[k]:v}));

  function save(){
    lsSet(LS.PROFILE,p);
    onProfileUpdate(p);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
      <div className="card" style={{padding:20}}>
        <p style={{fontSize:16,fontWeight:700,marginBottom:16}}>👤 פרופיל</p>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שם</label>
          <input className="input" value={p.name} onChange={e=>set('name',e.target.value)}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר נטו ₪</label>
          <input className="input input-num" type="number" value={p.netSalary} onChange={e=>set('netSalary',parseFloat(e.target.value)||0)}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר ברוטו ₪</label>
          <input className="input input-num" type="number" value={p.grossSalary} onChange={e=>set('grossSalary',parseFloat(e.target.value)||0)}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:600,color:'#15803d',marginBottom:6}}>💰 יום כניסת משכורת</label>
            <input className="input input-num" type="number" min="1" max="31"
                   value={p.salaryDay||10} onChange={e=>set('salaryDay',parseInt(e.target.value)||10)}/>
          </div>
          <div>
            <label style={{display:'block',fontSize:13,fontWeight:600,color:'#dc2626',marginBottom:6}}>💳 יום חיוב אשראי</label>
            <input className="input input-num" type="number" min="1" max="31"
                   value={p.creditDay||1} onChange={e=>set('creditDay',parseInt(e.target.value)||1)}/>
          </div>
        </div>
        <button className="btn-primary" onClick={save}>
          {saved?'✓ נשמר!':'שמור שינויים'}
        </button>
      </div>

      {/* Budget editor */}
      <BudgetEditor onSave={onBudgetChange}/>

      <div className="card" style={{padding:20,borderColor:'#fee2e2'}}>
        <p style={{fontSize:15,fontWeight:700,color:'#dc2626',marginBottom:8}}>⚠️ איפוס נתונים</p>
        <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>ימחק את כל העסקאות וההגדרות ויחזיר לאפס</p>
        <button onClick={()=>{if(confirm('האם אתה בטוח? לא ניתן לשחזר את הנתונים.'))onReset();}}
                style={{border:'2px solid #dc2626',background:'white',color:'#dc2626',borderRadius:12,
                        padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',width:'100%'}}>
          🗑️ מחק הכל והתחל מחדש
        </button>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ── */
function BottomNav({tab,setTab}) {
  const tabs=[
    {id:'dashboard',  label:'בית',     emoji:'🏠'},
    {id:'transactions',label:'עסקאות', emoji:'💳'},
    {id:'import',     label:'ייבוא',   emoji:'📥'},
    {id:'investments',label:'השקעות',  emoji:'💹'},
    {id:'settings',   label:'הגדרות',  emoji:'⚙️'},
  ];
  return (
    <nav className="bottom-nav" style={{
      position:'fixed',bottom:0,left:0,right:0,background:'white',
      borderTop:'1px solid #e5e7eb',display:'flex',zIndex:50,
      boxShadow:'0 -2px 16px rgba(0,0,0,.06)'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          flex:1,padding:'10px 2px 8px',border:'none',background:'none',cursor:'pointer',
          display:'flex',flexDirection:'column',alignItems:'center',gap:2,
          color:tab===t.id?'#22C55E':'#9CA3AF',transition:'color .15s'}}>
          <span style={{fontSize:22,lineHeight:1}}>{t.emoji}</span>
          <span style={{fontSize:10,fontWeight:tab===t.id?700:500}}>{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ── APP ROOT ── */
function App() {
  const [budgetPlan,setBudgetPlan]   = useState(()=>loadBudgetPlan());
  const [done,setDone]               = useState(()=>lsGet(LS.DONE,false));
  const [profile,setProfile]         = useState(()=>lsGet(LS.PROFILE,null));
  const [txs,setTxs]                 = useState(()=>lsGet(LS.TX,[]));
  const [tab,setTab]                 = useState('dashboard');
  const [salaryToast, setSalaryToast]= useState(null); // {amount, date}

  useEffect(()=>{ lsSet(LS.TX,txs); },[txs]);

  // ── Auto-salary on every app load ──
  useEffect(()=>{
    if (!done||!profile) return;
    const tx = checkAutoSalary(profile, txs);
    if (tx) {
      setTxs(prev=>[tx,...prev]);
      setSalaryToast({amount:tx.amount, date:tx.date});
      setTimeout(()=>setSalaryToast(null), 6000);
    }
  },[done, profile?.salaryDay]);

  function handleAdd(tx)  { setTxs(p=>[tx,...p]); }
  function handleImport(newTxs) { setTxs(p=>[...newTxs,...p]); }

  function handleUpdateInv(result) {
    if (result.type==='keren' && result.value>0) {
      const inv=lsGet(LS.INV,{}); inv.kerenValue=result.value;
      if(result.ytd!=null) inv.kerenYTD=result.ytd;
      lsSet(LS.INV,inv);
      addSnap('kerenValue', result.value);
    } else if (result.type==='pension' && result.value>0) {
      const inv=lsGet(LS.INV,{}); inv.pensionValue=result.value;
      if(result.ytd!=null) inv.pensionYTD=result.ytd;
      lsSet(LS.INV,inv);
      addSnap('pensionValue', result.value);
    } else if (result.type==='stocks' && result.holdings?.length>0) {
      const port=lsGet(LS_PORTFOLIO,{holdings:[],cash:0,history:[]});
      const today=new Date().toISOString().split('T')[0];
      const merged=[...port.holdings];
      result.holdings.forEach(h=>{
        const ex=merged.find(x=>x.symbol===h.symbol);
        if(ex){ ex.shares=h.shares; ex.avgCost=h.avgCost; }
        else merged.push({id:Date.now()+Math.random(),symbol:h.symbol,name:h.name||h.symbol,
                          shares:h.shares,avgCost:h.avgCost||0,
                          color:'#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')});
      });
      lsSet(LS_PORTFOLIO,{...port,holdings:merged});
    }
    setTab('investments');
  }
  function handleReset()  {
    lsClear();
    localStorage.removeItem(LS_SALARY_MONTHS);
    setDone(false); setProfile(null); setTxs([]);
  }

  if (!done||!profile) {
    return <Onboarding onDone={p=>{setProfile(p);setDone(true);}}/>;
  }

  const creditDay  = profile.creditDay  || 1;
  const salaryDay  = profile.salaryDay  || 10;
  const daysToCredit = daysUntil(creditDay);
  const daysToSalary = daysUntil(salaryDay);

  return (
    <div style={{maxWidth:500,margin:'0 auto',minHeight:'100vh',background:'#f0f4f8'}}>

      {/* ── Salary auto-add toast ── */}
      {salaryToast&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',zIndex:999,
                     background:'#15803d',color:'white',borderRadius:14,padding:'12px 20px',
                     boxShadow:'0 4px 20px rgba(0,0,0,.2)',fontSize:14,fontWeight:700,
                     display:'flex',alignItems:'center',gap:10,whiteSpace:'nowrap'}}>
          <span style={{fontSize:22}}>💰</span>
          <span>משכורת נוספה אוטומטית — {fmtILS(salaryToast.amount)}</span>
        </div>
      )}

      {/* Page title bar */}
      <div style={{background:'white',borderBottom:'1px solid #e5e7eb',padding:'14px 20px',
                   position:'sticky',top:0,zIndex:30}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>💎</span>
            <div>
              <p style={{margin:0,fontSize:15,fontWeight:800,lineHeight:1}}>FinanceIL</p>
              <p style={{margin:0,fontSize:11,color:'#9CA3AF'}}>
                {new Intl.DateTimeFormat('he-IL',{month:'long',year:'numeric'}).format(new Date())}
              </p>
            </div>
          </div>
          {/* Upcoming pills */}
          <div style={{display:'flex',gap:6}}>
            {daysToSalary<=7&&(
              <div style={{background:'#f0fdf4',borderRadius:8,padding:'4px 8px',fontSize:11,fontWeight:700,color:'#15803d'}}>
                💰 משכורת בעוד {daysToSalary}י׳
              </div>
            )}
            {daysToCredit<=5&&(
              <div style={{background:'#fef2f2',borderRadius:8,padding:'4px 8px',fontSize:11,fontWeight:700,color:'#b91c1c'}}>
                💳 אשראי בעוד {daysToCredit}י׳
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="main-content">
        {tab==='dashboard'   && <Dashboard     profile={profile} txs={txs} onAdd={handleAdd}
                                               budgetPlan={budgetPlan}
                                               daysToCredit={daysToCredit} daysToSalary={daysToSalary}/>}
        {tab==='transactions'&& <TransactionsTab txs={txs} onAdd={handleAdd}/>}
        {tab==='import'      && <ImportTab      onImport={handleImport} onUpdateInv={handleUpdateInv}/>}
        {tab==='investments' && <InvestmentsTab profile={profile}/>}
        {tab==='settings'    && <SettingsTab    profile={profile} onReset={handleReset}
          onProfileUpdate={p=>{setProfile(p);lsSet(LS.PROFILE,p);}}
          onBudgetChange={plan=>setBudgetPlan(plan)}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){
    var b=document.getElementById('err');
    if(b){b.style.display='block';b.textContent='React Error: '+e.message+'\n'+(e.stack||'')+'\n'+JSON.stringify(info);}
  }
  render(){
    if(this.state.err){
      return (
        <div style={{padding:24,minHeight:'100vh',background:'#1e1e1e',color:'#f87171',fontFamily:'monospace',direction:'ltr'}}>
          <h2 style={{color:'#fca5a5',marginBottom:12}}>⚠️ שגיאה בטעינה</h2>
          <p style={{color:'#fed7aa',marginBottom:8}}>פרטי השגיאה (שלח לתמיכה):</p>
          <pre style={{fontSize:11,whiteSpace:'pre-wrap',background:'#111',padding:12,borderRadius:8}}>
            {this.state.err.message}{'\n'}{this.state.err.stack}
          </pre>
          <button onClick={()=>window.location.reload()}
                  style={{marginTop:16,background:'#22C55E',color:'white',border:'none',borderRadius:10,padding:'12px 24px',fontSize:14,cursor:'pointer'}}>
            רענן דף
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch(e) {
  var b=document.getElementById('err');
  if(b){b.style.display='block';b.textContent='Mount Error: '+e.message+'\n'+(e.stack||'');}
}
</script>
</body>
</html>
