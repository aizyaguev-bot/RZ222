<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>FinanceIL</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- React production builds (7KB + 130KB vs 1.1MB dev) -->

  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Tailwind - synchronous so it scans all JSX class names -->

  <style>
    *{font-family:'Heebo','Segoe UI',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:#f0f4f8;margin:0;overscroll-behavior:none;}
    @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .fade-in{animation:fadeIn .25s ease}
    .spin{animation:spin .8s linear infinite;display:inline-block}

    .btn-primary{background:#22C55E;color:#fff;border:none;border-radius:14px;padding:14px 24px;
                 font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:background .15s;}
    .btn-primary:active{background:#16a34a;}
    .btn-secondary{background:#f3f4f6;color:#374151;border:none;border-radius:14px;padding:14px 24px;
                   font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
    .btn-secondary:active{background:#e5e7eb;}
    .input{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:13px 16px;
           font-size:16px;outline:none;transition:border-color .15s;background:#fff;}
    .input:focus{border-color:#22C55E;}
    .input-num{direction:ltr;text-align:right;}
    .tag-g{background:#dcfce7;color:#16a34a;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
    .tag-r{background:#fee2e2;color:#dc2626;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    /* bottom nav safe area */
    .main-content{padding-bottom:calc(72px + env(safe-area-inset-bottom));}
    .bottom-nav{padding-bottom:env(safe-area-inset-bottom);}
  </style>
</head>
<body>
<div id="root" style="min-height:100vh"></div>
<div id="err" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#1e1e1e;color:#f87171;padding:20px;z-index:9999;font-size:12px;direction:ltr;white-space:pre-wrap;overflow:auto;font-family:monospace"></div>
<script>
  function showErr(msg){ var e=document.getElementById('err'); e.style.display='block'; e.textContent+= msg+'\n'; }
  window.onerror=function(m,s,l,c,err){ showErr('JS ERROR: '+m+'\nLine '+l+':'+c+(err?'\nStack: '+err.stack:'')); };
  window.onunhandledrejection=function(e){ showErr('Promise rejected: '+(e.reason||e)); };
</script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── LS ── */
const LS = {
  DONE:'fil_done', PROFILE:'fil_profile', TX:'fil_tx',
  RECURRING:'fil_rec', INV:'fil_inv', FINNHUB:'fil_fh',
  BUDGET:'fil_budget', GEMINI:'fil_gemini',
};
const LS_ALL_KEYS = [...Object.values(LS), 'fil_portfolio','fil_savings','fil_mm_list','fil_budget'];
const lsGet = (k,fb) => { try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):fb; }catch{ return fb; } };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };
const lsClear = () => LS_ALL_KEYS.forEach(k=>localStorage.removeItem(k));

/* ── CATEGORIES ── */
const CAT_RULES = [
  {kw:['שופרסל','רמי לוי','ויקטורי','מגה','יינות ביתן','אושר עד','rami levy','mega'],     cat:'סופרמרקט',      color:'#22C55E',emoji:'🛒'},
  {kw:['וולט','wolt','מקדונלד','mcdonald','קפה','cafe','coffee','מסעדה','פיצה','pizza','סושי','בורגר'],  cat:'מסעדות וקפה',  color:'#F97316',emoji:'🍽️'},
  {kw:['ארנונה','עיריית','municipality'],                                                  cat:'ארנונה',         color:'#8B5CF6',emoji:'🏛️'},
  {kw:['hot','הוט','netflix','נטפליקס','spotify','ספוטיפיי','yes','יס','disney','apple tv'], cat:'בידור',         color:'#EC4899',emoji:'🎬'},
  {kw:['partner','פרטנר','cellcom','סלקום','פלאפון','pelephone','bezeq','בזק'],            cat:'תקשורת',         color:'#06B6D4',emoji:'📱'},
  {kw:['paz','פז','sonol','סונול','דלק','fuel'],                                           cat:'דלק ורכב',       color:'#84CC16',emoji:'⛽'},
  {kw:['אגד','דן','רב-קו','rav-kav','רכבת','גט','taxi','חניה','parking'],                  cat:'תחבורה',         color:'#3B82F6',emoji:'🚌'},
  {kw:['חברת החשמל','iec','מים','ועד בית'],                                               cat:'חשבונות בית',    color:'#EAB308',emoji:'💡'},
  {kw:['ביטוח','הראל','מנורה','כלל','מגדל','איילון'],                                     cat:'ביטוח',          color:'#6366F1',emoji:'🛡️'},
  {kw:['מכבי','כללית','לאומית','סופר-פארם','super pharm','תרופות'],                        cat:'בריאות',         color:'#14B8A6',emoji:'🏥'},
  {kw:['amazon','אמזון','aliexpress','ebay','זארה','zara','h&m','קסטרו','קניון'],          cat:'קניות',          color:'#F59E0B',emoji:'🛍️'},
  {kw:['משכורת','שכר','הכנסה','income','salary','bonus','בונוס'],                         cat:'הכנסה',          color:'#10B981',emoji:'💰'},
  {kw:['שכר דירה','שכירות','mortgage','משכנתה'],                                          cat:'דיור',           color:'#64748B',emoji:'🏠'},
];
const DEF_CAT = {cat:'אחר',color:'#9CA3AF',emoji:'📦'};

function categorize(desc) {
  if (!desc||typeof desc!=='string') return {...DEF_CAT};
  const low = desc.toLowerCase().trim();
  for (const r of CAT_RULES)
    for (const kw of r.kw)
      if (low.includes(kw.toLowerCase()))
        return {cat:r.cat,color:r.color,emoji:r.emoji};
  return {...DEF_CAT};
}

/* ── BUDGET CALC ── */
const DEFAULT_BUDGET_PLAN = [
  {key:'דיור',       pct:30, color:'#64748B', emoji:'🏠'},
  {key:'מזון ושוק',  pct:15, color:'#22C55E', emoji:'🛒'},
  {key:'תחבורה',     pct:10, color:'#3B82F6', emoji:'🚌'},
  {key:'חשבונות',    pct:8,  color:'#EAB308', emoji:'💡'},
  {key:'בריאות',     pct:5,  color:'#14B8A6', emoji:'🏥'},
  {key:'בידור',      pct:7,  color:'#EC4899', emoji:'🎬'},
  {key:'חיסכון',     pct:15, color:'#F59E0B', emoji:'💰'},
  {key:'שונות',      pct:10, color:'#9CA3AF', emoji:'📦'},
];
const CAT_TO_BUDGET = {
  'סופרמרקט':'מזון ושוק','מסעדות וקפה':'בידור','ארנונה':'חשבונות',
  'בידור':'בידור','תקשורת':'חשבונות','דלק ורכב':'תחבורה','תחבורה':'תחבורה',
  'חשבונות בית':'חשבונות','ביטוח':'חשבונות','בריאות':'בריאות','קניות':'שונות',
  'דיור':'דיור','אחר':'שונות',
};
function loadBudgetPlan() { return lsGet(LS.BUDGET, DEFAULT_BUDGET_PLAN); }
function calcBudget(netSalary, plan) {
  return (plan||loadBudgetPlan()).map(b => ({...b, amount: Math.round(netSalary * b.pct / 100)}));
}
function spentPerBudget(txs, budget) {
  const map = {};
  budget.forEach(b => { map[b.key] = 0; });
  const now = new Date();
  txs.filter(t => t.amount < 0).forEach(t => {
    const d = new Date(t.date);
    if (d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()) {
      const bk = CAT_TO_BUDGET[t.cat] || 'שונות';
      if (map[bk] !== undefined) map[bk] += Math.abs(t.amount);
    }
  });
  return map;
}

/* ── FORMATTERS ── */
const fmtILS = n => {
  if (typeof n!=='number'||isNaN(n)) return '₪0';
  return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
};
const fmtDate = s => {
  const d=new Date(s); if(isNaN(d)) return s;
  return new Intl.DateTimeFormat('he-IL',{day:'numeric',month:'short'}).format(d);
};

/* ── AUTO-SALARY LOGIC ── */
const LS_SALARY_MONTHS = 'fil_sal_months';

/**
 * Check if today >= salaryDay and salary not yet added for this month.
 * Returns the new transaction if it was added, null otherwise.
 */
function checkAutoSalary(profile, txs) {
  const net = profile.netSalary;
  const day = profile.salaryDay;
  if (!net || !day) return null;

  const now   = new Date();
  const today = now.getDate();
  if (today < day) return null; // salary day not reached yet

  const mk = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const done = lsGet(LS_SALARY_MONTHS, []);
  if (done.includes(mk)) return null; // already added this month

  // Check if a salary tx already exists this month (manual or imported)
  const alreadyHas = txs.some(t => {
    const d = new Date(t.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()
           && t.amount > 0 && (t.cat==='הכנסה' || t.description.includes('משכורת'));
  });
  if (alreadyHas) {
    lsSet(LS_SALARY_MONTHS, [...done, mk]);
    return null;
  }

  const salDate = new Date(now.getFullYear(), now.getMonth(), day);
  const dateStr = salDate.toISOString().split('T')[0];
  const cat = categorize('משכורת');
  const tx = {
    id: Date.now(),
    description: `משכורת — ${new Intl.DateTimeFormat('he-IL',{month:'long',year:'numeric'}).format(now)}`,
    amount: Math.round(net * 100) / 100,
    date: dateStr,
    cat: cat.cat, color: cat.color, emoji: cat.emoji,
    account: 'אוטומטי',
    auto: true,
  };
  lsSet(LS_SALARY_MONTHS, [...done, mk]);
  return tx;
}

/** Days until the next occurrence of `targetDay` in the month cycle */
function daysUntil(targetDay) {
  const now   = new Date();
  const today = now.getDate();
  if (targetDay > today) return targetDay - today;
  // already passed this month → count to next month
  const nextMonth = new Date(now.getFullYear(), now.getMonth()+1, targetDay);
  return Math.ceil((nextMonth - now) / 864e5);
}

/* ── SVG DONUT ── */
function DonutChart({data,size=180,cx_label='',cx_val=''}) {
  const [hov,setHov]=useState(null);
  if(!data||!data.length) return null;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return null;
  const CX=90,CY=90,R=72,ri=44; let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d.value/total,a0=angle,a1=angle+pct*2*Math.PI; angle=a1;
    const lg=pct>.5?1:0,c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
    const path=[`M ${CX+R*c0} ${CY+R*s0}`,`A ${R} ${R} 0 ${lg} 1 ${CX+R*c1} ${CY+R*s1}`,
      `L ${CX+ri*c1} ${CY+ri*s1}`,`A ${ri} ${ri} 0 ${lg} 0 ${CX+ri*c0} ${CY+ri*s0}`,'Z'].join(' ');
    const mid=(a0+a1)/2,lR=(R+ri)/2;
    return{...d,path,pct,lx:CX+lR*Math.cos(mid),ly:CY+lR*Math.sin(mid)};
  });
  return (
    <svg viewBox="0 0 180 180" style={{width:'100%',maxWidth:size,display:'block',margin:'0 auto'}}
         onMouseLeave={()=>setHov(null)}>
      {slices.map((s,i)=>(
        <g key={i} onMouseEnter={()=>setHov(i)} onTouchStart={()=>setHov(i===hov?null:i)}>
          <path d={s.path} fill={s.color} opacity={hov===null||hov===i?1:.45}
                style={{transition:'opacity .15s',cursor:'pointer'}}/>
          {s.pct>=.08&&<text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="central"
            fill="white" fontSize="10" fontWeight="700" style={{pointerEvents:'none'}}>
            {(s.pct*100).toFixed(0)}%</text>}
        </g>
      ))}
      {hov!==null&&slices[hov]
        ?<>
          <text x={CX} y={CY-8} textAnchor="middle" fontSize="10" fill="#6B7280">{slices[hov].name}</text>
          <text x={CX} y={CY+10} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111">{fmtILS(slices[hov].value)}</text>
        </>
        :<>
          <text x={CX} y={CY-8} textAnchor="middle" fontSize="10" fill="#9CA3AF">{cx_label||'סה"כ'}</text>
          <text x={CX} y={CY+10} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111">{cx_val||fmtILS(total)}</text>
        </>
      }
    </svg>
  );
}

/* ── ONBOARDING ── */
function Onboarding({onDone}) {
  const [step,setStep]=useState(1);
  const STEPS=6;
  const [d,setD]=useState({
    name:'', netSalary:'', grossSalary:'',
    salaryDay:10, creditDay:1,
    hasKeren:true, kerenEmp:2.5, kerenEr:7.5,
    hasPension:true, pensionEmp:6, pensionEr:14.83, pensionProvider:'',
    bankBalance:'', creditDebt:'',
    rent:'', rentDay:1, otherFixed:[],
  });
  const set=(k,v)=>setD(p=>({...p,[k]:v}));

  function finish() {
    const profile={
      ...d,
      netSalary:  parseFloat(d.netSalary)||0,
      grossSalary:parseFloat(d.grossSalary)||0,
      bankBalance:parseFloat(d.bankBalance)||0,
      creditDebt: parseFloat(d.creditDebt)||0,
      rent:       parseFloat(d.rent)||0,
      createdAt:  new Date().toISOString(),
    };
    lsSet(LS.PROFILE, profile);
    lsSet(LS.DONE, true);
    // seed recurring from rent
    if (profile.rent>0) {
      lsSet(LS.RECURRING,[{id:1,name:'שכר דירה',amount:profile.rent,dueDay:profile.rentDay,emoji:'🏠'}]);
    }
    onDone(profile);
  }

  const next = () => step<STEPS ? setStep(s=>s+1) : finish();
  const back = () => setStep(s=>s-1);
  const canNext = [
    ()=>d.name.trim().length>0,
    ()=>parseFloat(d.netSalary)>0,
    ()=>true,
    ()=>true,
    ()=>true,
    ()=>true,
  ][step-1];

  const pct = (step/STEPS)*100;

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f172a 0%,#1e3a5f 100%)',
                 display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
      <div style={{width:'100%',maxWidth:440}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:42,marginBottom:8}}>💎</div>
          <p style={{color:'white',fontSize:22,fontWeight:800,margin:0}}>FinanceIL</p>
          <p style={{color:'rgba(255,255,255,.5)',fontSize:13,margin:'4px 0 0'}}>הגדרה ראשונית</p>
        </div>

        {/* Progress */}
        <div style={{marginBottom:24}}>
          <div style={{height:4,background:'rgba(255,255,255,.15)',borderRadius:4}}>
            <div style={{height:'100%',width:`${pct}%`,background:'#22C55E',borderRadius:4,transition:'width .4s'}}/>
          </div>
          <p style={{color:'rgba(255,255,255,.5)',fontSize:12,textAlign:'center',marginTop:8}}>שלב {step} מתוך {STEPS}</p>
        </div>

        {/* Card */}
        <div className="card slide-up" style={{padding:28,background:'white'}}>

          {step===1 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>👋 היי! מה שמך?</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נתחיל בהיכרות קצרה</p>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שם פרטי</label>
              <input className="input" placeholder="ישראל ישראלי" value={d.name}
                     onChange={e=>set('name',e.target.value)}
                     onKeyDown={e=>e.key==='Enter'&&canNext()&&next()} autoFocus/>
            </div>
          )}

          {step===2 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>💰 פרטי שכר ואשראי</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:20}}>נשתמש בזה לתקציב ולמעקב אוטומטי</p>

              <div style={{marginBottom:14}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר נטו (לאחר ניכויים) ₪</label>
                <input className="input input-num" type="number" placeholder="14000" value={d.netSalary}
                       onChange={e=>set('netSalary',e.target.value)}/>
                <p style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>הסכום שנכנס לחשבון הבנק בפועל</p>
              </div>

              <div style={{marginBottom:14}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר ברוטו ₪ <span style={{color:'#9CA3AF',fontWeight:400}}>(אופציונלי)</span></label>
                <input className="input input-num" type="number" placeholder="18000" value={d.grossSalary}
                       onChange={e=>set('grossSalary',e.target.value)}/>
              </div>

              <div style={{background:'#f0fdf4',borderRadius:14,padding:14,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div>
                  <label style={{display:'block',fontSize:13,fontWeight:700,color:'#15803d',marginBottom:6}}>
                    📅 יום כניסת משכורת
                  </label>
                  <input className="input input-num" type="number" min="1" max="31" placeholder="10"
                         value={d.salaryDay} onChange={e=>set('salaryDay',parseInt(e.target.value)||10)}/>
                  <p style={{fontSize:11,color:'#15803d',marginTop:4}}>לדוגמה: 10 לחודש</p>
                </div>
                <div>
                  <label style={{display:'block',fontSize:13,fontWeight:700,color:'#dc2626',marginBottom:6}}>
                    💳 יום חיוב אשראי
                  </label>
                  <input className="input input-num" type="number" min="1" max="31" placeholder="1"
                         value={d.creditDay} onChange={e=>set('creditDay',parseInt(e.target.value)||1)}/>
                  <p style={{fontSize:11,color:'#dc2626',marginTop:4}}>יום שחברת האשראי מחייבת</p>
                </div>
              </div>

              <div style={{background:'#eff6ff',borderRadius:12,padding:12,marginTop:12,
                           display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:20}}>🤖</span>
                <p style={{fontSize:12,color:'#1e40af',margin:0,lineHeight:1.5}}>
                  <strong>משכורת אוטומטית:</strong> ביום {d.salaryDay||'?'} כל חודש תיכנס עסקת משכורת אוטומטית
                </p>
              </div>
            </div>
          )}

          {step===3 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>📋 הפרשות שכר</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:20}}>אלו ייקחו בחשבון בחישוב תיק ההשקעות</p>

              {/* Keren */}
              <div style={{background:'#eff6ff',borderRadius:14,padding:16,marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontWeight:700,fontSize:15}}>📈 קרן השתלמות</span>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                    <input type="checkbox" checked={d.hasKeren} onChange={e=>set('hasKeren',e.target.checked)}
                           style={{width:18,height:18,accentColor:'#22C55E'}}/>
                    <span style={{fontSize:13}}>יש לי</span>
                  </label>
                </div>
                {d.hasKeren&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>עובד %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.kerenEmp}

                    </div>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>מעסיק %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.kerenEr}
                             onChange={e=>set('kerenEr',parseFloat(e.target.value)||7.5)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                  </div>
                )}
              </div>

              {/* Pension */}
              <div style={{background:'#f5f3ff',borderRadius:14,padding:16}}>

                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>

                </div>
                {d.hasPension&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>עובד %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.pensionEmp}

                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>מעסיק %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.pensionEr}
                             onChange={e=>set('pensionEr',parseFloat(e.target.value)||14.83)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {step===4 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>🏦 מצב כספי נוכחי</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נתחיל לחשב את שווי הנכסים שלך</p>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>יתרה בבנק (עו"ש) ₪</label>
                <input className="input input-num" type="number" placeholder="0" value={d.bankBalance}
                       onChange={e=>set('bankBalance',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>חוב כרטיס אשראי ₪ <span style={{color:'#9CA3AF',fontWeight:400}}>(אם יש)</span></label>
                <input className="input input-num" type="number" placeholder="0" value={d.creditDebt}
                       onChange={e=>set('creditDebt',e.target.value)}/>
              </div>
            </div>
          )}

          {step===5 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>🏠 הוצאות קבועות</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נחשב מה יישאר לך מהמשכורת</p>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר דירה / משכנתה ₪ לחודש</label>
                <input className="input input-num" type="number" placeholder="0" value={d.rent}
                       onChange={e=>set('rent',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>יום הוראת קבע</label>
                <input className="input input-num" type="number" min="1" max="31" placeholder="1" value={d.rentDay}
                       onChange={e=>set('rentDay',parseInt(e.target.value)||1)}
                       style={{maxWidth:100}}/>
              </div>
              <p style={{fontSize:12,color:'#9CA3AF',marginTop:16}}>💡 ניתן להוסיף עוד הוצאות קבועות אחרי ההגדרה</p>
            </div>
          )}

          {step===6 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>✅ הכל מוכן, {d.name}!</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:20}}>הנה ההקצאה החודשית המומלצת עבורך:</p>
              {parseFloat(d.netSalary)>0 ? (
                <div>
                  <div style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)',borderRadius:14,padding:16,marginBottom:16}}>
                    <p style={{fontSize:13,color:'#15803d',marginBottom:4}}>שכר נטו חודשי</p>
                    <p style={{fontSize:28,fontWeight:800,color:'#14532d'}}>{fmtILS(parseFloat(d.netSalary))}</p>
                  </div>
                  {calcBudget(parseFloat(d.netSalary)).map(b=>(
                    <div key={b.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                      padding:'10px 0',borderBottom:'1px solid #f3f4f6'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{width:10,height:10,borderRadius:'50%',background:b.color,flexShrink:0,display:'inline-block'}}/>
                        <span style={{fontSize:14,color:'#374151'}}>{b.emoji} {b.key}</span>
                      </div>
                      <div style={{textAlign:'left'}}>
                        <span style={{fontSize:14,fontWeight:700,color:'#111'}}>{fmtILS(b.amount)}</span>
                        <span style={{fontSize:11,color:'#9CA3AF',marginRight:6}}>({b.pct}%)</span>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <p style={{color:'#9CA3AF',fontSize:14}}>לא הוזן שכר — ניתן להגדיר בהגדרות</p>
              )}
            </div>
          )}
        </div>

        {/* Nav buttons */}
        <div style={{display:'flex',gap:12,marginTop:20}}>
          {step>1&&(
            <button className="btn-secondary" onClick={back} style={{width:'auto',padding:'14px 24px'}}>
              ← חזור
            </button>
          )}
          <button className="btn-primary"
                  onClick={next}
                  disabled={!canNext()}
                  style={{opacity:canNext()?1:.5}}>
            {step===STEPS ? `🚀 בואו נתחיל!` : 'הבא →'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── ADD TRANSACTION MODAL ── */
function AddModal({onClose,onAdd}) {
  const [desc,setDesc]=useState('');
  const [amount,setAmount]=useState('');
  const [type,setType]=useState('expense');
  const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
  const preview=desc.length>2?categorize(desc):null;

  function submit(e){
    e.preventDefault();
    const raw=parseFloat(amount);
    if(isNaN(raw)||raw<=0) return;
    const finalAmt=type==='expense'?-(Math.round(raw*100)/100):Math.round(raw*100)/100;
    const cat=categorize(desc);
    onAdd({id:Date.now(),description:desc,amount:finalAmt,date,
           cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'ידני'});
    onClose();
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:100,
                 display:'flex',alignItems:'flex-end',justifyContent:'center'}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'white',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:500,
                   maxHeight:'90vh',overflowY:'auto'}} className="slide-up">
        <div style={{width:40,height:4,background:'#e5e7eb',borderRadius:2,margin:'12px auto'}}/>
        <div style={{padding:'0 20px 20px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <p style={{fontSize:18,fontWeight:800,margin:0}}>הוסף עסקה</p>
            <button onClick={onClose} style={{border:'none',background:'#f3f4f6',borderRadius:'50%',
              width:32,height:32,cursor:'pointer',fontSize:16}}>✕</button>
          </div>

          {/* Type toggle */}
          <div style={{display:'flex',background:'#f3f4f6',borderRadius:12,padding:4,gap:4,marginBottom:20}}>
            {[['expense','הוצאה 💸'],['income','הכנסה 💰']].map(([v,l])=>(
              <button key={v} onClick={()=>setType(v)} style={{
                flex:1,padding:'10px',border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:'pointer',
                background:type===v?'white':'transparent',
                color:type===v?(v==='expense'?'#dc2626':'#16a34a'):'#9CA3AF',
                boxShadow:type===v?'0 1px 4px rgba(0,0,0,.1)':'none'}}>
                {l}
              </button>
            ))}
          </div>

          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
            <div>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>תיאור</label>
              <input className="input" placeholder="שופרסל, וולט, ארנונה..." value={desc}
                     onChange={e=>setDesc(e.target.value)} required/>
              {preview&&<p style={{fontSize:12,color:preview.color,marginTop:4,fontWeight:600}}>
                {preview.emoji} {preview.cat}
              </p>}
            </div>
            <div>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>סכום ₪</label>
              <input className="input input-num" type="number" min="0.01" step="0.01"
                     placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)} required/>
            </div>
            <div>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>תאריך</label>
              <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}
                     style={{direction:'ltr'}}/>
            </div>
            <button type="submit" className="btn-primary">הוסף ✓</button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({profile,txs,onAdd,budgetPlan,daysToCredit,daysToSalary}) {
  const [showAdd,setShowAdd]=useState(false);
  const net=profile.netSalary||0;
  const budget=useMemo(()=>calcBudget(net,budgetPlan),[net,budgetPlan]);
  const spent=useMemo(()=>spentPerBudget(txs,budget),[txs,budget]);

  // Monthly totals
  const now=new Date();
  const thisMonth=txs.filter(t=>{const d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const monthIncome=thisMonth.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const monthSpent =Math.abs(thisMonth.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0));
  const safeToSpend=Math.max(0,net-monthSpent);
  const spendColor=safeToSpend>net*.5?'#22C55E':safeToSpend>net*.2?'#F59E0B':'#EF4444';

  // Credit card sum since last billing date (approximate)
  const creditDay=profile.creditDay||1;
  const today=now.getDate();
  const billingStart=today>=creditDay
    ? new Date(now.getFullYear(),now.getMonth(),creditDay)
    : new Date(now.getFullYear(),now.getMonth()-1,creditDay);
  const creditSum=Math.abs(txs
    .filter(t=>t.amount<0&&new Date(t.date)>=billingStart&&(t.account==='Max'||t.account==='כרטיס אשראי'))
    .reduce((s,t)=>s+t.amount,0));

  const recent=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  // Donut for budget
  const donutData=budget.map(b=>({name:b.key,value:b.amount,color:b.color,emoji:b.emoji}));

  return (
    <div>
      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${spendColor},${spendColor}cc)`,
                   padding:'28px 20px 32px',color:'white'}}>
        <p style={{opacity:.8,fontSize:13,margin:'0 0 4px'}}>שלום {profile.name} 👋 · בטוח להוציא היום</p>
        <p style={{fontSize:46,fontWeight:800,margin:'0 0 12px',lineHeight:1}}>{fmtILS(safeToSpend)}</p>
        <div style={{display:'flex',gap:20,fontSize:13,opacity:.85}}>
          <span>📥 הכנסה: {fmtILS(monthIncome||net)}</span>
          <span>📤 הוצאות: {fmtILS(monthSpent)}</span>
        </div>
      </div>

      <div style={{padding:'16px 16px 0',display:'flex',flexDirection:'column',gap:16}}>

        {/* ── Portfolio P&L card ── */}
        {(()=>{
          const port   = lsGet(LS_PORTFOLIO, {holdings:[], cash:0, history:[]});
          const cached = lsGet('fil_lp', null);
          if (!port.holdings || port.holdings.length === 0) return null;

          const livePx  = cached?.prices || {};
          const usdRate = cached?.usdIls || 3.72;
          const isLive  = cached && (Date.now() - (cached.ts||0)) < 3*60*60*1000; // stale after 3h

          // Unrealized P&L
          let costBasis=0, curValUSD=0;
          port.holdings.forEach(h=>{
            const price = livePx[h.symbol] ?? h.avgCost;
            costBasis  += h.shares * h.avgCost;
            curValUSD  += h.shares * price;
          });
          const unrealPL    = Math.round((curValUSD - costBasis)*100)/100;
          const unrealPct   = costBasis>0 ? (unrealPL/costBasis)*100 : 0;
          const unrealILS   = Math.round(unrealPL*usdRate);

          // Realized P&L (from sell history)
          const realPL = (port.history||[]).filter(h=>h.type==='sell').reduce((s,h)=>s+(h.pl||0),0);
          const realILS = Math.round(realPL*usdRate);

          // Total portfolio ILS
          const totalUSD = curValUSD + (port.cash||0);
          const totalILS = Math.round(totalUSD*usdRate);

          const pos = unrealPL>=0;
          return (
            <div style={{background:'linear-gradient(135deg,#0c1a2e,#1a2e4a)',borderRadius:16,
                         padding:'16px 18px',color:'white'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div>
                  <p style={{margin:0,fontSize:12,opacity:.65}}>
                    📊 תיק מניות{isLive?' · LIVE':''}
                  </p>
                  <p style={{margin:'3px 0 0',fontSize:22,fontWeight:800}}>
                    {'$'+(Math.round(totalUSD)).toLocaleString()}
                  </p>
                  <p style={{margin:'2px 0 0',fontSize:12,opacity:.55}}>{fmtILS(totalILS)}</p>
                </div>
                {/* Unrealized P&L */}
                <div style={{background:pos?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)',
                             borderRadius:12,padding:'10px 14px',textAlign:'left'}}>
                  <p style={{margin:0,fontSize:10,opacity:.7}}>רווח/הפסד לא ממומש</p>
                  <p style={{margin:'3px 0 0',fontSize:16,fontWeight:800,
                             color:pos?'#4ade80':'#f87171'}}>
                    {pos?'+':''}{fmtILS(unrealILS)}
                  </p>
                  <p style={{margin:'1px 0 0',fontSize:11,color:pos?'#86efac':'#fca5a5'}}>
                    {pos?'+':''}{unrealPct.toFixed(2)}% · {pos?'+':''}{unrealPL>=0?'$':'−$'}{Math.abs(unrealPL).toFixed(0)}
                  </p>
                </div>
              </div>
              {realPL!==0&&(
                <div style={{borderTop:'1px solid rgba(255,255,255,.1)',paddingTop:10,
                             display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:12,opacity:.65}}>רווח ממומש (מכירות)</span>
                  <span style={{fontSize:13,fontWeight:700,
                                color:realPL>=0?'#4ade80':'#f87171'}}>
                    {realPL>=0?'+':''}{fmtILS(realILS)} (${Math.abs(realPL).toFixed(0)})
                  </span>
                </div>
              )}
              {!isLive&&(
                <p style={{margin:'8px 0 0',fontSize:10,opacity:.4}}>
                  מחירים לא עדכניים — פתח את תיק המניות לרענון
                </p>
              )}
            </div>
          );
        })()}

        {/* Salary & Credit info strip */}
        {(profile.salaryDay||profile.creditDay)&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {profile.salaryDay&&(
              <div style={{background:'#f0fdf4',borderRadius:14,padding:'12px 14px',
                           border:'1px solid #bbf7d0'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                  <span style={{fontSize:18}}>💰</span>
                  <span style={{fontSize:12,fontWeight:700,color:'#15803d'}}>משכורת</span>
                </div>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:'#14532d'}}>
                  {daysToSalary===0?'נכנסת היום! 🎉':`בעוד ${daysToSalary} יום`}
                </p>
                <p style={{margin:'2px 0 0',fontSize:11,color:'#6B7280'}}>
                  כל ה-{profile.salaryDay} · {fmtILS(net)}
                </p>
              </div>
            )}
            {profile.creditDay&&(
              <div style={{background: daysToCredit<=3?'#fef2f2':'#fff7ed',
                           borderRadius:14,padding:'12px 14px',
                           border:`1px solid ${daysToCredit<=3?'#fecaca':'#fed7aa'}`}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                  <span style={{fontSize:18}}>💳</span>
                  <span style={{fontSize:12,fontWeight:700,color:daysToCredit<=3?'#b91c1c':'#c2410c'}}>חיוב אשראי</span>
                </div>
                <p style={{margin:0,fontSize:13,fontWeight:800,color:daysToCredit<=3?'#7f1d1d':'#7c2d12'}}>
                  {daysToCredit===0?'חיוב היום! ⚠️':`בעוד ${daysToCredit} יום`}
                </p>
                <p style={{margin:'2px 0 0',fontSize:11,color:'#6B7280'}}>
                  כל ה-{profile.creditDay}{creditSum>0?` · צבור: ${fmtILS(creditSum)}`:''}
                </p>
              </div>
            )}
          </div>
        )}

        {/* Budget overview */}
        {net>0&&(
          <div className="card" style={{padding:'16px'}}>
            <p style={{fontSize:15,fontWeight:700,margin:'0 0 12px'}}>תקציב חודשי</p>
            {budget.map(b=>{
              const s=spent[b.key]||0;
              const pct=Math.min(100,(s/b.amount)*100);
              const over=s>b.amount;
              return (
                <div key={b.key} style={{marginBottom:12}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:13,color:'#374151'}}>{b.emoji} {b.key}</span>
                    <span style={{fontSize:12,color:over?'#dc2626':'#6B7280'}}>
                      {fmtILS(s)} / {fmtILS(b.amount)}
                      {over&&<span className="tag-r" style={{marginRight:6}}>חריגה!</span>}
                    </span>
                  </div>
                  <div style={{height:6,background:'#f3f4f6',borderRadius:3}}>
                    <div style={{height:'100%',width:`${pct}%`,background:over?'#ef4444':b.color,borderRadius:3,transition:'width .5s'}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Recent transactions */}
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{padding:'14px 16px 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <p style={{fontSize:15,fontWeight:700,margin:0}}>עסקאות אחרונות</p>
          </div>
          {recent.length===0
            ? <p style={{textAlign:'center',color:'#9CA3AF',padding:'24px',fontSize:14}}>אין עסקאות עדיין — ייבא קובץ אקסל או הוסף ידנית</p>
            : recent.map(tx=><TxRow key={tx.id} tx={tx}/>)
          }
        </div>
      </div>

      {/* FAB */}
      <button onClick={()=>setShowAdd(true)} style={{
        position:'fixed',bottom:84,left:20,width:56,height:56,borderRadius:'50%',
        background:'#22C55E',color:'white',fontSize:28,border:'none',cursor:'pointer',
        boxShadow:'0 4px 20px rgba(34,197,94,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:40}}>
        +
      </button>

      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={tx=>{onAdd(tx);setShowAdd(false);}}/>}
    </div>
  );
}

/* ── TRANSACTIONS TAB ── */
function TransactionsTab({txs,onAdd,onDelete}) {
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');

/* ── OCR HELPERS ── */
function parseDateIL(s) {
  const clean=s.replace(/[.\-]/g,'/');
  const parts=clean.split('/');
  if(parts.length===3) {
    const [a,b,c]=parts.map(Number);
    const yr=c>31?c:(a>31?a:null);
    if(yr){const[d,m]=c>31?[a,b]:[b,a];const dt=new Date(yr,m-1,d);if(!isNaN(dt))return dt.toISOString().split('T')[0];}
  }
  const d=new Date(s);return isNaN(d)?null:d.toISOString().split('T')[0];
}
function parseBankOCR(text) {
  const DATE_RE  = /\b(\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4}|\d{4}[./\-]\d{2}[./\-]\d{2})\b/g;
  const AMT_RE   = /(-?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?)/g;
  const results  = [];
  const lines    = text.split('\n').map(l=>l.trim()).filter(l=>l.length>4);
  for (const line of lines) {
    const dateMatch=line.match(DATE_RE);
    if(!dateMatch) continue;
    const date=parseDateIL(dateMatch[0]);
    if(!date) continue;
    // collect amounts on this line (ignore the balance column if multiple)
    const amts=[...(line.matchAll(AMT_RE)||[])].map(m=>parseFloat(m[1].replace(/,/g,''))).filter(n=>!isNaN(n)&&Math.abs(n)>0.5);
    if(!amts.length) continue;
    // The largest-abs value is usually the transaction, smallest is often qty/shares
    const amount=amts.reduce((best,n)=>Math.abs(n)>Math.abs(best)?n:best,amts[0]);
    // description = everything after date, before first amount
    const dateEnd=line.search(DATE_RE)+dateMatch[0].length;
    const afterDate=line.slice(dateEnd).trim();
    const desc=afterDate.replace(AMT_RE,'').replace(/\s+/g,' ').trim();
    if(desc.length<2) continue;
    const cat=categorize(desc);
    results.push({id:Date.now()+results.length,description:desc,amount:Math.round(amount*100)/100,
                  date,cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'צילום מסך'});
  }
  return results;
}

/* ── GEMINI VISION OCR ── */
async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve({ data: e.target.result.split(',')[1], mime: file.type });
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const GEMINI_PROMPTS = {
  bank: `You are a financial data extractor. Extract ALL transactions visible in this bank/credit card statement screenshot.
Return ONLY a valid JSON array (no markdown, no explanation):
[{"date":"DD/MM/YYYY","description":"merchant name","amount":number}]
Rules: negative amount = expense/debit, positive = income/credit. Include every row visible.`,

  stocks: `Extract all stock/ETF holdings from this brokerage portfolio screenshot.
Return ONLY valid JSON array (no markdown):
[{"symbol":"TICKER","name":"Company Name","shares":number,"price":number}]
Use the average cost or purchase price for 'price'. If only current value shown, use that for price.`,

  keren: `Extract the total current fund value (שווי/יתרה) and YTD return percentage (תשואה) from this קרן השתלמות / גמל statement.
Return ONLY valid JSON (no markdown): {"value":number,"ytd":number}
If YTD not visible, omit the ytd field.`,

  pension: `Extract the total pension fund value (שווי/יתרה) and YTD return percentage from this pension/פנסיה statement.
Return ONLY valid JSON (no markdown): {"value":number,"ytd":number}
If YTD not visible, omit the ytd field.`,
};

function extractJSONFromText(text) {
  // Strip markdown fences
  text = text.replace(/```(?:json)?/g, '').trim();
  // Try to extract the first JSON array or object
  const arrIdx = text.indexOf('[');
  const objIdx = text.indexOf('{');
  let start = -1;
  if (arrIdx !== -1 && (objIdx === -1 || arrIdx < objIdx)) start = arrIdx;
  else if (objIdx !== -1) start = objIdx;
  if (start !== -1) text = text.slice(start);
  // Find the matching closing bracket
  const open = text[0];
  const close = open === '[' ? ']' : '}';
  let depth = 0, end = -1;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === open) depth++;
    else if (text[i] === close) { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end !== -1) text = text.slice(0, end + 1);
  return JSON.parse(text);
}

async function callGemini(file, docType, apiKey) {
  if (!apiKey) throw new Error('לא הוגדר מפתח API');

  const { data, mime } = await fileToBase64(file);

  // Try gemini-2.0-flash first, fall back to 1.5-flash
  const models = ['gemini-1.5-flash','gemini-2.0-flash','gemini-1.5-flash-latest'];
  let lastErr = null;

  for (const model of models) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const body = {
      contents: [{ parts: [
        { text: GEMINI_PROMPTS[docType] || GEMINI_PROMPTS.bank },
        { inline_data: { mime_type: mime, data } }
      ]}],
      generationConfig: { temperature: 0.1, responseMimeType: 'application/json' }
    };
    try {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });

      if (!r.ok) {
        let msg = `שגיאה ${r.status}`;
        try {
          const e = await r.json();
          const raw = e?.error?.message || '';
          if (r.status === 400) msg = `מפתח API לא תקין — ודא שהמפתח הוא מ-aistudio.google.com (${raw})`;
          else if (r.status === 403) msg = `אין הרשאה — ייתכן שה-API לא מופעל בחשבון (${raw})`;
          else if (r.status === 429) msg = 'הגעת למגבלת הבקשות — נסה שוב בעוד דקה';
          else if (r.status === 404) { lastErr = new Error(`model not found: ${model}`); continue; }
          else msg = raw || msg;
        } catch {}
        throw new Error(msg);
      }

      const d = await r.json();
      const text = d.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (!text) throw new Error('Gemini החזיר תשובה ריקה — נסה שוב');
      return extractJSONFromText(text);

    } catch (e) {
      if (e.message.includes('model not found')) { lastErr = e; continue; }
      throw e;
    }
  }
  throw lastErr || new Error('כל הדגמים נכשלו');
}

  const [keyStatus,  setKeyStatus]  = useState(null); // null | 'ok' | 'error'
  const [keyErrMsg,  setKeyErrMsg]  = useState('');
  // Ref to hold the key being tested so the save-effect always reads the right value
  // even if keyInput state changes during the async test.
  const pendingKeyRef = useRef('');

  async function testKey(key) {
    setKeyTesting(true); setKeyStatus(null); setKeyErrMsg('');
    try {
      // Lightweight text-only call — no image needed
      const models = ['gemini-1.5-flash','gemini-2.0-flash','gemini-1.5-flash-latest'];
      let ok = false;
      for (const model of models) {
        const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
        const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:'Reply with the single word OK.'}]}],
                               generationConfig:{maxOutputTokens:5}})});
        if(r.ok){ ok=true; break; }
        if(r.status===404) continue; // try next model
        const e=await r.json().catch(()=>({}));
        const msg=e?.error?.message||'';
        if(r.status===400||r.status===401||r.status===403){
          setKeyErrMsg(r.status===400?`מפתח לא תקין — ודא שהעתקת מ-aistudio.google.com (${r.status})`
                      :`שגיאת הרשאה — המפתח שגוי או לא מוגדר (${r.status}: ${msg})`);
          setKeyStatus('error'); setKeyTesting(false); return;
        }
        setKeyErrMsg(`שגיאה ${r.status}: ${msg}`); setKeyStatus('error'); setKeyTesting(false); return;
      }
      if(ok){ setKeyStatus('ok'); }
      else { setKeyErrMsg('המודלים לא זמינים — נסה שוב'); setKeyStatus('error'); }
    } catch(e) {
      setKeyErrMsg('שגיאת רשת: '+e.message); setKeyStatus('error');
    }
    setKeyTesting(false);
  }

  async function saveKey(k) {
    const key=k||keyInput.trim(); if(!key) return;
    // Store the key in a ref so the effect below always reads the correct value
    // regardless of any React re-renders that may flush between now and then.
    pendingKeyRef.current=key;
    await testKey(key);
  }
  // Save after a successful test — reads from ref, not from potentially-stale closure
  useEffect(()=>{
    if(keyStatus==='ok'&&pendingKeyRef.current){
      const key=pendingKeyRef.current;
      pendingKeyRef.current='';
      lsSet(LS.GEMINI,key); setApiKey(key); setKeyInput(''); setShowKey(false);
    }
  },[keyStatus]);

  function reset() { setStage('type');setDocType(null);setImgUrl(null);setImgFile(null);setResult(null);setErr(null);setProg('');
    setRows([{id:1,description:'',amount:'',date:new Date().toISOString().split('T')[0]}]); }

  async function handleFile(file) {
    if(!file.type.startsWith('image/')) return;
    setImgUrl(URL.createObjectURL(file)); setImgFile(file);
    if(!apiKey){ setStage('preview'); return; } // no key → go straight to manual
    setStage('scanning'); setErr(null); setProg('שולח ל-Gemini AI...');
    try {
      const data = await callGemini(file, docType, apiKey);
      setResult(data);
      setProg('');
      setStage('preview');
    } catch(e) {
      setErr('שגיאה: ' + e.message);
      setStage('preview');
    }
  }

  function confirmResult() {
    if(docType==='bank'||!docType) {
      // result is array of transactions

               amount:Math.round(parseFloat(r.amount)*100)/100,
               date:r.date,cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'צילום מסך'};

              style={{color:'#4ade80',textDecoration:'underline'}}>aistudio.google.com/apikey</a>

              </div>

                    <p style={{fontWeight:700,fontSize:13,margin:'0 0 10px'}}>✅ Gemini זיהה {stockRows.length} ני"ע:</p>
                    {stockRows.map((h,i)=>(

                        <span style={{color:'#6B7280',flex:1,padding:'0 8px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.name}</span>

                      </div>

                  </div>

                {stockRows.length===0&&(
                  <div className="card" style={{padding:14,marginBottom:12}}>
                    <p style={{fontWeight:700,fontSize:13,margin:'0 0 10px'}}>הזן ני"ע ידנית מהתמונה:</p>
                    {rows.map(r=>(
                      <div key={r.id} style={{display:'grid',gridTemplateColumns:'80px 1fr 80px 80px 32px',gap:6,marginBottom:8}}>
                        <input className="input" placeholder="סימול" value={r.symbol||''} onChange={e=>editRow(r.id,'symbol',e.target.value.toUpperCase())} style={{fontSize:12,padding:'8px 8px',direction:'ltr'}}/>
                        <input className="input" placeholder="שם חברה" value={r.name||''} onChange={e=>editRow(r.id,'name',e.target.value)} style={{fontSize:12,padding:'8px 8px'}}/>
                        <input className="input input-num" type="number" step="0.001" placeholder="כמות" value={r.shares||''} onChange={e=>editRow(r.id,'shares',e.target.value)} style={{fontSize:12,padding:'8px 6px'}}/>
                        <input className="input input-num" type="number" step="0.01" placeholder="מחיר$" value={r.price||''} onChange={e=>editRow(r.id,'price',e.target.value)} style={{fontSize:12,padding:'8px 6px'}}/>
                        <button onClick={()=>delRow(r.id)} style={{border:'none',background:'#fee2e2',color:'#dc2626',borderRadius:8,cursor:'pointer',fontSize:14}}>✕</button>

          {/* ── KEREN / PENSION: separate component (hooks cannot live in JSX IIFE) ── */}
          {(docType==='keren'||docType==='pension')&&(
            <KerenPensionForm docType={docType} geminiResult={result} onUpdate={setResult}/>
          )}

          <div style={{display:'flex',gap:10}}>
            <button className="btn-secondary" onClick={()=>{setStage('upload');setResult(null);setErr(null);setRows([{id:1,description:'',amount:'',date:new Date().toISOString().split('T')[0]}]);}}

  );
}

/* ── EXCEL IMPORT (own component — hooks must not follow conditional returns) ── */
function ExcelImport({onImport, onBack}) {
  const [stage,setStage]=useState('upload');
  const [rows,setRows]=useState([]);
  const [cols,setCols]=useState({date:-1,desc:-1,debit:-1,credit:-1,amount:-1});
  const [preview,setPreview]=useState([]);
  const [err,setErr]=useState(null);
  const fileRef=useRef();

  async function handleFile(file) {
    setErr(null);
    if (typeof XLSX === 'undefined') {
      setErr('⏳ טוען ספריית Excel... נסה שוב בעוד שנייה');
      try {
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
          s.onload=res; s.onerror=rej;
          document.head.appendChild(s);
        });
        setErr(null);
      } catch { setErr('לא ניתן לטעון ספריית Excel — בדוק חיבור אינטרנט'); return; }
    }
    try {
      let wb;
      if(file.name.toLowerCase().endsWith('.csv')||file.type==='text/csv'||file.type==='text/plain'){
        const text=await file.text();
        wb=XLSX.read(text,{type:'string',raw:false});
      } else {
        const buf=await file.arrayBuffer();
        wb=XLSX.read(buf,{type:'array',cellDates:true});
      }
      if(!wb.SheetNames.length) throw new Error('הקובץ לא מכיל גיליונות');
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const clean=data.filter(r=>r.some(c=>String(c).trim()!==''));
      if(!clean.length) throw new Error('הקובץ ריק');
      setRows(clean);
      const hdr=clean[0].map(c=>String(c).toLowerCase().trim().replace(/\s+/g,' '));
      const find=(...terms)=>hdr.findIndex(h=>terms.some(t=>h.includes(t)));
      setCols({
        // Date: try specific then general
        date:  find('תאריך ביצוע','תאריך עסקה','תאריך פעולה','תאריך','date','transaction date'),
        // Description: merchant/memo
        desc:  find('שם בית עסק','שם בעסק','שם מקור','פירוט','תיאור','אסמכתא','description','merchant','details'),
        // Debit (expense): Israeli banks use חיוב or חובה
        debit: find('חיוב בש"ח','סכום חיוב','חיוב','חובה','הוצאה','debit','withdrawal','minus'),
        // Credit (income): זכות or זכאות
        credit:find('זכות בש"ח','סכום זכות','זכות','זכאות','הכנסה','credit','deposit','plus'),
        // Single amount column (Max, some bank formats)
        amount:find('סכום עסקה','סכום בש"ח','סכום','amount','transaction amount'),
      });
      setStage('map');
    } catch(e) { setErr('שגיאה בקריאת הקובץ: '+e.message); }
  }

  // Parse a cell value as a number, handling various Israeli bank formats
  function parseAmount(cell) {
    if(cell===null||cell===undefined||cell==='') return 0;
    if(typeof cell==='number') return cell; // XLSX already parsed as number
    let s=String(cell).trim();
    const negative=s.startsWith('(')&&s.endsWith(')'); // accounting format (1,234)
    s=s.replace(/[()]/g,'').replace(/,(?=\d{3})/g,''); // remove parens + thousand-sep commas
    // Handle European decimal comma: 1.234,56 → if comma before 2 digits at end, swap
    if(/^\d{1,3}(\.\d{3})+(,\d{1,2})?$/.test(s)) s=s.replace(/\./g,'').replace(',','.');
    s=s.replace(/[^\d.-]/g,''); // strip currency symbols etc.
    const n=parseFloat(s)||0;
    return negative ? -Math.abs(n) : n;
  }

  function buildPreview() {
    const parsed=[];
    const hdrRow=rows[0]||[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      let amount=0;
      if(cols.amount>=0){
        amount=parseAmount(row[cols.amount]);
      } else {
        const cr=parseAmount(row[cols.credit]);
        const db=parseAmount(row[cols.debit]);
        amount=cr!==0?Math.abs(cr):(db!==0?-Math.abs(db):0);
      }
      const rawDate=row[cols.date];
      let date;
      if(rawDate instanceof Date) date=rawDate.toISOString().split('T')[0];
      else {
        // parseDateIL handles DD/MM/YYYY and DD.MM.YYYY used by Israeli banks.
        // new Date(string) fails for those formats in V8 (returns Invalid Date).
        date=parseDateIL(String(rawDate))||new Date().toISOString().split('T')[0];
      }
      const desc=String(row[cols.desc]||'').trim();
      if(!desc||amount===0) continue;
      const cat=categorize(desc);
      parsed.push({id:Date.now()+i,description:desc,amount:Math.round(amount*100)/100,
                   date,cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'ייבוא'});
    }
    setPreview(parsed);
    setStage('preview');
  }

  const hdrRow=rows[0]||[];

  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
      <button onClick={onBack} style={{border:'none',background:'none',color:'#22C55E',
        fontSize:14,fontWeight:700,cursor:'pointer',padding:0,marginBottom:-8}}>← חזור לבחירת שיטה</button>

      {stage==='upload'&&(
        <div>
          <div className="card" style={{padding:32,textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>📥</div>
            <p style={{fontSize:18,fontWeight:700,marginBottom:8}}>ייבא קובץ עסקאות</p>
            <p style={{fontSize:13,color:'#6B7280',marginBottom:24,lineHeight:1.6}}>
              מבנק הפועלים, לאומי, דיסקונט, Max ועוד.<br/>Excel (xlsx/xls) או CSV
            </p>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.CSV"
                   style={{display:'none'}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
            <button className="btn-primary" onClick={()=>fileRef.current.click()}>📂 בחר קובץ</button>
            <div onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='#22C55E';}}
                 onDragLeave={e=>{e.currentTarget.style.borderColor='#e5e7eb';}}
                 onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='#e5e7eb';
                             e.dataTransfer.files[0]&&handleFile(e.dataTransfer.files[0]);}}
                 style={{border:'2px dashed #e5e7eb',borderRadius:14,padding:24,marginTop:16,
                         color:'#9CA3AF',fontSize:13,transition:'border-color .2s'}}>
              או גרור קובץ לכאן
            </div>
            {err&&<p style={{color:'#dc2626',fontSize:13,marginTop:12}}>{err}</p>}
          </div>
          <div className="card" style={{padding:16}}>
            <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>📋 איך להוריד קובץ מהבנק?</p>
            {[
              {bank:'בנק הפועלים',steps:'תנועות בחשבון → ייצוא → Excel'},
              {bank:'בנק לאומי',  steps:'תנועות → ייצוא → Excel'},
              {bank:'Max',        steps:'עסקאות → הורד דוח → Excel'},
            ].map(b=>(
              <div key={b.bank} style={{borderBottom:'1px solid #f3f4f6',padding:'8px 0',fontSize:12}}>
                <span style={{fontWeight:600,color:'#374151'}}>{b.bank}: </span>
                <span style={{color:'#6B7280'}}>{b.steps}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {stage==='map'&&(
        <div>
          <p style={{fontSize:17,fontWeight:700,margin:'0 0 4px'}}>🗂️ מיפוי עמודות</p>
          <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>בחר איזו עמודה מכילה כל נתון:</p>
          <div className="card" style={{overflowX:'auto',marginBottom:16}}>
            <table style={{fontSize:11,borderCollapse:'collapse',width:'100%'}}>
              <thead><tr style={{background:'#f9fafb'}}>
                {hdrRow.map((h,i)=><th key={i} style={{padding:'6px 8px',borderBottom:'1px solid #e5e7eb',textAlign:'right',whiteSpace:'nowrap',fontWeight:700,color:'#374151'}}>{String(h)}</th>)}
              </tr></thead>
              <tbody>{rows.slice(1,4).map((r,i)=>(
                <tr key={i} style={{borderBottom:'1px solid #f3f4f6'}}>
                  {r.map((c,j)=><td key={j} style={{padding:'6px 8px',color:'#6B7280',whiteSpace:'nowrap'}}>{String(c).slice(0,20)}</td>)}
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>
            {[
              {key:'date',  label:'📅 תאריך'},
              {key:'desc',  label:'📝 תיאור עסקה'},
              {key:'amount',label:'💰 סכום (עמודה אחת)'},
              {key:'debit', label:'📤 חיוב / הוצאה'},
              {key:'credit',label:'📥 זכות / הכנסה'},
            ].map(f=>(
              <div key={f.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <label style={{fontSize:13,fontWeight:600,color:'#374151'}}>{f.label}</label>
                <select value={cols[f.key]} onChange={e=>setCols(c=>({...c,[f.key]:parseInt(e.target.value)}))}
                        style={{border:'1px solid #e5e7eb',borderRadius:8,padding:'6px 10px',fontSize:13,background:'white',minWidth:130}}>
                  <option value={-1}>— לא רלוונטי</option>
                  {hdrRow.map((h,i)=><option key={i} value={i}>{String(h)||`עמודה ${i+1}`}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:12,marginTop:16}}>
            <button className="btn-secondary" onClick={()=>setStage('upload')} style={{width:'auto',padding:'14px 20px'}}>← חזור</button>
            <button className="btn-primary" onClick={buildPreview}
                    disabled={cols.desc<0||(cols.amount<0&&cols.debit<0&&cols.credit<0)||cols.date<0}>
              תצוגה מקדימה →
            </button>
          </div>
        </div>
      )}

      {stage==='preview'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <p style={{fontSize:17,fontWeight:700,margin:0}}>✅ תצוגה מקדימה</p>
              <p style={{fontSize:13,color:'#6B7280',margin:'2px 0 0'}}>{preview.length} עסקאות זוהו</p>
            </div>
            <button className="btn-secondary" onClick={()=>setStage('map')} style={{width:'auto',padding:'8px 14px',fontSize:13}}>← חזור</button>
          </div>
          <div className="card" style={{overflow:'hidden',marginBottom:16}}>
            {preview.slice(0,20).map(tx=><TxRow key={tx.id} tx={tx}/>)}
            {preview.length>20&&<p style={{textAlign:'center',fontSize:12,color:'#9CA3AF',padding:12}}>ועוד {preview.length-20} עסקאות...</p>}
          </div>
          <button className="btn-primary" onClick={()=>{onImport(preview);setStage('done');}}>
            ייבא {preview.length} עסקאות ←
          </button>
        </div>
      )}

      {stage==='done'&&(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div style={{fontSize:60,marginBottom:16}}>🎉</div>
          <p style={{fontSize:20,fontWeight:800,marginBottom:8}}>הייבוא הושלם!</p>
          <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>{preview.length} עסקאות יובאו בהצלחה</p>
          <button className="btn-primary" onClick={()=>setStage('upload')}>ייבא קובץ נוסף</button>
        </div>
      )}
    </div>
  );
}

          האלטרנטיבות הטובות ביותר:
        </p>

/* ── Finnhub: מחירי מניות חיים (דורש מפתח חינמי מ-finnhub.io) ── */
async function fetchFinnhubQuote(symbol, apiKey) {
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${apiKey}`);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  if (!d || d.c <= 0) throw new Error('no price');
  return { price: d.c, changePct: typeof d.dp === 'number' ? d.dp : 0 };
}

async function fetchFinnhubProfile(symbol, apiKey) {
  try {
    const r = await fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${symbol}&token=${apiKey}`);
    const d = await r.json();
    return d?.name || symbol;
  } catch { return symbol; }
}

async function fetchUsdIlsRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    if (d?.rates?.ILS) return d.rates.ILS;
  } catch {}
  return 3.72;
}

/* ── STOCK PORTFOLIO (buy/sell/liquid + live prices) ── */
const LS_PORTFOLIO = 'fil_portfolio';
const DEFAULT_USD_ILS = 3.72;

function PortfolioSection() {
  const [holdings, setHoldings] = useState(()=>lsGet(LS_PORTFOLIO,{holdings:[],cash:0}).holdings||[]);
  const [cash,     setCash]     = useState(()=>lsGet(LS_PORTFOLIO,{holdings:[],cash:0}).cash||0);
  const [mode,     setMode]     = useState('view');
  const [form,     setForm]     = useState({symbol:'',name:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
  const [sellForm, setSellForm] = useState({holdingId:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
  const [depositAmt, setDepositAmt] = useState('');
  const [subTab,   setSubTab]   = useState('holdings');
  const [history,  setHistory]  = useState(()=>lsGet(LS_PORTFOLIO,{}).history||[]);

  // ── Live price state ──
  const [apiKey,    setApiKey]    = useState(()=>lsGet(LS.FINNHUB,''));
  const [keyInput,  setKeyInput]  = useState('');
  const [showKey,   setShowKey]   = useState(false);
  const [livePrices,setLivePrices]= useState({});
  const [dayChanges,setDayChanges]= useState({});
  const [usdIls,    setUsdIls]    = useState(DEFAULT_USD_ILS);
  const [liveMode,  setLiveMode]  = useState(false);
  const [fetching,  setFetching]  = useState(false);
  const [fetchErr,  setFetchErr]  = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  // ── Symbol auto-lookup ──
  const [lookup,    setLookup]    = useState({status:'idle',price:null,name:'',chg:null}); // idle|loading|found|error
  const lookupTimer = useRef(null);

  async function doFetch(key) {
    const k = key || apiKey;
    if (!k) { setFetchErr('אין מפתח API — הזן מפתח Finnhub'); return; }
    if (!holdings.length) { setFetchErr(null); return; }
    setFetching(true); setFetchErr(null);
    const syms=[...new Set(holdings.map(h=>h.symbol))];
    const p={}, c={};
    let ok=0, lastErr='';
    for (const sym of syms) {
      try {
        const q = await fetchFinnhubQuote(sym, k);
        p[sym]=q.price; c[sym]=q.changePct; ok++;
      } catch(e) { lastErr = e.message || String(e); }
    }
    if(ok>0){
      setLivePrices(p); setDayChanges(c); setLiveMode(true); setLastFetch(new Date());
      setFetchErr(null);
      // persist for Dashboard to read without re-fetching
      lsSet('fil_lp', {prices:p, usdIls, ts:Date.now()});
    } else {
      const hint = lastErr.includes('401')||lastErr.includes('403') ? 'מפתח API שגוי'
                 : lastErr.includes('429') ? 'יותר מדי בקשות — נסה שוב עוד דקה'
                 : 'בדוק חיבור אינטרנט ומפתח API';
      setFetchErr(`שגיאה: ${hint} (${lastErr})`);
    }
    setFetching(false);
  }

  // on mount: fetch exchange rate + prices
  useEffect(()=>{
    fetchUsdIlsRate().then(r=>setUsdIls(r));
    if(apiKey && holdings.length>0) doFetch(apiKey);
  },[]);

  // re-fetch when holdings change (new stock added) and key exists
  useEffect(()=>{
    if(apiKey && holdings.length>0) doFetch(apiKey);
  },[holdings.length]);

  // auto-refresh every 60s when live
  useEffect(()=>{
    if(!liveMode||!apiKey) return;
    const id=setInterval(()=>doFetch(apiKey),60000);
    return()=>clearInterval(id);
  },[liveMode,apiKey,holdings.length]);

  // ── Debounced symbol lookup when typing in the Buy form ──
  useEffect(()=>{
    const sym=form.symbol.trim();
    if(!sym){ setLookup({status:'idle',price:null,name:'',chg:null}); return; }
    clearTimeout(lookupTimer.current);
    setLookup(l=>({...l,status:'loading'}));
    lookupTimer.current=setTimeout(async()=>{
      try {
        if(!apiKey) throw new Error('no key');
        const [q, companyName] = await Promise.all([
          fetchFinnhubQuote(sym, apiKey),
          fetchFinnhubProfile(sym, apiKey),
        ]);
        setLookup({status:'found',price:q.price,name:companyName,chg:q.changePct});
        setForm(f=>({ ...f, price: q.price.toFixed(2), name: f.name||companyName }));
      } catch {
        setLookup({status:'error',price:null,name:'',chg:null});
      }
    },750);
    return()=>clearTimeout(lookupTimer.current);
  },[form.symbol, apiKey]);

  async function saveKey(){
    const k=keyInput.trim(); if(!k) return;
    // Test the key with a known liquid stock before saving
    setFetching(true); setFetchErr(null);
    try {
      await fetchFinnhubQuote('AAPL', k); // quick test
      lsSet(LS.FINNHUB, k);
      setApiKey(k); setKeyInput(''); setShowKey(false);
      setFetching(false);
      doFetch(k);
    } catch(e) {
      setFetching(false);
      const msg = String(e.message||e);
      setFetchErr(
        msg.includes('401')||msg.includes('403') ? '⛔ מפתח שגוי — בדוק שהעתקת נכון מ-finnhub.io'
        : `⛔ שגיאה בבדיקת המפתח: ${msg}`
      );
    }
  }
  function clearKey(){lsSet(LS.FINNHUB,'');setApiKey('');setLiveMode(false);setLivePrices({});setDayChanges({});}

  // computed rows with live or fallback price
  const rows=useMemo(()=>holdings.map(h=>{
    const lp=livePrices[h.symbol];
    const price=lp??h.avgCost;
    const live=lp!==undefined;
    const costBasis=Math.round(h.shares*h.avgCost*100)/100;
    const valUSD=Math.round(h.shares*price*100)/100;
    const valILS=Math.round(valUSD*usdIls*100)/100;
    const plUSD=Math.round((valUSD-costBasis)*100)/100;
    const plPct=costBasis>0?(plUSD/costBasis)*100:0;
    const dayChg=dayChanges[h.symbol]??null;
    return{...h,price,live,costBasis,valUSD,valILS,plUSD,plPct,dayChg};
  }),[holdings,livePrices,dayChanges,usdIls]);

  const totalCostBasis = rows.reduce((s,r)=>s+r.costBasis, 0);
  const totalValUSD    = rows.reduce((s,r)=>s+r.valUSD, 0);
  const totalPortUSD   = Math.round((totalValUSD + cash)*100)/100;   // stocks + cash, all USD
  const totalPortILS   = Math.round(totalPortUSD*usdIls*100)/100;
  const totalPL        = Math.round((totalValUSD-totalCostBasis)*100)/100;
  const totalPLPct     = totalCostBasis>0 ? (totalPL/totalCostBasis)*100 : 0;
  const donutData      = rows.map(r=>({name:r.symbol, value:r.valUSD, color:r.color, emoji:''}));
  const fmtUSD = n => '$' + (Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});

  function persist(h,c,hist) {
    lsSet(LS_PORTFOLIO,{holdings:h,cash:c,history:hist||history});
  }

  function deposit() {
    const amt=parseFloat(depositAmt); if(isNaN(amt)||amt<=0) return;
    const newCash=Math.round((cash+amt)*100)/100;
    const hist=[{id:Date.now(),type:'deposit',amount:amt,date:new Date().toISOString().split('T')[0]},...history];
    setCash(newCash); setHistory(hist); persist(holdings,newCash,hist);
    setDepositAmt(''); setMode('view');
  }

  function buy() {
    const shares=parseFloat(form.shares), price=parseFloat(form.price);
    if(!form.symbol||isNaN(shares)||isNaN(price)||shares<=0||price<=0) return;
    const cost=Math.round(shares*price*100)/100;
    const existing=holdings.find(h=>h.symbol.toUpperCase()===form.symbol.toUpperCase());
    let newHoldings;
    if (existing) {
      const totalShares=existing.shares+shares;
      const avgCost=Math.round(((existing.avgCost*existing.shares)+(price*shares))/totalShares*100)/100;
      newHoldings=holdings.map(h=>h.id===existing.id?{...h,shares:totalShares,avgCost}:h);
    } else {
      newHoldings=[...holdings,{id:Date.now(),symbol:form.symbol.toUpperCase(),
        name:form.name||form.symbol.toUpperCase(),shares,avgCost:price,
        color:'#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')}];
    }
    // Cash is NOT deducted — stocks are bought with the user's own external money
    const hist=[{id:Date.now(),type:'buy',symbol:form.symbol.toUpperCase(),shares,price,cost,date:form.date},...history];
    setHoldings(newHoldings); setHistory(hist);
    persist(newHoldings, cash, hist);
    setForm({symbol:'',name:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
    setMode('view');
  }

  function sell() {
    const h=holdings.find(x=>x.id===parseInt(sellForm.holdingId));
    if(!h) return;
    const shares=parseFloat(sellForm.shares), price=parseFloat(sellForm.price);
    if(isNaN(shares)||isNaN(price)||shares<=0||price<=0||shares>h.shares) return;
    const proceeds=Math.round(shares*price*100)/100;
    const pl=Math.round((price-h.avgCost)*shares*100)/100;
    let newHoldings;
    if(shares===h.shares) newHoldings=holdings.filter(x=>x.id!==h.id);
    else newHoldings=holdings.map(x=>x.id===h.id?{...x,shares:Math.round((x.shares-shares)*100000)/100000}:x);
    // Cash is NOT updated on sell — proceeds go back to user's real account
    const hist=[{id:Date.now(),type:'sell',symbol:h.symbol,shares,price,proceeds,pl,date:sellForm.date},...history];
    setHoldings(newHoldings); setHistory(hist);
    persist(newHoldings, cash, hist);
    setSellForm({holdingId:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
    setMode('view');
  }

  const totalCost = holdings.reduce((s,h)=>s+h.shares*h.avgCost,0);

  return (
    <div>
      {/* ── API Key panel ── */}
      {/* ── API key setup — shown prominently when no key ── */}
      {!apiKey && (
        <div style={{background:'linear-gradient(135deg,#1e3a5f,#0f172a)',borderRadius:20,
                     padding:24,marginBottom:16,color:'white'}}>
          <p style={{fontSize:18,fontWeight:800,margin:'0 0 6px'}}>🔑 הגדרה נדרשת</p>
          <p style={{fontSize:13,opacity:.8,margin:'0 0 20px',lineHeight:1.6}}>
            מחירי מניות בזמן אמת דורשים מפתח API חינמי מ-Finnhub.<br/>
            ההרשמה לוקחת פחות מ-30 שניות — חינם לגמרי.
          </p>

          <div style={{background:'rgba(255,255,255,.1)',borderRadius:14,padding:16,marginBottom:16}}>
            {[
              {n:1, txt:'לחץ כאן להרשמה חינמית', link:'https://finnhub.io/register'},
              {n:2, txt:'אשר את האימייל'},
              {n:3, txt:'העתק את המפתח מה-Dashboard'},
              {n:4, txt:'הדבק אותו למטה 👇'},
            ].map(s=>(
              <div key={s.n} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{width:24,height:24,borderRadius:'50%',background:'#22C55E',color:'white',
                              display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,
                              fontWeight:800,flexShrink:0}}>{s.n}</span>
                {s.link
                  ? <a href={s.link} target="_blank" rel="noopener"
                       style={{color:'#4ade80',fontWeight:700,fontSize:14,textDecoration:'underline'}}>{s.txt}</a>
                  : <span style={{fontSize:14,opacity:.9}}>{s.txt}</span>}
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:8}}>
            <input value={keyInput} onChange={e=>setKeyInput(e.target.value)}
                   onKeyDown={e=>e.key==='Enter'&&saveKey()}
                   placeholder="c_xxxxxxxxxxxxxxxxxxxxxxxx"
                   style={{flex:1,background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',
                           borderRadius:12,padding:'12px 14px',color:'white',fontSize:14,
                           direction:'ltr',fontFamily:'monospace',outline:'none'}}
                   autoFocus/>
            <button onClick={saveKey} disabled={!keyInput.trim()}
                    style={{background:'#22C55E',border:'none',borderRadius:12,padding:'12px 20px',
                            color:'white',fontWeight:800,fontSize:15,cursor:'pointer',
                            opacity:keyInput.trim()?1:.4}}>
              שמור ✓

          {fetchErr&&(

            </p>

          <p style={{fontSize:11,opacity:.5,marginTop:8,direction:'ltr',textAlign:'left'}}>
            Supported: NYSE · NASDAQ · LSE · Israeli stocks (TEVA, CHKP, NICE, ICL)
          </p>
        </div>

      {/* API key already set — small management row */}
      {apiKey && !showKey && (
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,
                     background:'#f0fdf4',borderRadius:12,padding:'8px 14px',fontSize:12}}>

            {liveMode ? `✅ מחירים חיים · עודכן ${new Intl.DateTimeFormat('he-IL',{hour:'2-digit',minute:'2-digit'}).format(lastFetch)}`

      )}

      {showKey && apiKey && (

          <p style={{fontWeight:700,fontSize:13,margin:'0 0 8px'}}>🔑 החלפת מפתח Finnhub</p>
          <div style={{display:'flex',gap:8}}>
            <input className="input" placeholder="c_xxxxxxxxxxxxxxxx" value={keyInput}

            <button className="btn-secondary" onClick={()=>setShowKey(false)} style={{width:'auto',padding:'12px 12px'}}>✕</button>
          </div>
        </div>
      )}

      {(
        !apiKey&&holdings.length>0&&(

            borderRadius:14,padding:'12px 14px',marginBottom:14,cursor:'pointer',

              <p style={{margin:'6px 0 0',fontSize:13,fontWeight:700,

            {liveMode&&(
              <span style={{background:'#22C55E',fontSize:10,padding:'2px 7px',borderRadius:10,
                            fontWeight:700,color:'white'}}>🔴 LIVE</span>
            )}
            {apiKey&&!liveMode&&!fetching&&(
              <span style={{background:'rgba(255,255,255,.2)',fontSize:10,padding:'2px 7px',
                            borderRadius:10,color:'white'}}>DEMO</span>
            )}
          </div>
        </div>
        {lastFetch&&(
          <p style={{color:'rgba(255,255,255,.45)',fontSize:10,margin:'0 0 10px'}}>
            עודכן: {new Intl.DateTimeFormat('he-IL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}).format(lastFetch)}
            {' · '}$1 = ₪{usdIls.toFixed(3)} · מתרענן אוטומטית כל 60 שניות
          </p>
        )}
        {fetchErr&&<p style={{color:'#fca5a5',fontSize:12,margin:'0 0 10px'}}>{fetchErr}</p>}
