<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>FinanceIL</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Heebo','sans-serif']}}}};</script>
  <style>
    *{font-family:'Heebo','Segoe UI',sans-serif;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:#f0f4f8;margin:0;overscroll-behavior:none;}
    @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .slide-up{animation:slideUp .3s ease}
    .fade-in{animation:fadeIn .25s ease}
    .spin{animation:spin .8s linear infinite;display:inline-block}
    .card{background:#fff;border-radius:20px;border:1px solid #e5e7eb;}
    .btn-primary{background:#22C55E;color:#fff;border:none;border-radius:14px;padding:14px 24px;
                 font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:background .15s;}
    .btn-primary:active{background:#16a34a;}
    .btn-secondary{background:#f3f4f6;color:#374151;border:none;border-radius:14px;padding:14px 24px;
                   font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;}
    .btn-secondary:active{background:#e5e7eb;}
    .input{width:100%;border:1.5px solid #e5e7eb;border-radius:12px;padding:13px 16px;
           font-size:16px;outline:none;transition:border-color .15s;background:#fff;}
    .input:focus{border-color:#22C55E;}
    .input-num{direction:ltr;text-align:right;}
    .tag-g{background:#dcfce7;color:#16a34a;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
    .tag-r{background:#fee2e2;color:#dc2626;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    /* bottom nav safe area */
    .main-content{padding-bottom:calc(72px + env(safe-area-inset-bottom));}
    .bottom-nav{padding-bottom:env(safe-area-inset-bottom);}
  </style>
</head>
<body>
<div id="root" style="min-height:100vh"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── LS ── */
const LS = {
  DONE:'fil_done', PROFILE:'fil_profile', TX:'fil_tx',
  RECURRING:'fil_rec', INV:'fil_inv', FINNHUB:'fil_fh',
  BUDGET:'fil_budget',
};
const LS_ALL_KEYS = [...Object.values(LS), 'fil_portfolio','fil_savings','fil_mm_list','fil_budget'];
const lsGet = (k,fb) => { try{ const v=localStorage.getItem(k); return v!==null?JSON.parse(v):fb; }catch{ return fb; } };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };
const lsClear = () => LS_ALL_KEYS.forEach(k=>localStorage.removeItem(k));

/* ── CATEGORIES ── */
const CAT_RULES = [
  {kw:['שופרסל','רמי לוי','ויקטורי','מגה','יינות ביתן','אושר עד','rami levy','mega'],     cat:'סופרמרקט',      color:'#22C55E',emoji:'🛒'},
  {kw:['וולט','wolt','מקדונלד','mcdonald','קפה','cafe','coffee','מסעדה','פיצה','pizza','סושי','בורגר'],  cat:'מסעדות וקפה',  color:'#F97316',emoji:'🍽️'},
  {kw:['ארנונה','עיריית','municipality'],                                                  cat:'ארנונה',         color:'#8B5CF6',emoji:'🏛️'},
  {kw:['hot','הוט','netflix','נטפליקס','spotify','ספוטיפיי','yes','יס','disney','apple tv'], cat:'בידור',         color:'#EC4899',emoji:'🎬'},
  {kw:['partner','פרטנר','cellcom','סלקום','פלאפון','pelephone','bezeq','בזק'],            cat:'תקשורת',         color:'#06B6D4',emoji:'📱'},
  {kw:['paz','פז','sonol','סונול','דלק','fuel'],                                           cat:'דלק ורכב',       color:'#84CC16',emoji:'⛽'},
  {kw:['אגד','דן','רב-קו','rav-kav','רכבת','גט','taxi','חניה','parking'],                  cat:'תחבורה',         color:'#3B82F6',emoji:'🚌'},
  {kw:['חברת החשמל','iec','מים','ועד בית'],                                               cat:'חשבונות בית',    color:'#EAB308',emoji:'💡'},
  {kw:['ביטוח','הראל','מנורה','כלל','מגדל','איילון'],                                     cat:'ביטוח',          color:'#6366F1',emoji:'🛡️'},
  {kw:['מכבי','כללית','לאומית','סופר-פארם','super pharm','תרופות'],                        cat:'בריאות',         color:'#14B8A6',emoji:'🏥'},
  {kw:['amazon','אמזון','aliexpress','ebay','זארה','zara','h&m','קסטרו','קניון'],          cat:'קניות',          color:'#F59E0B',emoji:'🛍️'},
  {kw:['משכורת','שכר','הכנסה','income','salary','bonus','בונוס'],                         cat:'הכנסה',          color:'#10B981',emoji:'💰'},
  {kw:['שכר דירה','שכירות','mortgage','משכנתה'],                                          cat:'דיור',           color:'#64748B',emoji:'🏠'},
];
const DEF_CAT = {cat:'אחר',color:'#9CA3AF',emoji:'📦'};

function categorize(desc) {
  if (!desc||typeof desc!=='string') return {...DEF_CAT};
  const low = desc.toLowerCase().trim();
  for (const r of CAT_RULES)
    for (const kw of r.kw)
      if (low.includes(kw.toLowerCase()))
        return {cat:r.cat,color:r.color,emoji:r.emoji};
  return {...DEF_CAT};
}

/* ── BUDGET CALC ── */
const DEFAULT_BUDGET_PLAN = [
  {key:'דיור',       pct:30, color:'#64748B', emoji:'🏠'},
  {key:'מזון ושוק',  pct:15, color:'#22C55E', emoji:'🛒'},
  {key:'תחבורה',     pct:10, color:'#3B82F6', emoji:'🚌'},
  {key:'חשבונות',    pct:8,  color:'#EAB308', emoji:'💡'},
  {key:'בריאות',     pct:5,  color:'#14B8A6', emoji:'🏥'},
  {key:'בידור',      pct:7,  color:'#EC4899', emoji:'🎬'},
  {key:'חיסכון',     pct:15, color:'#F59E0B', emoji:'💰'},
  {key:'שונות',      pct:10, color:'#9CA3AF', emoji:'📦'},
];
const CAT_TO_BUDGET = {
  'סופרמרקט':'מזון ושוק','מסעדות וקפה':'בידור','ארנונה':'חשבונות',
  'בידור':'בידור','תקשורת':'חשבונות','דלק ורכב':'תחבורה','תחבורה':'תחבורה',
  'חשבונות בית':'חשבונות','ביטוח':'חשבונות','בריאות':'בריאות','קניות':'שונות',
  'דיור':'דיור','אחר':'שונות',
};
function loadBudgetPlan() { return lsGet(LS.BUDGET, DEFAULT_BUDGET_PLAN); }
function calcBudget(netSalary, plan) {
  return (plan||loadBudgetPlan()).map(b => ({...b, amount: Math.round(netSalary * b.pct / 100)}));
}
function spentPerBudget(txs, budget) {
  const map = {};
  budget.forEach(b => { map[b.key] = 0; });
  const now = new Date();
  txs.filter(t => t.amount < 0).forEach(t => {
    const d = new Date(t.date);
    if (d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()) {
      const bk = CAT_TO_BUDGET[t.cat] || 'שונות';
      if (map[bk] !== undefined) map[bk] += Math.abs(t.amount);
    }
  });
  return map;
}

/* ── FORMATTERS ── */
const fmtILS = n => {
  if (typeof n!=='number'||isNaN(n)) return '₪0';
  return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',minimumFractionDigits:0,maximumFractionDigits:0}).format(Math.round(n));
};
const fmtDate = s => {
  const d=new Date(s); if(isNaN(d)) return s;
  return new Intl.DateTimeFormat('he-IL',{day:'numeric',month:'short'}).format(d);
};

/* ── SVG DONUT ── */
function DonutChart({data,size=180,cx_label='',cx_val=''}) {
  const [hov,setHov]=useState(null);
  if(!data||!data.length) return null;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return null;
  const CX=90,CY=90,R=72,ri=44; let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const pct=d.value/total,a0=angle,a1=angle+pct*2*Math.PI; angle=a1;
    const lg=pct>.5?1:0,c0=Math.cos(a0),s0=Math.sin(a0),c1=Math.cos(a1),s1=Math.sin(a1);
    const path=[`M ${CX+R*c0} ${CY+R*s0}`,`A ${R} ${R} 0 ${lg} 1 ${CX+R*c1} ${CY+R*s1}`,
      `L ${CX+ri*c1} ${CY+ri*s1}`,`A ${ri} ${ri} 0 ${lg} 0 ${CX+ri*c0} ${CY+ri*s0}`,'Z'].join(' ');
    const mid=(a0+a1)/2,lR=(R+ri)/2;
    return{...d,path,pct,lx:CX+lR*Math.cos(mid),ly:CY+lR*Math.sin(mid)};
  });
  return (
    <svg viewBox="0 0 180 180" style={{width:'100%',maxWidth:size,display:'block',margin:'0 auto'}}
         onMouseLeave={()=>setHov(null)}>
      {slices.map((s,i)=>(
        <g key={i} onMouseEnter={()=>setHov(i)} onTouchStart={()=>setHov(i===hov?null:i)}>
          <path d={s.path} fill={s.color} opacity={hov===null||hov===i?1:.45}
                style={{transition:'opacity .15s',cursor:'pointer'}}/>
          {s.pct>=.08&&<text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="central"
            fill="white" fontSize="10" fontWeight="700" style={{pointerEvents:'none'}}>
            {(s.pct*100).toFixed(0)}%</text>}
        </g>
      ))}
      {hov!==null&&slices[hov]
        ?<>
          <text x={CX} y={CY-8} textAnchor="middle" fontSize="10" fill="#6B7280">{slices[hov].name}</text>
          <text x={CX} y={CY+10} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111">{fmtILS(slices[hov].value)}</text>
        </>
        :<>
          <text x={CX} y={CY-8} textAnchor="middle" fontSize="10" fill="#9CA3AF">{cx_label||'סה"כ'}</text>
          <text x={CX} y={CY+10} textAnchor="middle" fontSize="13" fontWeight="800" fill="#111">{cx_val||fmtILS(total)}</text>
        </>
      }
    </svg>
  );
}

/* ── ONBOARDING ── */
function Onboarding({onDone}) {
  const [step,setStep]=useState(1);
  const STEPS=6;
  const [d,setD]=useState({
    name:'', netSalary:'', grossSalary:'',
    hasKeren:true, kerenEmp:2.5, kerenEr:7.5,
    hasPension:true, pensionEmp:6, pensionEr:14.83, pensionProvider:'',
    bankBalance:'', creditDebt:'',
    rent:'', rentDay:1, otherFixed:[],
  });
  const set=(k,v)=>setD(p=>({...p,[k]:v}));

  function finish() {
    const profile={
      ...d,
      netSalary:  parseFloat(d.netSalary)||0,
      grossSalary:parseFloat(d.grossSalary)||0,
      bankBalance:parseFloat(d.bankBalance)||0,
      creditDebt: parseFloat(d.creditDebt)||0,
      rent:       parseFloat(d.rent)||0,
      createdAt:  new Date().toISOString(),
    };
    lsSet(LS.PROFILE, profile);
    lsSet(LS.DONE, true);
    // seed recurring from rent
    if (profile.rent>0) {
      lsSet(LS.RECURRING,[{id:1,name:'שכר דירה',amount:profile.rent,dueDay:profile.rentDay,emoji:'🏠'}]);
    }
    onDone(profile);
  }

  const next = () => step<STEPS ? setStep(s=>s+1) : finish();
  const back = () => setStep(s=>s-1);
  const canNext = [
    ()=>d.name.trim().length>0,
    ()=>parseFloat(d.netSalary)>0,
    ()=>true,
    ()=>true,
    ()=>true,
    ()=>true,
  ][step-1];

  const pct = (step/STEPS)*100;

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#0f172a 0%,#1e3a5f 100%)',
                 display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 20px'}}>
      <div style={{width:'100%',maxWidth:440}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:42,marginBottom:8}}>💎</div>
          <p style={{color:'white',fontSize:22,fontWeight:800,margin:0}}>FinanceIL</p>
          <p style={{color:'rgba(255,255,255,.5)',fontSize:13,margin:'4px 0 0'}}>הגדרה ראשונית</p>
        </div>

        {/* Progress */}
        <div style={{marginBottom:24}}>
          <div style={{height:4,background:'rgba(255,255,255,.15)',borderRadius:4}}>
            <div style={{height:'100%',width:`${pct}%`,background:'#22C55E',borderRadius:4,transition:'width .4s'}}/>
          </div>
          <p style={{color:'rgba(255,255,255,.5)',fontSize:12,textAlign:'center',marginTop:8}}>שלב {step} מתוך {STEPS}</p>
        </div>

        {/* Card */}
        <div className="card slide-up" style={{padding:28,background:'white'}}>

          {step===1 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>👋 היי! מה שמך?</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נתחיל בהיכרות קצרה</p>
              <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שם פרטי</label>
              <input className="input" placeholder="ישראל ישראלי" value={d.name}
                     onChange={e=>set('name',e.target.value)}
                     onKeyDown={e=>e.key==='Enter'&&canNext()&&next()} autoFocus/>
            </div>
          )}

          {step===2 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>💰 כמה אתה מרוויח?</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נשתמש בזה לחישוב תקציב חכם</p>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר נטו (לאחר ניכויים) ₪</label>
                <input className="input input-num" type="number" placeholder="14000" value={d.netSalary}
                       onChange={e=>set('netSalary',e.target.value)}/>
                <p style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>הסכום שנכנס לחשבון הבנק בפועל</p>
              </div>
              <div>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר ברוטו ₪ <span style={{color:'#9CA3AF',fontWeight:400}}>(אופציונלי)</span></label>
                <input className="input input-num" type="number" placeholder="18000" value={d.grossSalary}
                       onChange={e=>set('grossSalary',e.target.value)}/>
              </div>
            </div>
          )}

          {step===3 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>📋 הפרשות שכר</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:20}}>אלו ייקחו בחשבון בחישוב תיק ההשקעות</p>

              {/* Keren */}
              <div style={{background:'#eff6ff',borderRadius:14,padding:16,marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontWeight:700,fontSize:15}}>📈 קרן השתלמות</span>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                    <input type="checkbox" checked={d.hasKeren} onChange={e=>set('hasKeren',e.target.checked)}
                           style={{width:18,height:18,accentColor:'#22C55E'}}/>
                    <span style={{fontSize:13}}>יש לי</span>
                  </label>
                </div>
                {d.hasKeren&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>עובד %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.kerenEmp}
                             onChange={e=>set('kerenEmp',parseFloat(e.target.value)||2.5)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>מעסיק %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.kerenEr}
                             onChange={e=>set('kerenEr',parseFloat(e.target.value)||7.5)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                  </div>
                )}
              </div>

              {/* Pension */}
              <div style={{background:'#f5f3ff',borderRadius:14,padding:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <span style={{fontWeight:700,fontSize:15}}>🏛️ פנסיה</span>
                  <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
                    <input type="checkbox" checked={d.hasPension} onChange={e=>set('hasPension',e.target.checked)}
                           style={{width:18,height:18,accentColor:'#8B5CF6'}}/>
                    <span style={{fontSize:13}}>יש לי</span>
                  </label>
                </div>
                {d.hasPension&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>עובד %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.pensionEmp}
                             onChange={e=>set('pensionEmp',parseFloat(e.target.value)||6)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                    <div>
                      <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>מעסיק %</label>
                      <input className="input input-num" type="number" step="0.5" value={d.pensionEr}
                             onChange={e=>set('pensionEr',parseFloat(e.target.value)||14.83)}
                             style={{padding:'10px 12px',fontSize:14}}/>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {step===4 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>🏦 מצב כספי נוכחי</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נתחיל לחשב את שווי הנכסים שלך</p>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>יתרה בבנק (עו"ש) ₪</label>
                <input className="input input-num" type="number" placeholder="0" value={d.bankBalance}
                       onChange={e=>set('bankBalance',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>חוב כרטיס אשראי ₪ <span style={{color:'#9CA3AF',fontWeight:400}}>(אם יש)</span></label>
                <input className="input input-num" type="number" placeholder="0" value={d.creditDebt}
                       onChange={e=>set('creditDebt',e.target.value)}/>
              </div>
            </div>
          )}

          {step===5 && (
            <div>
              <p style={{fontSize:22,fontWeight:800,color:'#111',marginBottom:6}}>🏠 הוצאות קבועות</p>
              <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>נחשב מה יישאר לך מהמשכורת</p>
              <div style={{marginBottom:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר דירה / משכנתה ₪ לחודש</label>
                <input className="input input-num" type="number" placeholder="0" value={d.rent}
                       onChange={e=>set('rent',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>יום הוראת קבע</label>
                <input className="input input-num" type="number" min="1" max="31" placeholder="1" value={d.rentDay}
                       onChange={e=>set('rentDay',parseInt(e.target.value)||1)}
                       style={{maxWidth:100}}/>
              </div>
              <p style={{fontSize:12,color:'#9CA3AF',marginTop:16}}>💡 ניתן להוסיף עוד הוצאות קבועות אחרי ההגדרה</p>
            </div>
          )}

          {step===6 && (
            <div>

/* ── OCR HELPERS ── */
function parseDateIL(s) {
  // handles DD/MM/YYYY  DD.MM.YYYY  DD-MM-YYYY  YYYY-MM-DD
  const clean=s.replace(/[.\-]/g,'/');
  const parts=clean.split('/');
  if(parts.length===3) {
    const [a,b,c]=parts.map(Number);
    const yr=c>31?c:(a>31?a:null);
    if(yr) {
      const [d,m]=c>31?[a,b]:[b,a];
      const dt=new Date(yr,m-1,d);
      if(!isNaN(dt)) return dt.toISOString().split('T')[0];
    }
  }
  const d=new Date(s); return isNaN(d)?null:d.toISOString().split('T')[0];
}
function parseBankOCR(text) {
  const DATE_RE  = /\b(\d{1,2}[./\-]\d{1,2}[./\-]\d{2,4}|\d{4}[./\-]\d{2}[./\-]\d{2})\b/g;
  const AMT_RE   = /(-?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?)/g;
  const results  = [];
  const lines    = text.split('\n').map(l=>l.trim()).filter(l=>l.length>4);
  for (const line of lines) {
    const dateMatch=line.match(DATE_RE);
    if(!dateMatch) continue;
    const date=parseDateIL(dateMatch[0]);
    if(!date) continue;
    // collect amounts on this line (ignore the balance column if multiple)
    const amts=[...(line.matchAll(AMT_RE)||[])].map(m=>parseFloat(m[1].replace(/,/g,''))).filter(n=>!isNaN(n)&&Math.abs(n)>0.5);
    if(!amts.length) continue;
    // The largest-abs value is usually the transaction, smallest is often qty/shares
    const amount=amts.reduce((best,n)=>Math.abs(n)>Math.abs(best)?n:best,amts[0]);
    // description = everything after date, before first amount
    const dateEnd=line.search(DATE_RE)+dateMatch[0].length;
    const afterDate=line.slice(dateEnd).trim();
    const desc=afterDate.replace(AMT_RE,'').replace(/\s+/g,' ').trim();
    if(desc.length<2) continue;
    const cat=categorize(desc);
    results.push({id:Date.now()+results.length,description:desc,amount:Math.round(amount*100)/100,
                  date,cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'צילום מסך'});
  }
  return results;
}

/* ── SCREENSHOT IMPORT ── */
function ScreenshotImport({onImport}) {
  const [imgUrl, setImgUrl]     = useState(null);
  const [stage,  setStage]      = useState('upload'); // upload|ocr|preview|done
  const [prog,   setProg]       = useState(0);
  const [parsed, setParsed]     = useState([]);
  const [ocrErr, setOcrErr]     = useState(null);
  const [rows,   setRows]       = useState([]); // manual editable rows
  const fileRef = useRef();

  async function handleFile(file) {
    if (!file.type.startsWith('image/')) { setOcrErr('יש להעלות תמונה (PNG/JPG)'); return; }
    const url=URL.createObjectURL(file);
    setImgUrl(url); setOcrErr(null); setStage('ocr'); setProg(0);
    try {
      if (typeof Tesseract === 'undefined') throw new Error('Tesseract not loaded');
      const result = await Tesseract.recognize(file,'heb+eng',{
        logger: m => { if(m.status==='recognizing text') setProg(Math.round((m.progress||0)*100)); }
      });
      const txs = parseBankOCR(result.data.text);
      if (txs.length===0) {
        // no structured data found → show raw text for user to review
        setRows([{id:1,description:'',amount:'',date:new Date().toISOString().split('T')[0]}]);
        setOcrErr('לא זוהו עסקאות אוטומטית — הזן ידנית');
      } else {
        setParsed(txs);
      }
      setStage('preview');
    } catch(e) {
      // Fallback: show image + manual entry
      setRows([{id:Date.now(),description:'',amount:'',date:new Date().toISOString().split('T')[0]}]);
      setOcrErr('OCR לא זמין — הזן ידנית על פי הצילום');
      setStage('preview');
    }
  }

  function addRow(){setRows(r=>[...r,{id:Date.now(),description:'',amount:'',date:new Date().toISOString().split('T')[0]}]);}
  function delRow(id){setRows(r=>r.filter(x=>x.id!==id));}
  function editRow(id,k,v){setRows(r=>r.map(x=>x.id===id?{...x,[k]:v}:x));}

  function confirm() {
    const finalTxs = parsed.length>0 ? parsed : rows.filter(r=>r.description&&r.amount!=='').map(r=>{
      const amt=parseFloat(r.amount)||0;
      const cat=categorize(r.description);
      return{...r,id:Date.now()+Math.random(),amount:Math.round(amt*100)/100,
             cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'צילום מסך'};
    });
    if(finalTxs.length>0){onImport(finalTxs);setStage('done');}
  }

  return (
    <div>
      {stage==='upload'&&(
        <div>
          <div className="card" style={{padding:28,textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>📸</div>
            <p style={{fontSize:17,fontWeight:700,marginBottom:8}}>העלה צילום מסך</p>
            <p style={{fontSize:13,color:'#6B7280',marginBottom:20,lineHeight:1.6}}>
              צלם את מסך העסקאות בבנק / בחשבון ההשקעות<br/>
              המערכת תנסה לזהות עסקאות אוטומטית (OCR)
            </p>
            <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
                   onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
            <button className="btn-primary" onClick={()=>fileRef.current.click()}>📂 בחר תמונה</button>
            <div onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='#22C55E';}}
                 onDragLeave={e=>{e.currentTarget.style.borderColor='#e5e7eb';}}
                 onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='#e5e7eb';
                             e.dataTransfer.files[0]&&handleFile(e.dataTransfer.files[0]);}}
                 style={{border:'2px dashed #e5e7eb',borderRadius:14,padding:20,marginTop:14,
                         color:'#9CA3AF',fontSize:13,transition:'border-color .2s',cursor:'pointer'}}
                 onClick={()=>fileRef.current.click()}>
              או גרור תמונה לכאן
            </div>
          </div>
          <div className="card" style={{padding:14,marginTop:14,background:'#fffbeb',border:'1px solid #fde68a'}}>
            <p style={{fontSize:13,fontWeight:700,color:'#92400e',marginBottom:6}}>💡 טיפ לצילום מסך טוב יותר:</p>
            <ul style={{fontSize:12,color:'#78350f',margin:0,padding:'0 16px',lineHeight:1.9}}>
              <li>צלם ממסך מחשב ולא ממובייל לדיוק גבוה יותר</li>
              <li>ודא שהעמודות תאריך, תיאור, סכום גלויות</li>
              <li>הפועלים: "תנועות בחשבון" → "ייצוא" ← או צלם</li>
              <li>Max: "עסקאות" → גלול לכל העסקאות</li>
            </ul>
          </div>
        </div>
      )}

      {stage==='ocr'&&(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div style={{fontSize:48,marginBottom:16}}>🔍</div>
          <p style={{fontSize:17,fontWeight:700,marginBottom:8}}>מזהה טקסט...</p>
          <div style={{height:8,background:'#f3f4f6',borderRadius:4,margin:'16px 0'}}>
            <div style={{height:'100%',width:`${prog}%`,background:'#22C55E',borderRadius:4,transition:'width .3s'}}/>

          <p style={{fontSize:13,color:'#9CA3AF'}}>{prog}% · OCR עברית + אנגלית</p>
          {imgUrl&&<img src={imgUrl} style={{maxWidth:'100%',borderRadius:12,marginTop:16,maxHeight:200,objectFit:'contain'}} alt=""/>}
        </div>
      )}

      {stage==='preview'&&(
        <div>
          <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:14}}>
            {imgUrl&&<img src={imgUrl} style={{width:80,height:80,borderRadius:10,objectFit:'cover',flexShrink:0}} alt=""/>}
            <div>
              <p style={{margin:0,fontSize:16,fontWeight:700}}>
                {parsed.length>0?`✅ זוהו ${parsed.length} עסקאות`:'✏️ עסקאות ידניות'}
              </p>
              {ocrErr&&<p style={{fontSize:12,color:'#F59E0B',margin:'4px 0 0'}}>{ocrErr}</p>}
            </div>
          </div>

          {/* Auto-parsed results */}

          {/* Manual entry fallback */}
          {(parsed.length===0||ocrErr)&&(
            <div className="card" style={{padding:16,marginBottom:14}}>
              <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>הזן עסקאות ידנית:</p>
              {rows.map(r=>(
                <div key={r.id} style={{display:'grid',gridTemplateColumns:'1fr 80px 90px 32px',gap:6,marginBottom:8}}>
                  <input className="input" placeholder="תיאור" value={r.description}
                         onChange={e=>editRow(r.id,'description',e.target.value)}
                         style={{fontSize:12,padding:'8px 10px'}}/>
                  <input className="input input-num" type="number" placeholder="סכום" value={r.amount}
                         onChange={e=>editRow(r.id,'amount',e.target.value)}
                         style={{fontSize:12,padding:'8px 8px'}}/>
                  <input className="input" type="date" value={r.date} style={{direction:'ltr',fontSize:11,padding:'8px 6px'}}
                         onChange={e=>editRow(r.id,'date',e.target.value)}/>
                  <button onClick={()=>delRow(r.id)}
                          style={{border:'none',background:'#fee2e2',color:'#dc2626',borderRadius:8,cursor:'pointer',fontSize:14}}>✕</button>
                </div>
              ))}
              <button onClick={addRow} style={{border:'1px dashed #d1d5db',background:'none',borderRadius:10,
                padding:'8px',width:'100%',fontSize:13,color:'#6B7280',cursor:'pointer',marginTop:4}}>
                + הוסף שורה
              </button>
            </div>
          )}

          <div style={{display:'flex',gap:10}}>
            <button className="btn-secondary" onClick={()=>{setStage('upload');setParsed([]);setRows([]);setOcrErr(null);}}
                    style={{width:'auto',padding:'14px 18px'}}>← חזור</button>
            <button className="btn-primary" onClick={confirm}>
              ייבא {parsed.length||rows.filter(r=>r.description).length} עסקאות ✓
            </button>
          </div>
        </div>
      )}

      {stage==='done'&&(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div style={{fontSize:56,marginBottom:12}}>🎉</div>
          <p style={{fontSize:18,fontWeight:800,marginBottom:8}}>הצילום יובא!</p>
          <button className="btn-primary" onClick={()=>{setStage('upload');setImgUrl(null);setParsed([]);setRows([]);}}>
            העלה צילום נוסף
          </button>
        </div>
      )}
    </div>
  );
}

    setErr(null);
    try {
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];

      const clean=data.filter(r=>r.some(c=>String(c).trim()!==''));
      setRows(clean);
      // auto-detect columns
      const hdr=clean[0].map(c=>String(c).toLowerCase().trim());
      const find=(...terms)=>hdr.findIndex(h=>terms.some(t=>h.includes(t)));

        date:   find('תאריך','date'),

        debit:  find('חיוב','הוצאה','debit'),
        credit: find('זכות','הכנסה','credit'),
        amount: find('סכום','amount'),
      });
      setStage('map');

    const parsed=[];

      } else {

        const db=parseFloat(String(row[cols.debit]||'').replace(/[^\d.-]/g,''))||0;
        amount=cr>0?cr:(db>0?-db:0);
      }
      const rawDate=row[cols.date];
      let date;
      if(rawDate instanceof Date) date=rawDate.toISOString().split('T')[0];
      else {
        const d=new Date(rawDate);
        date=isNaN(d)?new Date().toISOString().split('T')[0]:d.toISOString().split('T')[0];
      }
      const desc=String(row[cols.desc]||'').trim();
      if(!desc||amount===0) continue;
      const cat=categorize(desc);
      parsed.push({id:Date.now()+i,description:desc,amount:Math.round(amount*100)/100,
                   date,cat:cat.cat,color:cat.color,emoji:cat.emoji,account:'ייבוא'});

            {[
              {bank:'בנק הפועלים',steps:'כניסה ← תנועות בחשבון ← ייצוא ← Excel'},
              {bank:'בנק לאומי',steps:'לאומי Online ← תנועות ← ייצוא ← Excel'},

              <div key={b.bank} style={{borderBottom:'1px solid #f3f4f6',padding:'8px 0',fontSize:12}}>
                <span style={{fontWeight:600,color:'#374151'}}>{b.bank}: </span>
                <span style={{color:'#6B7280'}}>{b.steps}</span>
              </div>

          </div>
        </div>

      {stage==='map'&&(
        <div>
          <p style={{fontSize:17,fontWeight:700,margin:'0 0 4px'}}>🗂️ מיפוי עמודות</p>
          <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>בחר איזו עמודה מכילה כל נתון:</p>

          {/* Preview of first 3 rows */}
          <div className="card" style={{overflowX:'auto',marginBottom:16}}>
            <table style={{fontSize:11,borderCollapse:'collapse',width:'100%'}}>

                <tr style={{background:'#f9fafb'}}>

                </tr>
              </thead>
              <tbody>
                {rows.slice(1,4).map((r,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid #f3f4f6'}}>
                    {r.map((c,j)=><td key={j} style={{padding:'6px 8px',color:'#6B7280',whiteSpace:'nowrap'}}>{String(c).slice(0,20)}</td>)}

              </tbody>

          </div>

          {/* Column selectors */}
          <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>
            {[
              {key:'date',label:'📅 תאריך'},
              {key:'desc',label:'📝 תיאור עסקה'},
              {key:'amount',label:'💰 סכום (עמודה אחת)'},
              {key:'debit',label:'📤 חיוב / הוצאה'},
              {key:'credit',label:'📥 זכות / הכנסה'},
            ].map(f=>(
              <div key={f.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <label style={{fontSize:13,fontWeight:600,color:'#374151'}}>{f.label}</label>

                </select>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:12,marginTop:16}}>
            <button className="btn-secondary" onClick={()=>setStage('upload')} style={{width:'auto',padding:'14px 20px'}}>← חזור</button>
            <button className="btn-primary" onClick={buildPreview}
                    disabled={cols.desc<0||(cols.amount<0&&(cols.debit<0&&cols.credit<0))||cols.date<0}>
              תצוגה מקדימה →
            </button>
          </div>
        </div>
      )}

      {stage==='preview'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <p style={{fontSize:17,fontWeight:700,margin:0}}>✅ תצוגה מקדימה</p>
              <p style={{fontSize:13,color:'#6B7280',margin:'2px 0 0'}}>{preview.length} עסקאות זוהו</p>
            </div>
            <button className="btn-secondary" onClick={()=>setStage('map')} style={{width:'auto',padding:'8px 14px',fontSize:13}}>← חזור</button>
          </div>

          <div className="card" style={{overflow:'hidden',marginBottom:16}}>
            {preview.slice(0,20).map(tx=><TxRow key={tx.id} tx={tx}/>)}
            {preview.length>20&&<p style={{textAlign:'center',fontSize:12,color:'#9CA3AF',padding:12}}>ועוד {preview.length-20} עסקאות...</p>}
          </div>

      {stage==='done'&&(
        <div className="card" style={{padding:40,textAlign:'center'}}>
          <div style={{fontSize:60,marginBottom:16}}>🎉</div>
          <p style={{fontSize:20,fontWeight:800,marginBottom:8}}>הייבוא הושלם!</p>
          <p style={{fontSize:14,color:'#6B7280',marginBottom:24}}>{preview.length} עסקאות יובאו בהצלחה</p>
          <button className="btn-primary" onClick={()=>setStage('upload')}>ייבא קובץ נוסף</button>
        </div>
      )}
    </div>
  );
}

/* ── LIVE PRICE HELPERS ── */
async function fetchFinnhubQuote(symbol, apiKey) {
  const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${apiKey}`);
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  if (!d || d.c <= 0) throw new Error('no data');
  return { price: d.c, changePct: typeof d.dp === 'number' ? d.dp : 0, prevClose: d.pc };
}
async function fetchUsdIlsRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    return d?.rates?.ILS ?? 3.72;
  } catch { return 3.72; }
}

/* ── STOCK PORTFOLIO (buy/sell/liquid + live prices) ── */
const LS_PORTFOLIO = 'fil_portfolio';
const DEFAULT_USD_ILS = 3.72;

function PortfolioSection() {
  const [holdings, setHoldings] = useState(()=>lsGet(LS_PORTFOLIO,{holdings:[],cash:0}).holdings||[]);
  const [cash,     setCash]     = useState(()=>lsGet(LS_PORTFOLIO,{holdings:[],cash:0}).cash||0);
  const [mode,     setMode]     = useState('view');
  const [form,     setForm]     = useState({symbol:'',name:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
  const [sellForm, setSellForm] = useState({holdingId:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
  const [depositAmt, setDepositAmt] = useState('');
  const [subTab,   setSubTab]   = useState('holdings');
  const [history,  setHistory]  = useState(()=>lsGet(LS_PORTFOLIO,{}).history||[]);

  // ── Live price state ──
  const [apiKey,    setApiKey]    = useState(()=>lsGet(LS.FINNHUB,''));
  const [keyInput,  setKeyInput]  = useState('');
  const [showKey,   setShowKey]   = useState(false);
  const [livePrices,setLivePrices]= useState({});
  const [dayChanges,setDayChanges]= useState({});
  const [usdIls,    setUsdIls]    = useState(DEFAULT_USD_ILS);
  const [liveMode,  setLiveMode]  = useState(false);
  const [fetching,  setFetching]  = useState(false);
  const [fetchErr,  setFetchErr]  = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  // ── Symbol auto-lookup ──
  const [lookup,    setLookup]    = useState({status:'idle',price:null,name:'',chg:null}); // idle|loading|found|error
  const lookupTimer = useRef(null);

  async function doFetch(key) {
    if (!holdings.length) return;
    setFetching(true); setFetchErr(null);
    const syms=[...new Set(holdings.map(h=>h.symbol))];
    const p={}, c={};
    let ok=0;
    await Promise.all(syms.map(async sym=>{
      try { const q=await fetchFinnhubQuote(sym,key); p[sym]=q.price; c[sym]=q.changePct; ok++; }
      catch{}
    }));
    if(ok>0){ setLivePrices(p); setDayChanges(c); setLiveMode(true); setLastFetch(new Date()); }
    else setFetchErr('לא ניתן לטעון מחירים — בדוק מפתח API');
    setFetching(false);
  }

  // on mount: fetch exchange rate + prices if key saved
  useEffect(()=>{
    fetchUsdIlsRate().then(r=>setUsdIls(r));
    if(apiKey) doFetch(apiKey);
  },[]);

  // auto-refresh every 60s when live
  useEffect(()=>{
    if(!liveMode||!apiKey) return;
    const id=setInterval(()=>doFetch(apiKey),60000);
    return()=>clearInterval(id);
  },[liveMode,apiKey,holdings.length]);

  // ── Debounced symbol lookup when typing in the Buy form ──
  useEffect(()=>{
    const sym=form.symbol.trim();
    if(!sym){ setLookup({status:'idle',price:null,name:'',chg:null}); return; }
    if(!apiKey){ setLookup({status:'no-key',price:null,name:'',chg:null}); return; }
    clearTimeout(lookupTimer.current);
    setLookup(l=>({...l,status:'loading'}));
    lookupTimer.current=setTimeout(async()=>{
      try {
        // fetch quote + company profile in parallel
        const [quoteRes, profileRes] = await Promise.allSettled([
          fetchFinnhubQuote(sym, apiKey),
          fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${sym}&token=${apiKey}`).then(r=>r.json()),
        ]);
        if(quoteRes.status!=='fulfilled') throw new Error('quote failed');
        const q=quoteRes.value;
        const companyName = profileRes.status==='fulfilled'&&profileRes.value?.name
          ? profileRes.value.name : sym;
        setLookup({status:'found',price:q.price,name:companyName,chg:q.changePct});
        // auto-fill price and name
        setForm(f=>({
          ...f,
          price: q.price.toFixed(2),
          name:  f.name||companyName,
        }));
      } catch {
        setLookup({status:'error',price:null,name:'',chg:null});
      }
    },750);
    return()=>clearTimeout(lookupTimer.current);
  },[form.symbol, apiKey]);

  function saveKey(){
    const k=keyInput.trim(); if(!k) return;
    lsSet(LS.FINNHUB,k); setApiKey(k); setKeyInput(''); setShowKey(false);
    doFetch(k);
  }
  function clearKey(){lsSet(LS.FINNHUB,'');setApiKey('');setLiveMode(false);setLivePrices({});setDayChanges({});}

  // computed rows with live or fallback price
  const rows=useMemo(()=>holdings.map(h=>{
    const lp=livePrices[h.symbol];
    const price=lp??h.avgCost;
    const live=lp!==undefined;
    const costBasis=Math.round(h.shares*h.avgCost*100)/100;
    const valUSD=Math.round(h.shares*price*100)/100;
    const valILS=Math.round(valUSD*usdIls*100)/100;
    const plUSD=Math.round((valUSD-costBasis)*100)/100;
    const plPct=costBasis>0?(plUSD/costBasis)*100:0;
    const dayChg=dayChanges[h.symbol]??null;
    return{...h,price,live,costBasis,valUSD,valILS,plUSD,plPct,dayChg};
  }),[holdings,livePrices,dayChanges,usdIls]);

  const totalCostBasis=rows.reduce((s,r)=>s+r.costBasis,0);
  const totalValUSD=rows.reduce((s,r)=>s+r.valUSD,0);
  const totalValILS=Math.round(totalValUSD*usdIls*100)/100;
  const totalPL=Math.round((totalValUSD-totalCostBasis)*100)/100;
  const totalPLPct=totalCostBasis>0?(totalPL/totalCostBasis)*100:0;
  const donutData=rows.map(r=>({name:r.symbol,value:r.valUSD,color:r.color,emoji:''}));

  function persist(h,c,hist) {
    lsSet(LS_PORTFOLIO,{holdings:h,cash:c,history:hist||history});
  }

  function deposit() {
    const amt=parseFloat(depositAmt); if(isNaN(amt)||amt<=0) return;
    const newCash=Math.round((cash+amt)*100)/100;
    const hist=[{id:Date.now(),type:'deposit',amount:amt,date:new Date().toISOString().split('T')[0]},...history];
    setCash(newCash); setHistory(hist); persist(holdings,newCash,hist);
    setDepositAmt(''); setMode('view');
  }

  function buy() {
    const shares=parseFloat(form.shares), price=parseFloat(form.price);
    if(!form.symbol||isNaN(shares)||isNaN(price)||shares<=0||price<=0) return;
    const cost=Math.round(shares*price*100)/100;
    // find existing holding for same symbol
    const existing=holdings.find(h=>h.symbol.toUpperCase()===form.symbol.toUpperCase());
    let newHoldings;
    if (existing) {
      // average down/up
      const totalShares=existing.shares+shares;
      const avgCost=Math.round(((existing.avgCost*existing.shares)+(price*shares))/totalShares*100)/100;
      newHoldings=holdings.map(h=>h.id===existing.id?{...h,shares:totalShares,avgCost}:h);
    } else {
      newHoldings=[...holdings,{id:Date.now(),symbol:form.symbol.toUpperCase(),
        name:form.name||form.symbol.toUpperCase(),shares,avgCost:price,color:'#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0')}];
    }
    const newCash=Math.round((cash-cost)*100)/100;
    const hist=[{id:Date.now(),type:'buy',symbol:form.symbol.toUpperCase(),shares,price,cost,date:form.date},...history];
    setHoldings(newHoldings); setCash(newCash); setHistory(hist);
    persist(newHoldings,newCash,hist);
    setForm({symbol:'',name:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
    setMode('view');
  }

  function sell() {
    const h=holdings.find(x=>x.id===parseInt(sellForm.holdingId));
    if(!h) return;
    const shares=parseFloat(sellForm.shares), price=parseFloat(sellForm.price);
    if(isNaN(shares)||isNaN(price)||shares<=0||price<=0||shares>h.shares) return;
    const proceeds=Math.round(shares*price*100)/100;
    const pl=Math.round((price-h.avgCost)*shares*100)/100;
    let newHoldings;
    if(shares===h.shares) newHoldings=holdings.filter(x=>x.id!==h.id);
    else newHoldings=holdings.map(x=>x.id===h.id?{...x,shares:Math.round((x.shares-shares)*100000)/100000}:x);
    const newCash=Math.round((cash+proceeds)*100)/100;
    const hist=[{id:Date.now(),type:'sell',symbol:h.symbol,shares,price,proceeds,pl,date:sellForm.date},...history];
    setHoldings(newHoldings); setCash(newCash); setHistory(hist);
    persist(newHoldings,newCash,hist);
    setSellForm({holdingId:'',shares:'',price:'',date:new Date().toISOString().split('T')[0]});
    setMode('view');
  }

  const totalCost = holdings.reduce((s,h)=>s+h.shares*h.avgCost,0);
  // We don't have live prices here unless user entered current price - show cost basis
  const donutData = holdings.map(h=>({name:h.symbol,value:Math.round(h.shares*h.avgCost*100)/100,color:h.color,emoji:''}));

  return (
    <div>
      {/* ── API Key panel ── */}
      {showKey?(
        <div className="card" style={{padding:16,marginBottom:14,background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
          <p style={{fontWeight:700,fontSize:14,margin:'0 0 6px'}}>🔑 Finnhub API Key</p>
          <p style={{fontSize:12,color:'#6B7280',margin:'0 0 10px',lineHeight:1.6}}>
            מפתח חינם ב-<a href="https://finnhub.io/register" target="_blank" rel="noopener"
              style={{color:'#15803d'}}>finnhub.io/register</a> — תומך: NYSE, NASDAQ, TASE (סימול.TA)
          </p>
          <div style={{display:'flex',gap:8}}>
            <input className="input" placeholder="c_xxxxxxxxxxxxxxxx" value={keyInput}
                   onChange={e=>setKeyInput(e.target.value)}
                   onKeyDown={e=>e.key==='Enter'&&saveKey()}
                   style={{flex:1,direction:'ltr',fontFamily:'monospace',fontSize:13}} autoFocus/>
            <button className="btn-primary" onClick={saveKey} style={{width:'auto',padding:'12px 16px'}}>שמור</button>
            <button className="btn-secondary" onClick={()=>setShowKey(false)} style={{width:'auto',padding:'12px 12px'}}>✕</button>
          </div>
          <p style={{fontSize:11,color:'#9CA3AF',marginTop:8}}>
            ישראל: TEVA, CHKP, NICE, ICL | ת"א: TEVA.TA, NICE.TA
          </p>
        </div>
      ):(
        !apiKey&&holdings.length>0&&(
          <div onClick={()=>setShowKey(true)} style={{background:'#fffbeb',border:'1px solid #fde68a',
            borderRadius:14,padding:'12px 14px',marginBottom:14,cursor:'pointer',
            display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>🔑</span>
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:13,color:'#92400e'}}>הגדר Finnhub API לעדכון מחירים אוטומטי</p>
              <p style={{margin:'2px 0 0',fontSize:12,color:'#78350f'}}>לחץ להגדרה — חינם, לוקח 30 שניות</p>
            </div>
            <span style={{marginRight:'auto',color:'#fbbf24',fontSize:18}}>›</span>
          </div>
        )
      )}

      {/* ── Summary card ── */}
      <div style={{background:'linear-gradient(135deg,#052e16,#14532d)',padding:'16px 20px',borderRadius:16,marginBottom:16}}>

            <p style={{color:'rgba(255,255,255,.7)',fontSize:12,margin:'0 0 4px'}}>📊 תיק מניות</p>
            <p style={{color:'white',fontSize:28,fontWeight:800,margin:0,lineHeight:1.1}}>
              {fmtILS(totalValILS+cash)}
            </p>
            {liveMode&&totalPL!==0&&(
              <p style={{margin:'6px 0 0',fontSize:13,fontWeight:700,
                         color:totalPL>=0?'#4ade80':'#f87171'}}>
                {totalPL>=0?'▲':'▼'} ${Math.abs(totalPL).toFixed(0)} ({totalPLPct>=0?'+':''}{totalPLPct.toFixed(2)}%) רווח/הפסד כולל

          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>

                      style={{background:'rgba(255,255,255,.2)',border:'none',borderRadius:10,
                              padding:'7px 12px',color:'white',cursor:'pointer',fontSize:12,fontWeight:700}}>
                <span className={fetching?'spin':''} style={{display:'inline-block',marginLeft:4}}>🔄</span>
                {fetching?'טוען...':'רענן'}
              </button>
            ):(
              <button onClick={()=>setShowKey(true)}
                      style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',
                              borderRadius:10,padding:'7px 12px',color:'white',cursor:'pointer',fontSize:12}}>
                🔑 הגדר API
              </button>
            )}
            {liveMode&&(
              <span style={{background:'#22C55E',fontSize:10,padding:'2px 7px',borderRadius:10,
                            fontWeight:700,color:'white'}}>🔴 LIVE</span>
            )}
            {apiKey&&!liveMode&&!fetching&&(
              <span style={{background:'rgba(255,255,255,.2)',fontSize:10,padding:'2px 7px',
                            borderRadius:10,color:'white'}}>DEMO</span>

        </div>
        {lastFetch&&(

            <p style={{color:'white',fontSize:13,fontWeight:700,margin:0}}>{fmtILS(cash)}</p>

            <button className="btn-secondary" onClick={()=>setMode('view')} style={{width:'auto',padding:'13px 14px'}}>ביטול</button>
          </div>

      {/* Buy panel */}
      {mode==='buy'&&(

          <div style={{display:'flex',flexDirection:'column',gap:12}}>

            {/* Symbol + auto-lookup */}
            <div>
              <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>סימול (Ticker)</label>
              <input className="input" style={{textTransform:'uppercase',direction:'ltr',letterSpacing:1}}
                     placeholder="NVDA / TEVA.TA / CHKP" value={form.symbol} autoFocus
                     onChange={e=>{setForm(f=>({...f,symbol:e.target.value.toUpperCase()}));setLookup({status:'idle',price:null,name:'',chg:null});}}/>
              {/* Lookup status bar */}
              {form.symbol&&(
                <div style={{marginTop:6,fontSize:12,display:'flex',alignItems:'center',gap:6}}>
                  {lookup.status==='loading'&&<><span className="spin" style={{display:'inline-block'}}>⏳</span><span style={{color:'#6B7280'}}>מחפש מחיר...</span></>}
                  {lookup.status==='found'&&(
                    <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'6px 10px',flex:1}}>
                      <span style={{color:'#15803d',fontWeight:700}}>{lookup.name}</span>
                      <span style={{color:'#6B7280',marginRight:8}}> · </span>
                      <span style={{color:'#15803d',fontWeight:800}}>${lookup.price?.toFixed(2)}</span>
                      {lookup.chg!==null&&<span className={lookup.chg>=0?'tag-g':'tag-r'} style={{marginRight:8}}>
                        {lookup.chg>=0?'+':''}{lookup.chg?.toFixed(2)}%
                      </span>}
                      <span style={{color:'#9CA3AF',fontSize:11}}> — נשלף מ-Finnhub ✓</span>
                    </div>
                  )}
                  {lookup.status==='error'&&<span style={{color:'#dc2626'}}>⚠️ סימול לא נמצא — בדוק את הטיקר</span>}
                  {lookup.status==='no-key'&&<span style={{color:'#F59E0B'}}>⚠️ הגדר Finnhub API כדי לקבל מחיר אוטומטי</span>}
                </div>
              )}
            </div>

            {/* Name (auto-filled or manual) */}
            <div>
              <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>
                שם החברה {lookup.status==='found'&&<span style={{color:'#9CA3AF'}}>(נשלף אוטומטית)</span>}
              </label>
              <input className="input" placeholder="NVIDIA" value={form.name}
                     onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>כמות מניות</label>
                <input className="input input-num" type="number" step="0.001" placeholder="10"
                       value={form.shares} onChange={e=>setForm(f=>({...f,shares:e.target.value}))}/>
              </div>
              <div>
                <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>
                  מחיר לרכישה {lookup.status==='found'&&<span style={{color:'#22C55E',fontSize:10}}>⚡ אוטומטי</span>}
                </label>
                <div style={{position:'relative'}}>
                  <input className="input input-num" type="number" step="0.01" placeholder="875.00"
                         value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}
                         style={{paddingLeft: lookup.status==='loading'?36:undefined}}/>
                  {lookup.status==='loading'&&(
                    <span className="spin" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:16}}>⏳</span>
                  )}
                </div>
              </div>
            </div>

            <div>
              <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>תאריך</label>
              <input className="input" type="date" value={form.date} style={{direction:'ltr'}}
                     onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>

            {form.shares&&form.price&&(
              <div style={{background:'#f0fdf4',borderRadius:10,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,color:'#15803d'}}>עלות כוללת</span>
                <div style={{textAlign:'left'}}>
                  <span style={{fontSize:15,fontWeight:800,color:'#14532d'}}>
                    ${(parseFloat(form.shares||0)*parseFloat(form.price||0)).toFixed(2)}
                  </span>
                  <span style={{fontSize:12,color:'#6B7280',marginRight:8}}> · {fmtILS(parseFloat(form.shares||0)*parseFloat(form.price||0)*usdIls)}</span>
                  {cash>0&&parseFloat(form.shares)*parseFloat(form.price)*usdIls>cash&&
                    <span style={{color:'#dc2626',fontSize:11,display:'block'}}>⚠️ חורג מהמזומן הנזיל</span>}
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:10}}>
              <button className="btn-primary" onClick={buy} style={{background:'#15803d'}}>קנה ✓</button>
              <button className="btn-secondary" onClick={()=>{setMode('view');setLookup({status:'idle',price:null,name:'',chg:null});}} style={{width:'auto',padding:'13px 14px'}}>ביטול</button>
            </div>
          </div>
        </div>
      )}

      {/* Sell panel */}
      {mode==='sell'&&(
        <div className="card" style={{padding:16,marginBottom:16}}>
          <p style={{fontWeight:700,marginBottom:12}}>🔴 מכירת נייר ערך</p>
          {holdings.length===0
            ? <p style={{color:'#9CA3AF',fontSize:13}}>אין החזקות למכירה</p>
            : <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div>
                  <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>נייר ערך</label>
                  <select className="input" value={sellForm.holdingId}
                          onChange={e=>{
                            const id=e.target.value;
                            const h=holdings.find(x=>x.id===parseInt(id));
                            const lp=h?livePrices[h.symbol]:null;
                            setSellForm(f=>({...f,holdingId:id,price:lp?lp.toFixed(2):f.price}));
                          }}>
                    <option value="">בחר נייר...</option>
                    {holdings.map(h=><option key={h.id} value={h.id}>
                      {h.symbol} — {h.shares} יח׳{livePrices[h.symbol]?` ($${livePrices[h.symbol].toFixed(2)})`:''}</option>)}
                  </select>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>כמות למכירה</label>
                    <input className="input input-num" type="number" step="0.001" placeholder="0"
                           value={sellForm.shares} onChange={e=>setSellForm(f=>({...f,shares:e.target.value}))}/>

                  const h=holdings.find(x=>x.id===parseInt(sellForm.holdingId));
                  const pl=h?Math.round((parseFloat(sellForm.price)-h.avgCost)*parseFloat(sellForm.shares)*100)/100:0;

/* ── SNAPSHOT HELPERS (for return tracking) ── */
const LS_SNAP = k => `fil_snap_${k}`;

function loadSnaps(key) { return lsGet(LS_SNAP(key), []); }
function addSnap(key, value) {
  const snaps = loadSnaps(key);
  const today = new Date().toISOString().split('T')[0];
  // update today's entry or append
  const idx = snaps.findIndex(s => s.date === today);
  const next = idx >= 0
    ? snaps.map((s,i) => i===idx ? {...s, value} : s)
    : [...snaps, {date: today, value}];
  lsSet(LS_SNAP(key), next);
  return next;
}
function calcReturn(snaps) {
  if (!snaps || snaps.length < 1) return null;
  const sorted = [...snaps].sort((a,b) => a.date.localeCompare(b.date));
  const first = sorted[0], last = sorted[sorted.length - 1];
  const gain  = Math.round((last.value - first.value) * 100) / 100;
  const pct   = first.value > 0 ? (gain / first.value) * 100 : 0;
  const days  = Math.max(1, (new Date(last.date) - new Date(first.date)) / 864e5);
  // annualized CAGR if > 30 days
  const cagr  = days > 30 ? (Math.pow(last.value / first.value, 365 / days) - 1) * 100 : null;
  return { gain, pct, cagr, firstDate: first.date, lastDate: last.date, days, sorted };
}

/* ── SPARKLINE ── */
function Sparkline({ snaps, color='#22C55E', h=40, w=120 }) {
  if (!snaps || snaps.length < 2) return null;
  const vals = snaps.map(s => s.value);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const pts = vals.map((v,i) => `${(i/(vals.length-1))*w},${h-((v-mn)/rng)*(h-4)+2}`).join(' ');
  return (
    <svg width={w} height={h} style={{display:'block',overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={(vals.length-1)/(vals.length-1)*w} cy={h-((vals[vals.length-1]-mn)/rng)*(h-4)+2} r="3.5" fill={color}/>
    </svg>
  );
}

/* ── RETURN BADGE ── */
function ReturnBadge({ pct, label='סה"כ', small=false }) {
  if (pct === null || pct === undefined) return null;
  const pos = pct >= 0;
  return (
    <div style={{display:'inline-flex',alignItems:'center',gap:4,
                 background:pos?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)',
                 borderRadius:8,padding:small?'2px 7px':'4px 10px'}}>
      <span style={{fontSize:small?10:12,fontWeight:700,color:pos?'#15803d':'#b91c1c'}}>
        {pos?'▲':'▼'} {Math.abs(pct).toFixed(2)}%
      </span>
      <span style={{fontSize:small?9:11,color:'#9CA3AF'}}>{label}</span>
    </div>
  );
}

                    <input className="input input-num" type="number" placeholder="0" value={savForm.value}
                           onChange={e=>setSavForm(f=>({...f,value:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>ריבית שנתית %</label>
                    <input className="input input-num" type="number" step="0.1" placeholder="3.5" value={savForm.rate}
                           onChange={e=>setSavForm(f=>({...f,rate:e.target.value}))}/>
                  </div>
                </div>
                <button className="btn-primary" onClick={addSavings}>הוסף חיסכון ✓</button>
              </div>
            )}
            {savingsAccounts.length===0&&!savEdit&&(
              <div className="card" style={{padding:32,textAlign:'center',color:'#9CA3AF',fontSize:14}}>
                אין חסכונות — לחץ "הוסף"
              </div>
            )}
            {savingsAccounts.map(s=>(
              <div key={s.id} className="card" style={{padding:16,display:'flex',alignItems:'center',gap:12}}>
                <span style={{fontSize:28}}>🏦</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontWeight:700,fontSize:14}}>{s.name}</p>
                  <p style={{margin:'2px 0 0',fontSize:12,color:'#9CA3AF'}}>{s.bank}{s.rate>0?` · ${s.rate}% שנתי`:''}</p>
                </div>
                <div style={{textAlign:'left'}}>
                  <p style={{margin:0,fontWeight:800,fontSize:16}}>{fmtILS(s.value)}</p>
                  {s.rate>0&&<p style={{margin:'2px 0 0',fontSize:11,color:'#15803d'}}>+{fmtILS(s.value*s.rate/100)}/שנה</p>}
                </div>
                <button onClick={()=>delSavings(s.id)}
                        style={{border:'none',background:'#fee2e2',color:'#dc2626',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:13}}>✕</button>
              </div>
            ))}
            {savingsAccounts.length>0&&(
              <div className="card" style={{padding:14,background:'#f0fdf4',border:'1px solid #bbf7d0'}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:14,fontWeight:700,color:'#14532d'}}>סה"כ חסכונות</span>
                  <span style={{fontSize:16,fontWeight:800,color:'#14532d'}}>{fmtILS(savingsAccounts.reduce((s,a)=>s+a.value,0))}</span>
                </div>
              </div>
            )}
          </div>
        )}

        {invTab==='mm'&&(
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {/* Header + add button */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <p style={{margin:0,fontWeight:700,fontSize:15}}>קרנות כספיות</p>
                {mmFunds.length>0&&<p style={{margin:'2px 0 0',fontSize:12,color:'#15803d'}}>
                  סה"כ: {fmtILS(mmFunds.reduce((s,f)=>s+f.value,0))}
                  {' · '}הכנסה שנתית: {fmtILS(mmFunds.reduce((s,f)=>s+f.value*f.yield/100,0))}
                </p>}
              </div>
              <button onClick={()=>setMmEdit(v=>!v)} style={{border:'none',background:'#f0fdf4',color:'#15803d',
                borderRadius:10,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                {mmEdit?'ביטול':'+ הוסף קרן'}
              </button>
            </div>

            {/* Add fund form */}
            {mmEdit&&(
              <div className="card" style={{padding:16,display:'flex',flexDirection:'column',gap:10}}>
                <input className="input" placeholder='שם הקרן (מגדל ש.כ. / הראל קלי / אלטשולר...)' value={mmForm.name}
                       onChange={e=>setMmForm(f=>({...f,name:e.target.value}))} autoFocus/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>שווי נוכחי ₪</label>
                    <input className="input input-num" type="number" placeholder="0" value={mmForm.value}
                           onChange={e=>setMmForm(f=>({...f,value:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:12,color:'#6B7280',display:'block',marginBottom:4}}>תשואה שנתית %</label>
                    <input className="input input-num" type="number" step="0.1" placeholder="4.5" value={mmForm.yield}
                           onChange={e=>setMmForm(f=>({...f,yield:e.target.value}))}/>
                  </div>
                </div>
                <button className="btn-primary" onClick={addMM}>הוסף קרן ✓</button>
              </div>
            )}

            {/* Fund list */}
            {mmFunds.length===0&&!mmEdit&&(
              <div className="card" style={{padding:32,textAlign:'center',color:'#9CA3AF',fontSize:14}}>
                אין קרנות כספיות — לחץ "הוסף קרן"
              </div>
            )}
            {mmFunds.map(f=>(
              <div key={f.id} className="card" style={{overflow:'hidden'}}>
                <div style={{background:'linear-gradient(135deg,#064e3b,#065f46)',padding:'14px 16px',
                             display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{color:'white'}}>
                    <p style={{margin:0,fontWeight:700,fontSize:15}}>💵 {f.name}</p>
                    {f.yield>0&&<p style={{margin:'3px 0 0',fontSize:11,opacity:.7}}>תשואה: {f.yield}% שנתי</p>}
                  </div>
                  <div style={{textAlign:'left',color:'white'}}>
                    <p style={{margin:0,fontSize:20,fontWeight:800}}>{fmtILS(f.value)}</p>
                    {f.yield>0&&<p style={{margin:'2px 0 0',fontSize:11,opacity:.7}}>+{fmtILS(f.value*f.yield/100)}/שנה</p>}
                  </div>
                </div>
                <div style={{padding:'10px 14px',display:'flex',justifyContent:'flex-start'}}>
                  <button onClick={()=>delMM(f.id)} style={{border:'none',background:'#fee2e2',color:'#dc2626',
                    borderRadius:8,padding:'6px 12px',fontSize:13,cursor:'pointer'}}>🗑️ הסר</button>
                </div>
              </div>
            ))}

            <div className="card" style={{padding:14,background:'#f0fdf4',border:'1px solid #a7f3d0'}}>
              <p style={{fontSize:12,color:'#065f46',margin:'0 0 6px',fontWeight:700}}>💡 מה זה קרן כספית?</p>
              <p style={{fontSize:12,color:'#047857',margin:0,lineHeight:1.6}}>
                קרן כספית היא אפיק השקעה סולידי עם נזילות יומית. תשואה ממוצעת 4-5% שנתי.
                מגדל שקלים, הראל קלי, אלטשולר שחם כספית — ניתן לפתוח דרך בית ההשקעות.
              </p>
            </div>
          </div>
        )}

        {invTab==='stocks'&&<PortfolioSection/>}

      </div>
    </div>
  );
}

/* ── BUDGET EDITOR ── */
function BudgetEditor({onSave}) {
  const [plan,setPlan]=useState(()=>loadBudgetPlan());
  const [saved,setSaved]=useState(false);
  const total=plan.reduce((s,b)=>s+b.pct,0);
  const over=total!==100;

  function setPct(key,val){
    const v=Math.max(0,Math.min(100,parseInt(val)||0));
    setPlan(p=>p.map(b=>b.key===key?{...b,pct:v}:b));
  }
  function save(){
    lsSet(LS.BUDGET,plan);
    onSave&&onSave(plan);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }
  function reset(){setPlan(DEFAULT_BUDGET_PLAN);lsSet(LS.BUDGET,DEFAULT_BUDGET_PLAN);}

  return (
    <div className="card" style={{padding:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <p style={{margin:0,fontSize:15,fontWeight:700}}>🎯 הגדרת תקציב לפי אחוזים</p>
        <button onClick={reset} style={{border:'none',background:'#f3f4f6',color:'#6B7280',borderRadius:8,
          padding:'5px 10px',fontSize:12,cursor:'pointer'}}>איפוס</button>
      </div>

      {/* Total indicator */}
      <div style={{background:over?'#fef2f2':'#f0fdf4',borderRadius:10,padding:'8px 12px',
                   marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:13,color:over?'#dc2626':'#15803d',fontWeight:700}}>
          {over?`⚠️ סה"כ ${total}% — חייב להיות 100%`:`✅ סה"כ: ${total}%`}
        </span>
        <span style={{fontSize:12,color:'#9CA3AF'}}>{over?`${100-total>0?'+':''}${100-total}%`:''}</span>
      </div>

      {plan.map(b=>(
        <div key={b.key} style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <label style={{fontSize:13,fontWeight:600,color:'#374151'}}>{b.emoji} {b.key}</label>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <input type="range" min="0" max="60" value={b.pct} onChange={e=>setPct(b.key,e.target.value)}
                     style={{width:100,accentColor:b.color}}/>
              <div style={{display:'flex',alignItems:'center',background:'#f3f4f6',borderRadius:8,overflow:'hidden',width:60}}>
                <input type="number" min="0" max="100" value={b.pct}
                       onChange={e=>setPct(b.key,e.target.value)}
                       style={{width:'100%',border:'none',background:'transparent',textAlign:'center',
                               fontSize:13,fontWeight:700,padding:'5px 4px',direction:'ltr'}}/>
                <span style={{fontSize:12,paddingLeft:4,color:'#6B7280'}}>%</span>
              </div>
            </div>
          </div>
          <div style={{height:5,background:'#f3f4f6',borderRadius:3}}>
            <div style={{height:'100%',width:`${(b.pct/60)*100}%`,background:b.color,borderRadius:3,transition:'width .2s'}}/>
          </div>
        </div>
      ))}

      <button className="btn-primary" onClick={save} disabled={over} style={{opacity:over?.5:1,marginTop:4}}>
        {saved?'✓ נשמר!':'שמור תקציב'}
      </button>
    </div>
  );
}

/* ── SETTINGS TAB ── */
function SettingsTab({profile,onReset,onProfileUpdate,onBudgetChange}) {
  const [p,setP]=useState({...profile});
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setP(prev=>({...prev,[k]:v}));

  function save(){
    lsSet(LS.PROFILE,p);
    onProfileUpdate(p);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:16}}>
      <div className="card" style={{padding:20}}>
        <p style={{fontSize:16,fontWeight:700,marginBottom:16}}>👤 פרופיל</p>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שם</label>
          <input className="input" value={p.name} onChange={e=>set('name',e.target.value)}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר נטו ₪</label>
          <input className="input input-num" type="number" value={p.netSalary} onChange={e=>set('netSalary',parseFloat(e.target.value)||0)}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:13,fontWeight:600,color:'#374151',marginBottom:6}}>שכר ברוטו ₪</label>
          <input className="input input-num" type="number" value={p.grossSalary} onChange={e=>set('grossSalary',parseFloat(e.target.value)||0)}/>
        </div>
        <button className="btn-primary" onClick={save}>
          {saved?'✓ נשמר!':'שמור שינויים'}
        </button>
      </div>

      {/* Budget editor */}
      <BudgetEditor onSave={onBudgetChange}/>

      <div className="card" style={{padding:20,borderColor:'#fee2e2'}}>
        <p style={{fontSize:15,fontWeight:700,color:'#dc2626',marginBottom:8}}>⚠️ איפוס נתונים</p>
        <p style={{fontSize:13,color:'#6B7280',marginBottom:16}}>ימחק את כל העסקאות וההגדרות ויחזיר לאפס</p>
        <button onClick={()=>{if(confirm('האם אתה בטוח? לא ניתן לשחזר את הנתונים.'))onReset();}}
                style={{border:'2px solid #dc2626',background:'white',color:'#dc2626',borderRadius:12,
                        padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer',width:'100%'}}>
          🗑️ מחק הכל והתחל מחדש
        </button>
      </div>
    </div>
  );
}

/* ── BOTTOM NAV ── */
function BottomNav({tab,setTab}) {
  const tabs=[
    {id:'dashboard',  label:'בית',     emoji:'🏠'},
    {id:'transactions',label:'עסקאות', emoji:'💳'},
    {id:'import',     label:'ייבוא',   emoji:'📥'},
    {id:'investments',label:'השקעות',  emoji:'💹'},
    {id:'settings',   label:'הגדרות',  emoji:'⚙️'},
  ];
  return (
    <nav className="bottom-nav" style={{
      position:'fixed',bottom:0,left:0,right:0,background:'white',
      borderTop:'1px solid #e5e7eb',display:'flex',zIndex:50,
      boxShadow:'0 -2px 16px rgba(0,0,0,.06)'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{
          flex:1,padding:'10px 2px 8px',border:'none',background:'none',cursor:'pointer',
          display:'flex',flexDirection:'column',alignItems:'center',gap:2,
          color:tab===t.id?'#22C55E':'#9CA3AF',transition:'color .15s'}}>
          <span style={{fontSize:22,lineHeight:1}}>{t.emoji}</span>
          <span style={{fontSize:10,fontWeight:tab===t.id?700:500}}>{t.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ── APP ROOT ── */
function App() {
  const [budgetPlan,setBudgetPlan] = useState(()=>loadBudgetPlan());
  const [done,setDone]       = useState(()=>lsGet(LS.DONE,false));
  const [profile,setProfile] = useState(()=>lsGet(LS.PROFILE,null));
  const [txs,setTxs]         = useState(()=>lsGet(LS.TX,[]));
  const [tab,setTab]         = useState('dashboard');

  useEffect(()=>{ lsSet(LS.TX,txs); },[txs]);

  function handleAdd(tx)  { setTxs(p=>[tx,...p]); }
  function handleImport(newTxs) { setTxs(p=>[...newTxs,...p]); }
  function handleReset()  { lsClear(); setDone(false); setProfile(null); setTxs([]); }

  if (!done||!profile) {
    return <Onboarding onDone={p=>{setProfile(p);setDone(true);}}/>;
  }

  return (
    <div style={{maxWidth:500,margin:'0 auto',minHeight:'100vh',background:'#f0f4f8'}}>
      {/* Page title bar */}
      <div style={{background:'white',borderBottom:'1px solid #e5e7eb',padding:'14px 20px',
                   position:'sticky',top:0,zIndex:30}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:22}}>💎</span>
          <div>
            <p style={{margin:0,fontSize:15,fontWeight:800,lineHeight:1}}>FinanceIL</p>
            <p style={{margin:0,fontSize:11,color:'#9CA3AF'}}>
              {new Intl.DateTimeFormat('he-IL',{month:'long',year:'numeric'}).format(new Date())}
            </p>
          </div>
        </div>
      </div>

      <div className="main-content">
        {tab==='dashboard'   && <Dashboard     profile={profile} txs={txs} onAdd={handleAdd} budgetPlan={budgetPlan}/>}
        {tab==='transactions'&& <TransactionsTab txs={txs} onAdd={handleAdd}/>}
        {tab==='import'      && <ImportTab      onImport={handleImport}/>}
        {tab==='investments' && <InvestmentsTab profile={profile}/>}
        {tab==='settings'    && <SettingsTab    profile={profile} onReset={handleReset}
          onProfileUpdate={p=>{setProfile(p);lsSet(LS.PROFILE,p);}}
          onBudgetChange={plan=>setBudgetPlan(plan)}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}

document.getElementById('loading')&&(document.getElementById('loading').style.display='none');
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
